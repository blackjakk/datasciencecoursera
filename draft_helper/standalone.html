  --ml-brand-a: #14b8a6; --ml-brand-b: #0891b2;
}
[data-theme="light"] {
  --ml-bg: #ffffff;
  --ml-panel: #ffffff;
  --ml-panel2: #f1f5f9;
  --ml-border: #d8dce2;
  --ml-row: #f0f2f5;
  --ml-text: #1a1d24;
  --ml-muted: #66707d;
  --ml-success: #16a34a;
  --ml-warn: #d97706;
  --ml-danger: #dc2626;
  --ml-info: #0369a1;
  --ml-keeper: #0369a1;
  --ml-banner-warn-bg: #fff7ed;
  --ml-banner-warn-border: #fed7aa;
}

/* ---------- primitives ---------- */
.ml-panel { background: var(--ml-panel); border: 1px solid var(--ml-border);
  border-radius: var(--ml-r-lg); padding: 10px; }
.ml-panel > h2, .ml-h-label { margin: 0 0 8px; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; color: var(--ml-muted); }
.ml-card { border: 1px solid var(--ml-border); border-radius: var(--ml-r-md);
  padding: 4px 7px; background: var(--ml-panel); break-inside: avoid; }
.ml-display { font-family: var(--ml-font-display); letter-spacing: .5px; }

/* ---------- badges & chips ---------- */
.ml-badge { display: inline-block; padding: 1px 5px; border-radius: var(--ml-r-sm);
  font-size: 10px; font-weight: 700; color: #fff; min-width: 24px; text-align: center; }
.ml-badge--qb { background: var(--ml-pos-qb); color: #fff; }
.ml-badge--rb { background: var(--ml-pos-rb); color: #fff; }
.ml-badge--wr { background: var(--ml-pos-wr); color: #fff; }
.ml-badge--te { background: var(--ml-pos-te); color: #fff; }
.ml-badge--k { background: var(--ml-pos-k); color: #fff; }
.ml-badge--def { background: var(--ml-pos-def); color: #fff; }
.ml-badge--dst { background: var(--ml-pos-def); color: #fff; }
.ml-badge--keeper { background: var(--ml-keeper); color: #000; padding: 1px 4px;
  font-size: 9px; min-width: 0; }
.ml-badge--rookie { background: var(--ml-warn); color: #000; padding: 1px 4px;
  font-size: 9px; min-width: 0; }
.ml-badge--injury { background: var(--ml-danger); color: #fff; padding: 1px 4px;
  font-size: 9px; min-width: 0; }
.ml-pos-qb { color: var(--ml-pos-qb); }
.ml-pos-rb { color: var(--ml-pos-rb); }
.ml-pos-wr { color: var(--ml-pos-wr); }
.ml-pos-te { color: var(--ml-pos-te); }
.ml-pos-k { color: var(--ml-pos-k); }
.ml-pos-def { color: var(--ml-pos-def); }
.ml-stat { background: var(--ml-panel2); padding: 3px 8px; border-radius: 4px;
  font-size: 11px; color: var(--ml-muted); }
.ml-stat strong { color: var(--ml-text); }

/* ---------- buttons & inputs ---------- */
.ml-btn { background: var(--ml-panel2); border: 1px solid var(--ml-border);
  color: var(--ml-text); padding: 4px 10px; border-radius: var(--ml-r-md);
  cursor: pointer; font-size: 12px; }
.ml-btn:hover { filter: brightness(1.2); }
.ml-btn--hdr { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; padding: 6px 12px; font-weight: 700; letter-spacing: .5px; }
.ml-btn--on { background: var(--ml-danger); border-color: var(--ml-danger);
  color: #fff; animation: ml-pulse 1.4s infinite; }
.ml-input { background: var(--ml-panel2); border: 1px solid var(--ml-border);
  color: var(--ml-text); padding: 6px 10px; border-radius: var(--ml-r-md);
  font-size: 14px; }
.ml-filter { background: var(--ml-panel2); border: 1px solid var(--ml-border);
  color: var(--ml-text); padding: 4px 9px; border-radius: var(--ml-r-md);
  cursor: pointer; font-size: 12px; font-weight: 700; }
.ml-filter.active { background: var(--ml-success); color: #000;
  border-color: var(--ml-success); }
.ml-filter--qb.active { background: var(--ml-pos-qb); border-color: var(--ml-pos-qb); color: #fff; }
.ml-filter--rb.active { background: var(--ml-pos-rb); border-color: var(--ml-pos-rb); color: #fff; }
.ml-filter--wr.active { background: var(--ml-pos-wr); border-color: var(--ml-pos-wr); color: #fff; }
.ml-filter--te.active { background: var(--ml-pos-te); border-color: var(--ml-pos-te); color: #fff; }
.ml-filter--k.active { background: var(--ml-pos-k); border-color: var(--ml-pos-k); color: #fff; }
.ml-filter--def.active { background: var(--ml-pos-def); border-color: var(--ml-pos-def); color: #fff; }

/* ---------- status / clock ---------- */
@keyframes ml-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,.6); }
  50% { box-shadow: 0 0 0 8px rgba(74,222,128,0); } }
.ml-clock { font-weight: 700; font-size: 13px; padding: 6px 10px;
  border-radius: 6px; background: rgba(0,0,0,0.35); }
.ml-clock--me { background: var(--ml-success); color: #000;
  animation: ml-pulse 1.4s infinite; }
.ml-clock--soon { background: var(--ml-warn); color: #000;
  animation: ml-pulse 1.4s infinite; }
.ml-sv-hi { color: var(--ml-success); font-weight: 700; }
.ml-sv-mid { color: var(--ml-warn); font-weight: 700; }
.ml-sv-lo { color: var(--ml-danger); font-weight: 700; }

/* ---------- tables ---------- */
.ml-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.ml-table th { text-align: left; padding: 4px 6px; color: var(--ml-muted);
  font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
  border-bottom: 1px solid var(--ml-border); position: sticky; top: 0;
  background: var(--ml-panel); z-index: 1; }
.ml-table td { padding: 6px; border-bottom: 1px solid var(--ml-row); }
.ml-table--compact { font-size: 7.6pt; }
.ml-table--compact td { padding: 1px 2px; }

/* ---------- banners & notes ---------- */
.ml-banner { background: var(--ml-panel2); border-radius: var(--ml-r-md);
  padding: 4px 8px; }
.ml-banner--warn { background: var(--ml-banner-warn-bg);

.ml-note { color: var(--ml-muted); font-size: .85em; }
.ml-urgent { color: var(--ml-danger); font-weight: 700; }

<style>
  /* Page-specific layout ONLY — every color comes from ml.css --ml-* vars. */
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--ml-bg); color: var(--ml-text); font: 14px/1.4 var(--ml-font-body); }
  header { background: linear-gradient(135deg, var(--ml-brand-a) 0%, var(--ml-brand-b) 100%); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  header .title { font-weight: 800; font-size: 16px; letter-spacing: 0.5px; }
  main { display: grid; grid-template-columns: 1fr 380px; gap: 12px; padding: 12px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .controls { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .controls input[type=search] { flex: 1; min-width: 140px; }
  .pos-filter { display: flex; gap: 4px; flex-wrap: wrap; }
  table.player-list tr { cursor: pointer; }
  table.player-list tr:hover { background: var(--ml-panel2); }
  table.player-list tr.drafted { opacity: 0.25; text-decoration: line-through; pointer-events: none; }

  .vbd { font-weight: 700; }
  .vbd.pos { color: var(--ml-success); }
  .vbd.neg { color: var(--ml-muted); }
  .meta { color: var(--ml-muted); font-size: 11px; }
  .roster { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; font-size: 12px; }
  .roster-row { padding: 4px 6px; background: var(--ml-panel2); border-left: 3px solid; border-radius: var(--ml-r-sm); display: flex; justify-content: space-between; align-items: center; }
  .recs { display: flex; flex-direction: column; gap: 4px; }
  .rec { padding: 6px 8px; background: var(--ml-panel2); border-radius: var(--ml-r-md); border-left: 3px solid var(--ml-success); }
  .rec.warn { border-left-color: var(--ml-warn); }
  .rec .why { color: var(--ml-muted); font-size: 11px; margin-top: 2px; }
  .player-list-scroll { max-height: 70vh; overflow-y: auto; }
  .history { max-height: 200px; overflow-y: auto; font-size: 12px; }
  .history-row { padding: 3px 6px; border-bottom: 1px solid var(--ml-row); display: flex; gap: 6px; align-items: center; }
  .history-row .pn { color: var(--ml-muted); min-width: 28px; }
  .history-row .who { color: var(--ml-muted); min-width: 60px; }
  .history-row.mine { background: rgba(74,222,128,0.12); }
  .age-young { color: var(--ml-success); }
  .age-old { color: var(--ml-muted); }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; font-size: 11px; }
  .keeper-row { font-style: italic; opacity: 0.7; }
  .next-pick-info { font-size: 11px; color: var(--ml-muted); margin-top: 2px; }
  .live-box { display: flex; align-items: center; gap: 8px; }
  .live-status { font-size: 11px; color: rgba(255,255,255,0.85); max-width: 220px; }
</style>

    </div>
  </div>

    <div class="ml-panel">
      <h2>Recent Picks <button class="ml-btn" id="undo">undo last</button></h2>
      <div class="history" id="history"></div>
    </div>
  </div>
</main>

(async function init() {

  document.getElementById("ceiling-btn").addEventListener("click", toggleCeiling);
  document.getElementById("practice-btn").addEventListener("click", togglePractice);

})();

// ---------- PRACTICE MODE (draft vs the tendency-modeled league bots) ----------
// Bots replicate the Python simulator: VBD value + positional need
// (FLEX-share weighted) + per-manager tendency bonus, sampled by softmax
// at temperature 0.25. Your picks are yours. Nothing is saved to the URL;
// exiting restores the real board.
let practiceMode = false;

const BOT_CAPS = { QB: 3, RB: 5, WR: 6, TE: 2, K: 1, DEF: 1 };
const BOT_DEMAND = { QB: 1.85, RB: 2.6, WR: 3.48, TE: 1.07, K: 1, DEF: 1 };
const BOT_TEMP = 0.25, BOT_TOPK = 15, TEND_STRENGTH = 0.4, TEND_WIDTH = 2.0;

function mgrTendencies(mgrId) {
  const t = (DATA.tendencies && DATA.tendencies.tendencies) || {};
  const mine = t[mgrId] || {};
  const out = {};
  for (const pos of Object.keys(mine)) {
    if ((mine[pos].n_samples || 0) >= 2) out[pos] = mine[pos].manager_first_avg;
  }
  return out;
}
function tendencyBonus(mgrId, pos, round) {
  const exp = mgrTendencies(mgrId)[pos]
    ?? ((DATA.tendencies && DATA.tendencies.league_first_avg) || {})[pos];
  if (exp == null) return 0;
  const d = round - exp;
  return TEND_STRENGTH * Math.exp(-(d * d) / (2 * TEND_WIDTH * TEND_WIDTH));
}

function teamCounts(ti) {
  const c = {};
  for (const s of DATA.schedule) {
    if (s.team_idx !== ti || !s.player) continue;
    const p = DATA.players.find(x => x.name === s.player);
    const pos = p ? (p.pos === "DST" ? "DEF" : p.pos) : "?";
    c[pos] = (c[pos] || 0) + 1;
  }
  return c;
}

function botPick(slot) {
  const ti = slot.team_idx;
  const mgr = (DATA.managers.find(m => m.team_idx === ti) || {}).id;
  const counts = teamCounts(ti);
  const rnd = slot.round;
  const kdefFloor = 15;

  const cands = [];
  for (const p of DATA.players) {
    if (drafted.has(p.name)) continue;
    const pos = p.pos === "DST" ? "DEF" : p.pos;
    if (!(pos in BOT_CAPS)) continue;
    if ((counts[pos] || 0) >= BOT_CAPS[pos]) continue;
    if ((pos === "K" || pos === "DEF") && rnd < kdefFloor) {
      // tendency injection: early-K/DEF managers reach when their window opens
      const exp = mgrTendencies(mgr)[pos];
      if (exp == null || rnd < exp - 2 || (counts[pos] || 0) >= 1) continue;
      cands.push({ p, s: 0.25 + tendencyBonus(mgr, pos, rnd) });
      continue;
    }
    const v = Math.max(0, p.vbd) / 120 + 0.2;
    const need = Math.max(0, (BOT_DEMAND[pos] || 0) - (counts[pos] || 0))
      + (pos === "QB" && (counts.QB || 0) < 3 ? (3 - (counts.QB || 0)) * 0.25 : 0);
    cands.push({ p, s: v + 0.6 * need + tendencyBonus(mgr, pos, rnd) });
  }
  if (!cands.length) return null;
  cands.sort((a, b) => b.s - a.s);
  const top = cands.slice(0, BOT_TOPK);
  // softmax sample
  const maxS = top[0].s;
  const ws = top.map(c => Math.exp((c.s - maxS) / BOT_TEMP));
  let r = Math.random() * ws.reduce((a, b) => a + b, 0);
  for (let i = 0; i < top.length; i++) {
    r -= ws[i];
    if (r <= 0) return top[i].p;
  }
  return top[top.length - 1].p;
}

function practiceAdvance() {
  while (cursor < DATA.schedule.length) {
    const slot = DATA.schedule[cursor];
    if (slot.player) { cursor++; continue; }
    if (slot.team_idx === DATA.my_team_idx) break;   // your clock
    const p = botPick(slot);
    if (!p) { cursor++; continue; }
    slot.player = p.name;
    slot.is_keeper = false;
    pickOrder.push(slot);
    drafted.add(p.name);
    cursor++;
  }
  refresh();
  if (cursor >= DATA.schedule.length) showPracticeResult();
  else setLiveStatus(`practice · your pick R${DATA.schedule[cursor].round} (#${DATA.schedule[cursor].overall})`);
}

function startersProjJS(ti) {
  const shape = [[1, ["QB"]], [2, ["RB"]], [3, ["WR"]], [1, ["TE"]],
                 [1, ["RB", "WR", "TE"]], [1, ["QB", "RB", "WR", "TE"]],
                 [1, ["K"]], [1, ["DEF"]]];
  const pool = [];
  for (const s of DATA.schedule) {
    if (s.team_idx !== ti || !s.player) continue;
    const p = DATA.players.find(x => x.name === s.player);
    if (p) pool.push([p.pos === "DST" ? "DEF" : p.pos, p.proj]);
  }
  pool.sort((a, b) => b[1] - a[1]);
  const used = new Array(pool.length).fill(false);
  let total = 0;
  for (const [count, elig] of shape) {
    let filled = 0;
    for (let i = 0; i < pool.length && filled < count; i++) {
      if (!used[i] && elig.includes(pool[i][0])) { used[i] = true; total += pool[i][1]; filled++; }
    }
  }
  return total;
}

function showPracticeResult() {
  const starters = startersProjJS(DATA.my_team_idx);
  // MC quartiles are FULL-ROSTER projection totals — grade on the same basis.
  let full = 0;
  for (const s of DATA.schedule) {
    if (s.team_idx !== DATA.my_team_idx || !s.player) continue;
    const p = DATA.players.find(x => x.name === s.player);
    if (p) full += p.proj;
  }
  const mc = DATA.mc_summary || {};
  const bench = mc.p50 ? `\nSim expectation (full roster): median ${mc.p50.toFixed(0)}, p25 ${mc.p25.toFixed(0)}, p75 ${mc.p75.toFixed(0)}` : "";
  let grade = "";
  if (mc.p75 && full >= mc.p75) grade = " — TOP-QUARTILE draft 🔥";
  else if (mc.p50 && full >= mc.p50) grade = " — above your sim median ✓";
  else if (mc.p25 && full < mc.p25) grade = " — below p25, run it back";
  else if (mc.p25) grade = " — below median, tighten the middle rounds";
  setLiveStatus(`PRACTICE DONE: ${full.toFixed(0)} roster pts${grade}`);
  alert(`Practice draft complete!\n\nStarters: ${starters.toFixed(0)} projected pts\nFull roster: ${full.toFixed(0)}${grade}${bench}\n\nHit EXIT PRACTICE to restore the real board, or review your roster first.`);
}

// ---------- LIVE MODE (Sleeper draft auto-sync) ----------
// Polls api.sleeper.app (CORS-open) every 15s and marks picks automatically.
// On connect it rebuilds the schedule from the REAL draft order + traded
// picks, replacing our predicted order, and drops predicted keeper
// placements (real keeper picks arrive through the picks feed instead).
let liveTimer = null;
let liveDraftId = null;

function setLiveStatus(msg) {
  document.getElementById("live-status").textContent = msg;
}

async function toggleLive() {
  const btn = document.getElementById("live-btn");
  if (liveTimer) {                       // turn OFF
    clearInterval(liveTimer);
    liveTimer = null;
    btn.textContent = "GO LIVE";
    btn.classList.remove("ml-btn--on");
    setLiveStatus("live sync stopped");
    return;
  }
  const saved = localStorage.getItem("sleeper_draft_id") || "";
  const id = prompt("Sleeper draft ID (from the draft room URL):", saved);
  if (!id) return;
  liveDraftId = id.trim();
  localStorage.setItem("sleeper_draft_id", liveDraftId);
  setLiveStatus("connecting…");
  try {
    await rebuildScheduleFromSleeper(liveDraftId);
  } catch (e) {
    setLiveStatus("couldn't load draft — check the ID");
    return;
  }
  btn.textContent = "LIVE";
  btn.classList.add("ml-btn--on");
  await livePoll();
  liveTimer = setInterval(livePoll, 15000);
}

async function rebuildScheduleFromSleeper(draftId) {
  const draft = await (await fetch(`https://api.sleeper.app/v1/draft/${draftId}`)).json();
  const traded = await (await fetch(`https://api.sleeper.app/v1/draft/${draftId}/traded_picks`)).json();
  const s2r = draft.slot_to_roster_id;
  if (!s2r) throw new Error("draft has no slot_to_roster_id yet");

  // Real order replaces prediction: remap manager slots + my_team_idx.
  for (const m of DATA.managers) {
    const realSlot = Object.keys(s2r).find(slot => s2r[slot] === m.roster_id);
    if (realSlot) { m.slot = +realSlot; m.team_idx = +realSlot - 1; }
  }
  const me = DATA.managers.find(m => m.roster_id === 9);
  if (me) DATA.my_team_idx = me.team_idx;

  // Traded-pick overrides: (round, original roster_id) -> current owner rid.
  const overrides = {};
  for (const t of (Array.isArray(traded) ? traded : [])) {
    overrides[`${t.round}:${t.roster_id}`] = t.owner_id;
  }
  const rid2slot = {};
  for (const slot of Object.keys(s2r)) rid2slot[s2r[slot]] = +slot;

  // Wipe every assignment (predicted keepers included) and re-derive
  // ownership. Real picks — keepers too — arrive via the picks feed.
  pickOrder = [];
  drafted = new Set();
  for (const p of DATA.schedule) {
    delete p.player; delete p.is_keeper;
    const origSlot = p.round % 2 === 1 ? p.pick_in_round : 13 - p.pick_in_round;
    const origRid = s2r[origSlot];
    const ownerRid = overrides[`${p.round}:${origRid}`] || origRid;
    p.slot = rid2slot[ownerRid];
    p.team_idx = rid2slot[ownerRid] - 1;
  }
  recomputeCursor();
  saveStateToURL();
  refresh();
}

async function livePoll() {
  if (!liveDraftId) return;
  let picks;
  try {
    picks = await (await fetch(`https://api.sleeper.app/v1/draft/${liveDraftId}/picks`)).json();
  } catch (e) {
    setLiveStatus("poll failed — retrying in 15s");
    return;
  }
  if (!Array.isArray(picks)) { setLiveStatus("unexpected response"); return; }
  let changed = false;
  for (const pk of picks) {
    const slot = DATA.schedule.find(s => s.overall === pk.pick_no);
    if (!slot || slot.player) continue;
    const mgr = DATA.managers.find(m => m.roster_id === pk.roster_id);
    if (mgr) { slot.team_idx = mgr.team_idx; slot.slot = mgr.slot; }
    const nm = matchSleeperPick(pk);
    if (!nm) continue;
    slot.player = nm;
    slot.is_keeper = !!pk.is_keeper;
    pickOrder.push(slot);
    drafted.add(nm);
    changed = true;
  }
  if (changed) { recomputeCursor(); saveStateToURL(); refresh(); }
  const next = DATA.schedule[cursor];
  setLiveStatus(`synced ${picks.length}/204 · ${next ? "pick #" + next.overall + " on the clock" : "draft over"}`);
}

function matchSleeperPick(pk) {
  const md = pk.metadata || {};
  const pos = (md.position || "").toUpperCase();
  const raw = `${md.first_name || ""} ${md.last_name || ""}`.trim();
  if (pos === "DEF" || pos === "DST") {
    const d = DATA.players.find(p => (p.pos === "DEF" || p.pos === "DST") && p.team === pk.player_id);
    if (d) return d.name;
  } else {
    const key = normName(raw);
    let cands = DATA.players.filter(p => normName(p.name) === key);
    if (cands.length > 1 && pos) cands = cands.filter(p => p.pos === pos);
    if (cands.length) return cands[0].name;
  }
  // Unknown player (deep bench / not in our pool): synthesize an entry so
  // the slot still fills and the cursor never wedges on a gap.
  if (!raw) return null;
  DATA.players.push({
    name: raw, pos: pos || "?", team: md.team || pk.player_id || "",
    adp: 999, proj: 0, vbd: 0, age: null, years_exp: null, injury: "",
  });
  return raw;
}

function normName(s) {
  return (s || "").toLowerCase()
    .replace(/[.'-]/g, "")
    .replace(/\s+(jr|sr|ii|iii|iv|v)$/, "")
    .replace(/\s+/g, " ").trim();
}

// ---------- KEEPERS ----------
function applyKeepersAtStart() {
  // Pre-place each manager's keepers on their effective_forfeit_round slot.
  // Sets player + is_keeper on the schedule entry AND adds to pickOrder so
  // the roster panel shows keepers immediately.
  const keepersByTeam = {};
  for (const k of DATA.keepers) {
    const mgr = DATA.managers.find(m => m.roster_id === k.roster_id);
    if (!mgr) continue;
    (keepersByTeam[mgr.team_idx] = keepersByTeam[mgr.team_idx] || []).push(k);
  }
  for (const [tIdx, ks] of Object.entries(keepersByTeam)) {
    const ti = +tIdx;
    const consumed = new Set(
      pickOrder.filter(p => p.team_idx === ti).map(p => p.overall)
    );
    for (const k of ks) {
      if (drafted.has(k.player_name)) continue;
      const forfeit = k.effective_forfeit_round || k.forfeit_round;
      const pick = DATA.schedule.find(p =>
        p.round === forfeit && p.team_idx === ti && !consumed.has(p.overall) && !p.player
      );
      if (!pick) continue;
      pick.player = k.player_name;
      pick.is_keeper = true;
      pickOrder.push(pick);
      drafted.add(k.player_name);
      consumed.add(pick.overall);
    }
  }
}

function recomputeCursor() {
  cursor = 0;
  while (cursor < DATA.schedule.length && DATA.schedule[cursor].player) {
    cursor++;
  }
}

// ---------- STATE PERSISTENCE (URL hash) ----------
let suppressHashChange = false;
function saveStateToURL() {
  if (practiceMode) return;   // practice drafts never touch the real state
  suppressHashChange = true;
  // Only save USER picks — keepers are deterministic and replaced on load
  const compact = pickOrder
    .filter(p => !p.is_keeper)
    .map(p => `${p.overall}:${encodeURIComponent(p.player)}`).join(",");
  history.replaceState(null, "", "#" + compact);
  setTimeout(() => suppressHashChange = false, 50);
}
function loadStateFromURL() {
  const h = location.hash.slice(1);
  if (!h) return;
  const items = h.split(",").filter(Boolean);
  pickOrder = [];
  drafted = new Set();
  // Wipe any prior assignments on schedule
  for (const p of DATA.schedule) { delete p.player; delete p.is_keeper; }
  for (const it of items) {
    const [overall, ...rest] = it.split(":");
    const pn = decodeURIComponent(rest.join(":"));
    const p = DATA.schedule.find(x => x.overall === +overall);
    if (!p) continue;
    p.player = pn;
    p.is_keeper = false;
    pickOrder.push(p);
    drafted.add(pn);
  }
}

// ---------- DRAFT ACTIONS ----------
function draftPlayer(name) {
  if (drafted.has(name)) return;
  if (cursor >= DATA.schedule.length) return;
  const slot = DATA.schedule[cursor];
  slot.player = name;
  slot.is_keeper = false;
  pickOrder.push(slot);
  drafted.add(name);
  recomputeCursor();  // skips any subsequent keeper slots
  saveStateToURL();
  refresh();
  if (practiceMode) practiceAdvance();  // bots pick until your next clock
}

function undo() {
  // Pop the most recent USER pick (skip keepers — they're not undoable)
  for (let i = pickOrder.length - 1; i >= 0; i--) {
    if (!pickOrder[i].is_keeper) {
      const [p] = pickOrder.splice(i, 1);
      drafted.delete(p.player);
      delete p.player;
      delete p.is_keeper;
      recomputeCursor();
      saveStateToURL();
      refresh();
      return;
    }
  }
}

// ---------- DERIVED DRAFT MATH ----------
// Brian's future non-keeper picks strictly AFTER the pick on the clock —
// the "if I pass now, when do I pick again?" horizon.
function myWaitPick() {
  const after = DATA.schedule.slice(cursor).filter(
    p => p.team_idx === DATA.my_team_idx && !p.player);
  const onClock = after[0] && DATA.schedule[cursor] === after[0];
  return onClock ? after[1] : after[0];
}

// P(player still available at overall pick N), from draft-position
// quantiles svq = [p0, p10, ..., p100] of where they left the board across
// 300 sims. avail(N) = P(gone_at >= N) = 1 - F(N), F interpolated over the
// 11 quantile points. No svq = never drafted in any sim = always there.
function survivalAt(p, overall) {
  const q = p.svq;
  if (!q) return 1.0;
  if (overall <= q[0]) return 1.0;
  if (overall > q[10]) return 0.0;
  for (let i = 1; i <= 10; i++) {
    if (overall <= q[i]) {
      const span = q[i] - q[i - 1] || 1;
      const f = (i - 1 + (overall - q[i - 1]) / span) / 10;
      return Math.max(0, Math.min(1, 1 - f));
    }
  }
  return 0.0;
}

function survivalCell(p, waitPick) {
  if (!waitPick) return '<span class="meta">–</span>';
  const pct = Math.round(survivalAt(p, waitPick.overall) * 100);
  const cls = pct >= 70 ? "ml-sv-hi" : (pct >= 30 ? "ml-sv-mid" : "ml-sv-lo");
  return `<span class="${cls}">${pct}%</span>`;
}

// Dynamic VBD: replacement level recomputed against the REMAINING pool.
// As positions thin out, the survivors at scarce positions gain value —
// static pre-draft VBD misses that entirely.
const BASE_REPL_RANKS = { QB: 22, RB: 31, WR: 42, TE: 13, K: 12, DEF: 12 };
function computeDynVbd() {
  const remainingByPos = {};
  const draftedByPos = {};
  for (const p of DATA.players) {
    const pos = p.pos === "DST" ? "DEF" : p.pos;
    if (drafted.has(p.name)) {
      draftedByPos[pos] = (draftedByPos[pos] || 0) + 1;
    } else {
      (remainingByPos[pos] = remainingByPos[pos] || []).push(p);
    }
  }
  const repl = {};
  for (const pos of Object.keys(BASE_REPL_RANKS)) {
    const pool = (remainingByPos[pos] || []).sort((a, b) => b.proj - a.proj);
    if (!pool.length) { repl[pos] = 0; continue; }
    const rank = Math.max(1, BASE_REPL_RANKS[pos] - (draftedByPos[pos] || 0));
    repl[pos] = pool[Math.min(rank, pool.length) - 1].proj;
  }
  const dyn = new Map();
  for (const p of DATA.players) {
    if (drafted.has(p.name)) continue;
    const pos = p.pos === "DST" ? "DEF" : p.pos;
    dyn.set(p.name, p.proj - (repl[pos] ?? 0));
  }
  return dyn;
}

// 2027 keeper cost if drafted in round r (league rule: cost = round - 2;
// R1/R2 picks are keeper-ineligible; waivers cost R15).
function keeperCostLabel(round) {
  return round > 2 ? `keep '27 @ R${round - 2}` : "not keeper-eligible";
}

// ---------- CEILING MODE ----------
// Variance-seeking rec weighting: a 12th-place team wins through 90th-
// percentile outcomes, not medians. Upside proxy = FantasyPros expert
// DISAGREEMENT (rank std across 38 experts — high spread means boom/bust)
// plus youth (breakout runway). Purely a re-weighting of the rec score;
// the underlying VBD/survival facts don't change.
let ceilingMode = false;
function upsideBonus(p) {
  let u = 0;
  if (p.fp_std != null) u += Math.min(p.fp_std, 20) * 1.2;  // 0..24
  if (p.years_exp != null && p.years_exp <= 2) u += 10;
  if (p.age && p.age <= 24) u += 6;
  if (p.age && p.age >= 29) u -= 12;
  return u;
}
function toggleCeiling() {
  ceilingMode = !ceilingMode;
  const btn = document.getElementById("ceiling-btn");
  btn.classList.toggle("ml-btn--on", ceilingMode);
  btn.textContent = ceilingMode ? "CEILING ON" : "CEILING";
  refresh();
}

// ---------- ALERT (2 picks out) ----------
let alertedFor = 0;
function maybeAlert(current, myNext) {
  if (!current || !myNext) return;
  const away = myNext.overall - current.overall;
  if (away >= 0 && away <= 2 && alertedFor !== myNext.overall) {
    alertedFor = myNext.overall;
    beep(away === 0 ? 2 : 1);
  }
}
function beep(times) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < times; i++) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; g.gain.value = 0.15;
      o.start(ctx.currentTime + i * 0.35);
      o.stop(ctx.currentTime + i * 0.35 + 0.18);
    }
  } catch (e) { /* audio blocked until first user gesture — fine */ }
}

// ---------- RENDER ----------
let dynVbd = new Map();
function refresh() {
  dynVbd = computeDynVbd();
  renderClock();
  renderPlayerList();
  renderRoster();
  renderRecs();
  renderHistory();
}

function renderClock() {
  const el = document.getElementById("clock");
  if (cursor >= DATA.schedule.length) {
    el.textContent = "Draft complete";
    el.classList.remove("ml-clock--me");
    return;
  }
  const next = DATA.schedule[cursor];
  const mgr = DATA.managers.find(m => m.team_idx === next.team_idx);
  const isMe = next.team_idx === DATA.my_team_idx;
  el.textContent = `R${next.round}.${next.pick_in_round} · #${next.overall} · ${mgr ? mgr.id.toUpperCase() : "?"}`;
  el.classList.toggle("ml-clock--me", isMe);

  // Find Brian's next pick
  const myNext = DATA.schedule.slice(cursor).find(p => p.team_idx === DATA.my_team_idx && !p.player);
  const away = myNext ? myNext.overall - next.overall : -1;
  el.classList.toggle("ml-clock--soon", !isMe && away > 0 && away <= 2);
  if (myNext) {
    const keepNote = keeperCostLabel(myNext.round);
    document.getElementById("next-pick").textContent =
      `Your next pick: R${myNext.round}.${myNext.pick_in_round} (#${myNext.overall}) · ` +
      `${away} picks until you're up · drafted there → ${keepNote}`;
  } else {
    document.getElementById("next-pick").textContent = "No remaining picks.";
  }
  maybeAlert(next, myNext);
}

function renderPlayerList() {
  const body = document.getElementById("ptable-body");
  body.innerHTML = "";
  // Get Brian's "ideal" position list from the recommendations panel logic
  const myNext = DATA.schedule.slice(cursor).find(p => p.team_idx === DATA.my_team_idx && !p.keeper_for);
  const myRoster = pickOrder.filter(p => p.team_idx === DATA.my_team_idx).map(p => p.player);
  const myCounts = countRoster(myRoster);
  const needPos = computeNeedPositions(myCounts, myNext);

  const waitPick = myWaitPick();
  const filtered = DATA.players.filter(p => {
    if (drafted.has(p.name)) return false;
    if (posFilter !== "ALL" && p.pos !== posFilter && !(posFilter === "DEF" && p.pos === "DST")) return false;
    if (searchQ && !p.name.toLowerCase().includes(searchQ)) return false;
    return true;
  }).sort((a, b) => (dynVbd.get(b.name) ?? -999) - (dynVbd.get(a.name) ?? -999))
    .slice(0, 200);

  for (const p of filtered) {
    const tr = document.createElement("tr");
    if (needPos.has(p.pos)) tr.classList.add("brian-target");
    const ageCell = p.age ? `<span class="${p.age <= 25 ? 'age-young' : (p.age >= 29 ? 'age-old' : '')}">${p.age}</span>` : '<span class="meta">-</span>';
    const rookieTag = p.years_exp === 0 ? ' <span class="ml-badge ml-badge--rookie">R</span>' : '';
    const injTag = p.injury ? ` <span class="ml-badge ml-badge--injury">${p.injury[0]}</span>` : '';
    const dv = dynVbd.get(p.name) ?? p.vbd;
    const vbdClass = dv > 0 ? "pos" : "neg";
    tr.innerHTML = `
      <td><span class="ml-badge ml-badge--${p.pos.toLowerCase()}">${p.pos}</span></td>
      <td>${p.name}${rookieTag}${injTag}</td>
      <td class="meta">${p.team}</td>
      <td>${ageCell}</td>
      <td>${p.proj.toFixed(0)}</td>
      <td class="vbd ${vbdClass}" title="dynamic VBD vs remaining pool (pre-draft: ${p.vbd > 0 ? '+' : ''}${p.vbd.toFixed(0)})">${dv > 0 ? '+' : ''}${dv.toFixed(0)}</td>
      <td class="meta">${p.adp.toFixed(0)}</td>
      <td>${survivalCell(p, waitPick)}</td>
    `;
    tr.addEventListener("click", () => draftPlayer(p.name));
    body.appendChild(tr);
  }
}

function renderRoster() {
  const r = document.getElementById("roster");
  r.innerHTML = "";
  // Pull straight from schedule so keepers + user picks both show
  const myPicks = DATA.schedule
    .filter(p => p.team_idx === DATA.my_team_idx && p.player);
  const totalProj = myPicks.reduce((s, p) => {
    const pp = DATA.players.find(x => x.name === p.player);
    return s + (pp ? pp.proj : 0);
  }, 0);
  document.getElementById("roster-total").textContent = `· ${myPicks.length}/17 · ${totalProj.toFixed(0)} proj`;
  // Group by position
  const byPos = {QB: [], RB: [], WR: [], TE: [], K: [], DEF: []};
  for (const pk of myPicks) {
    const pp = DATA.players.find(x => x.name === pk.player) || {pos: 'X', proj: 0};
    const pos = pp.pos in byPos ? pp.pos : (pp.pos === 'DST' ? 'DEF' : 'X');
    if (byPos[pos]) byPos[pos].push({...pk, ...pp});
  }
  for (const pos of ['QB','RB','WR','TE','K','DEF']) {
    for (const player of byPos[pos]) {
      const isKeeper = player.is_keeper;
      const row = document.createElement("div");
      row.className = "roster-row" + (isKeeper ? " keeper-row" : "");
      row.style.borderLeftColor = `var(--ml-pos-${pos.toLowerCase()})`;
      const keepTag = (!isKeeper && player.round > 2)
        ? ` <span class="meta" title="2027 keeper cost">·K'27 R${player.round - 2}</span>` : "";
      row.innerHTML = `<span><span class="ml-badge ml-badge--${pos.toLowerCase()}">${pos}</span> ${player.player}${isKeeper ? ' <span class="ml-badge ml-badge--keeper">K</span>' : ''}</span><span class="meta">R${player.round}${keepTag}</span>`;
      r.appendChild(row);
    }
  }
  // Stats
  const stats = document.getElementById("roster-stats");
  stats.innerHTML = '';
  const counts = countRoster(myPicks.map(p => p.player));
  for (const pos of ['QB','RB','WR','TE','K','DEF']) {
    const target = { QB:3, RB:5, WR:6, TE:2, K:1, DEF:1 }[pos];
    const cur = counts[pos] || 0;
    const ok = cur >= target ? '✓' : `${target - cur} short`;
    stats.innerHTML += `<span class="ml-stat"><strong>${pos}</strong> ${cur}/${target} <span class="meta">${ok}</span></span>`;
  }
}

function renderRecs() {
  const recs = document.getElementById("recs");
  recs.innerHTML = "";
  if (cursor >= DATA.schedule.length) {
    recs.innerHTML = '<div class="meta">Draft complete</div>';
    return;
  }
  const next = DATA.schedule[cursor];
  // Only show recs when Brian's on the clock
  if (next.team_idx !== DATA.my_team_idx) {
    const myNext = DATA.schedule.slice(cursor).find(p => p.team_idx === DATA.my_team_idx && !p.keeper_for);
    if (!myNext) { recs.innerHTML = '<div class="meta">All keepers — no decisions to make.</div>'; return; }
    recs.innerHTML = `<div class="meta">Wait for your pick at R${myNext.round}.${myNext.pick_in_round} (#${myNext.overall})</div>`;
    return;
  }
  // We're on the clock — top 3 by DYNAMIC VBD + need + urgency.
  const myPicks = pickOrder.filter(p => p.team_idx === DATA.my_team_idx);
  const myCounts = countRoster(myPicks.map(p => p.player));
  const needPos = computeNeedPositions(myCounts, next);
  const available = DATA.players.filter(p => !drafted.has(p.name));
  const waitPick = myWaitPick();

  // Keeper-cost banner for this pick.
  const costDiv = document.createElement("div");
  costDiv.className = "meta";
  costDiv.style.marginBottom = "6px";
  costDiv.textContent = `Anyone drafted at this pick → ${keeperCostLabel(next.round)}`;
  recs.appendChild(costDiv);

  function score(p) {
    let s = dynVbd.get(p.name) ?? p.vbd;
    if (needPos.has(p.pos)) s += 25;
    // Urgency: a player unlikely to survive to the next pick is worth more
    // NOW; a near-lock to return is worth less (wait and double-dip).
    const surv = survivalAt(p, waitPick ? waitPick.overall : next.overall + 24);
    s += (1 - surv) * 20;
    if (next.round >= 14 && p.years_exp === 0) s += 15; // rookie keeper-future
    if (next.round >= 14 && p.age && p.age <= 24) s += 8;
    if (ceilingMode) s += upsideBonus(p);
    return s;
  }
  const scored = available.map(p => ({...p, s: score(p)})).sort((a,b) => b.s - a.s);
  const top3 = scored.slice(0, 3);

  for (const p of top3) {
    const reason = recReason(p, next, myCounts, needPos, waitPick);
    const dv = dynVbd.get(p.name) ?? p.vbd;
    const div = document.createElement("div");
    div.className = "rec";
    div.innerHTML = `<div><span class="ml-badge ml-badge--${p.pos.toLowerCase()}">${p.pos}</span> <strong>${p.name}</strong> ` +
      `<span class="meta">VBD ${dv > 0 ? '+' : ''}${dv.toFixed(0)} · ADP ${p.adp.toFixed(0)}` +
      `${p.age ? ' · age ' + p.age : ''} · back-to-you ${survivalCell(p, waitPick)}</span></div>` +
      `<div class="why">${reason}</div>`;
    div.addEventListener("click", () => draftPlayer(p.name));
    div.style.cursor = "pointer";
    recs.appendChild(div);
  }
}

function recReason(p, pick, counts, needPos, waitPick) {
  const parts = [];
  if (ceilingMode && p.fp_std != null && p.fp_std >= 10)
    parts.push(`experts split (±${p.fp_std.toFixed(0)} ranks) — boom/bust`);
  const surv = survivalAt(p, waitPick ? waitPick.overall : pick.overall + 24);
  if (surv < 0.3) parts.push("likely GONE by your next pick — now or never");
  else if (surv > 0.75) parts.push("probably still there next round (could wait)");
  if (needPos.has(p.pos)) parts.push(`fills ${p.pos} need`);
  if (p.adp < pick.overall - 10) parts.push("falling past ADP (great value)");
  if (p.adp > pick.overall + 10) parts.push("ADP reach");
  if (pick.round >= 14 && p.years_exp === 0) parts.push("rookie stash for 2027 keeper");
  if ((dynVbd.get(p.name) ?? p.vbd) > 50) parts.push("elite tier");
  if (pick.round >= 16 && (p.pos === 'K' || p.pos === 'DEF')) parts.push("safe late-round filler");
  if (!parts.length) parts.push("best-VBD on board");
  return parts.join(" · ");
}

function renderHistory() {
  const h = document.getElementById("history");
  h.innerHTML = "";
  // Show picks in actual draft order (overall), up to cursor.
  const happened = DATA.schedule.slice(0, cursor).filter(p => p.player);
  const last = happened.slice(-15).reverse();
  for (const p of last) {
    const mgr = DATA.managers.find(m => m.team_idx === p.team_idx);
    const player = DATA.players.find(x => x.name === p.player) || {pos: '?'};
    const isKeeper = p.is_keeper;
    const isMe = p.team_idx === DATA.my_team_idx;
    const row = document.createElement("div");
    row.className = "history-row" + (isMe ? " mine" : "");
    row.innerHTML = `
      <span class="pn">#${p.overall}</span>
      <span class="who">${(mgr && mgr.id) ? mgr.id.toUpperCase() : '?'}</span>
      <span class="ml-badge ml-badge--${(player.pos || '?').toLowerCase()}">${player.pos || '?'}</span>
      <span>${p.player}</span>
      ${isKeeper ? '<span class="ml-badge ml-badge--keeper">K</span>' : ''}
    `;
    h.appendChild(row);
  }
}

// ---------- HELPERS ----------
function countRoster(names) {
  const c = {};
  for (const n of names) {
    const p = DATA.players.find(x => x.name === n);
    const pos = p ? (p.pos === 'DST' ? 'DEF' : p.pos) : 'X';
    c[pos] = (c[pos] || 0) + 1;
  }
  return c;
}

function computeNeedPositions(counts, nextPick) {
  // Brian's roster targets: 3 QB, 5 RB, 6 WR, 2 TE, 1 K, 1 DEF (17)
  const targets = { QB: 3, RB: 5, WR: 6, TE: 2, K: 1, DEF: 1 };
  const need = new Set();
  if (!nextPick) return need;
  for (const pos of Object.keys(targets)) {
    if ((counts[pos] || 0) < targets[pos]) {
      // K/DEF only count as "need" in last 2 rounds
      if ((pos === 'K' || pos === 'DEF') && nextPick.round < 16) continue;
      need.add(pos);
    }
  }
  return need;
}
