name: Deploy MONEYLEAGUE site to GitHub Pages

# Static site: HQ landing at the root + the draft helper. Files on this
# branch are synced from master by the weekly refresh workflow.
on:
  push:
    branches:
      - claude/football-sim-blockchain-game-b3sdq
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (HQ at root, helper at /draft_helper/, /hq/ redirects)
        run: |
          mkdir -p _site/draft_helper _site/hq
          cp hq/index.html _site/index.html
          cp draft_helper/* _site/draft_helper/
          printf '%s' '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=../"><link rel="canonical" href="../"><title>MONEYLEAGUE HQ moved</title></head><body><p>MONEYLEAGUE HQ moved to <a href="../">the site root</a>.</p></body></html>' > _site/hq/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
