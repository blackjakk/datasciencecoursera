name: Weekly MONEYLEAGUE refresh

# Refreshes projections/ADP/keepers, re-runs the mock sim, re-renders the
# PDFs and draft helper, verifies invariants, and pushes — every Tuesday
# morning through draft season.
#
# PDFs are NOT committed (they'd add ~11MB of binary history weekly);
# they're uploaded to the rolling "latest-artifacts" release instead:
#   https://github.com/blackjakk/MONEYLEAGUE/releases/tag/latest-artifacts
#
# Run manually anytime from the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: "23 13 * * 2"   # Tuesdays 13:23 UTC (~9:23am ET)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Install Chromium for PDF rendering
        run: python -m playwright install --with-deps chromium

      - name: Run full pipeline (fetch -> derive -> sim -> reports -> verify)
        run: scripts/refresh_all.sh

      - name: Commit & push refreshed artifacts (movers summary as body)
        run: |
          git config user.name "moneyleague-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes this week."
            exit 0
          fi
          git commit -m "Weekly refresh: $(date -u +%Y-%m-%d)" \
                     -m "$(cat data/WEEKLY_MOVERS.md 2>/dev/null || echo 'movers summary unavailable')"
          git push origin master

      - name: Publish PDFs to the rolling latest-artifacts release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest-artifacts >/dev/null 2>&1 || \
            gh release create latest-artifacts \
              --title "Latest MONEYLEAGUE artifacts" \
              --notes "Auto-updated by the weekly refresh workflow. Always current."
          gh release upload latest-artifacts \
            data/MONEYLEAGUE_2026_MOCK.pdf \
            data/MONEYLEAGUE_2026_PRESEASON.pdf \
            data/MONEYLEAGUE_POWER_RANKINGS.pdf \
            data/MONEYLEAGUE_2026_ROUND_MENU.pdf \
            data/MONEYLEAGUE_RESEARCH_DESK.pdf \
            data/MONEYLEAGUE_ROOM_CARD.pdf \
            --clobber

      - name: Sync draft helper to the Pages branch
        run: |
          git fetch origin claude/football-sim-blockchain-game-b3sdq
          git checkout claude/football-sim-blockchain-game-b3sdq
          for f in index.html data.json standalone.html ml.css; do
            git show master:docs/draft_helper/$f > draft_helper/$f
          done
          mkdir -p hq
          git show master:docs/hq/index.html > hq/index.html
          git add draft_helper/ hq/
          if git diff --cached --quiet; then
            echo "Helper unchanged."
            exit 0
          fi
          git commit -m "Weekly refresh: sync draft helper $(date -u +%Y-%m-%d)"
          git push origin claude/football-sim-blockchain-game-b3sdq

      - name: Deploy the Pages site (GITHUB_TOKEN pushes never trigger it)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pushes made with the workflow token are exempt from triggering
          # other workflows — every weekly sync updated the branch but the
          # site kept serving stale content. workflow_dispatch IS allowed
          # with GITHUB_TOKEN, so kick the deploy explicitly.
          gh workflow run pages.yml \
            --ref claude/football-sim-blockchain-game-b3sdq || \
            echo "pages dispatch failed (deploy manually if helper changed)"

      - name: Open an issue if the run failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Weekly refresh failed: $(date -u +%Y-%m-%d)" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          A verify-stage failure usually means an upstream data change broke an invariant (renamed player, Sleeper API change, keeper rules drift). Check the run log's 'Verify output invariants' step first." \
            || echo "issue creation failed (probably already open)"
