<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GridironChain — Football Simulator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>">
<style>
  :root {
    --green: #1a5c2e; --green-lt: #2e8b57; --green-dk: #0d3318;
    --gold: #c8a900;  --gold-lt:  #f0cc30;
    --bg: #0a0f0a;    --bg2: #111811; --bg3: #1a221a;
    --card: #182018; --border: #2e3d2e;
    --white: #f0f0f0; --gray: #999; --red: #c0392b;
    --field: #1f6b34; --field-dk: #185b2c; --field-lt: #2a7d40;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--white);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; line-height: 1.5;
  }
  .header {
    background: linear-gradient(180deg, var(--green-dk), #050a05);
    border-bottom: 2px solid var(--green);
    padding: 1.25rem 2rem; text-align: center;
  }
  .header h1 {
    font-size: 1.8rem; letter-spacing: -1px;
    color: var(--gold); font-weight: 900;
  }
  .header h1 span { color: var(--white); }
  .header p { color: var(--gray); font-size: .85rem; margin-top: .25rem; }
  .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }

  /* Team Selector */
  .selector {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 1rem; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem;
  }
  .vs-label { font-weight: 900; font-size: 1.5rem; color: var(--gray); }
  label { font-size: .8rem; color: var(--gray); display: block; margin-bottom: .35rem; }
  select, input[type="number"] {
    background: var(--bg2); border: 1px solid var(--border); color: var(--white);
    padding: .55rem .85rem; border-radius: 6px; width: 100%;
    font-size: .95rem; font-family: inherit;
  }
  select:focus { outline: none; border-color: var(--green-lt); }

  /* Buttons */
  .btn {
    padding: .65rem 1.25rem; border-radius: 6px; cursor: pointer;
    border: none; font-weight: 700; font-size: .9rem;
    transition: all .15s; display: inline-flex; align-items: center; gap: .4rem;
  }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-gold:hover { background: var(--gold-lt); }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-lt); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--white); }
  .btn-outline:hover { border-color: var(--green-lt); color: var(--green-lt); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-sm { padding: .35rem .75rem; font-size: .8rem; }

  /* Controls bar */
  .controls {
    display: flex; gap: .5rem; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .speed-control {
    margin-left: auto; display: flex; align-items: center; gap: .5rem;
    color: var(--gray); font-size: .85rem;
  }

  /* Game layout */
  .game-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 1rem; }
  @media (max-width: 1100px) { .game-grid { grid-template-columns: 1fr; } }

  /* Field viewer */
  .field-wrap {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: .75rem; margin-bottom: 1rem;
    position: relative;
  }
  #field {
    width: 100%; height: auto; display: block; border-radius: 6px;
    background: var(--field-dk);
    image-rendering: pixelated; image-rendering: crisp-edges;
  }
  .field-overlay {
    display: flex; align-items: center; justify-content: space-between;
    padding: .35rem .5rem .55rem .5rem; font-size: .8rem; color: var(--gray);
  }
  .field-status {
    font-weight: 700; color: var(--white); font-size: .85rem;
  }
  .play-caption {
    background: var(--bg3); border-radius: 6px; padding: .55rem .8rem;
    font-size: .9rem; min-height: 38px; display: flex; align-items: center;
    margin-top: .4rem; border-left: 3px solid var(--green-lt);
    transition: border-color .15s;
  }
  .play-caption.score    { border-color: var(--gold); color: var(--gold-lt); font-weight: 700; }
  .play-caption.int      { border-color: #ff6060; color: #ff8a8a; font-weight: 700; }
  .play-caption.fumble   { border-color: #ff6060; color: #ff8a8a; font-weight: 700; }
  .play-caption.sack     { border-color: #c8a900; }
  .play-caption.fg_good  { border-color: var(--gold); color: var(--gold-lt); }
  .play-caption.fg_miss  { border-color: #ff6060; color: #ff8a8a; }
  .play-caption.kickoff,
  .play-caption.punt     { border-color: #4b9bd5; }

  /* Scoreboard */
  .scoreboard {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 1.5rem; padding: 1rem 1.5rem;
    background: var(--bg2); border-radius: 10px;
    border: 1px solid var(--border); margin-bottom: 1rem;
    align-items: center;
  }
  .score-team { text-align: center; }
  .score-team-emoji { font-size: 1.6rem; }
  .score-team-name { font-size: .8rem; color: var(--gray); margin-top: .15rem; }
  .score-team-full { font-weight: 700; font-size: .8rem; }
  .score-num { font-size: 3rem; font-weight: 900; line-height: 1; margin-top: .15rem; }
  .score-num.win { color: var(--gold); }
  .score-mid { text-align: center; }
  .score-status { font-size: .8rem; color: var(--gray); }
  .score-status.live { color: #4caf7a; }
  .score-status.final { color: var(--gold); font-weight: 700; }
  .quarter-clock { font-size: 1.1rem; font-weight: 700; margin-top: .25rem; }
  .down-distance { font-size: .78rem; color: var(--gray); margin-top: .15rem; }
  .poss-indicator { font-size: .75rem; color: var(--gold); margin-top: .15rem; }

  /* Progress bar */
  .progress-wrap { margin-bottom: .75rem; }
  .progress-label { font-size: .75rem; color: var(--gray); margin-bottom: .25rem; display: flex; justify-content: space-between; }
  .progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green-lt); transition: width .12s; }

  /* Play log (smaller now) */
  .play-log {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: .5rem; max-height: 240px; overflow-y: auto; font-size: .82rem;
  }
  .play-entry {
    padding: .35rem .5rem; border-radius: 4px; margin-bottom: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .play-entry .meta { color: var(--gray); font-size: .7rem; margin-right: .5rem; }
  .play-entry.score    { background: #1a3300; color: var(--gold); font-weight: 700; }
  .play-entry.int      { background: #330000; color: #ff8a8a; }
  .play-entry.fumble   { background: #330000; color: #ff8a8a; }
  .play-entry.sack     { background: #1a1a00; }
  .play-entry.fg_good  { background: #1a3300; color: var(--gold); }
  .play-entry.fg_miss  { background: #2a1500; color: #ff8a8a; }
  .play-entry.halftime,
  .play-entry.ot,
  .play-entry.quarter {
    background: var(--bg3); text-align: center; font-weight: 700; color: var(--gold-lt);
    padding: .55rem; margin: .25rem 0;
  }
  .play-entry.kickoff  { background: var(--green-dk); }

  /* Card */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem; margin-bottom: 1rem;
  }
  .card-header { font-weight: 700; color: var(--gold); margin-bottom: .65rem; font-size: .95rem; }
  .ratings-table { width: 100%; }
  .ratings-table tr td { padding: .25rem .35rem; }
  .ratings-table .lbl { text-align: center; color: var(--gray); font-size: .72rem; font-weight: 600; letter-spacing: .5px; }
  .ratings-table .home { text-align: right; font-weight: 700; }
  .ratings-table .away { text-align: left; font-weight: 700; }
  .ratings-table .winner { color: var(--green-lt); }

  /* Box score */
  .boxscore-tabs { display: flex; gap: .25rem; margin-bottom: .65rem; }
  .boxscore-tab {
    flex: 1; padding: .35rem .25rem; border-radius: 6px; cursor: pointer;
    background: var(--bg3); border: 1px solid var(--border); color: var(--gray);
    font-size: .72rem; font-weight: 700; text-align: center; letter-spacing: .3px;
    transition: all .12s;
  }
  .boxscore-tab:hover { color: var(--white); }
  .boxscore-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
  .boxscore-section { font-size: .78rem; }
  .boxscore-section h4 {
    margin: .9rem 0 .3rem; font-size: .72rem; color: var(--gold);
    letter-spacing: .5px; font-weight: 700; padding-bottom: .2rem;
    border-bottom: 1px solid var(--border);
  }
  .boxscore-section h4:first-child { margin-top: 0; }
  .boxscore-table { width: 100%; border-collapse: collapse; font-size: .76rem; }
  .boxscore-table th, .boxscore-table td { padding: .25rem .35rem; text-align: right; }
  .boxscore-table th { color: var(--gray); font-weight: 600; font-size: .68rem; letter-spacing: .3px; border-bottom: 1px solid var(--border); }
  .boxscore-table td.name { text-align: left; font-weight: 700; color: var(--white); }
  .boxscore-table td.pos { text-align: left; color: var(--gray); font-size: .68rem; width: 24px; }
  .team-totals {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: .5rem;
    padding: .4rem 0; font-size: .76rem; border-bottom: 1px solid var(--border);
  }
  .team-totals .lbl { text-align: center; color: var(--gray); font-size: .68rem; letter-spacing: .3px; }
  .team-totals .h { text-align: right; font-weight: 700; }
  .team-totals .a { text-align: left; font-weight: 700; }

  /* Drive log */
  .drive-entry {
    padding: .35rem .5rem; border-bottom: 1px solid var(--border);
    font-size: .8rem; display: flex; justify-content: space-between;
  }
  .drive-team-home { color: var(--green-lt); font-weight: 700; }
  .drive-team-away { color: var(--gold); font-weight: 700; }
  .drive-result-td { color: var(--gold); font-weight: 700; }

  .empty {
    text-align: center; color: var(--gray); padding: 4rem 1rem;
  }
  .empty-icon { font-size: 4rem; margin-bottom: .5rem; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .badge {
    display: inline-block; padding: .15rem .55rem; border-radius: 99px;
    font-size: .7rem; font-weight: 700; letter-spacing: .4px;
  }
  .badge-afc { background: #001a40; color: #5b9bd5; }
  .badge-nfc { background: #3d0000; color: #e07070; }
  .badge-gold { background: #3d3000; color: var(--gold); }
  .badge-air { background: #002244; color: #69be28; letter-spacing: .6px; }
  .badge-gnp { background: #3d1800; color: #ff9040; letter-spacing: .3px; }
  .badge-dt  { background: #1a0033; color: #c890ff; letter-spacing: .4px; }
  .badge-opt { background: #2d1500; color: #ffcc66; letter-spacing: .4px; }

  .player-name {
    cursor: help;
    border-bottom: 1px dotted rgba(255,255,255,0.35);
    transition: color .12s, border-color .12s;
  }
  .player-name:hover {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }
  .starter-row td { font-size: .72rem; padding: .15rem .25rem; }
  .starter-row .home { text-align: right; }
  .starter-row .away { text-align: left; }
  .starter-row .lbl  { color: var(--gray); font-size: .65rem; letter-spacing: .3px; }
  .ovr-pill {
    display: inline-block; background: #1c1c24; color: var(--gold);
    padding: .02rem .35rem; border-radius: 3px; font-size: .65rem;
    font-weight: 800; font-variant-numeric: tabular-nums;
  }
  .team-col { display: flex; flex-direction: column; min-width: 0; }
  .depth-chart {
    margin-top: .5rem; background: #0d0d13; border: 1px solid var(--border);
    border-radius: 6px; padding: .4rem .5rem; font-size: .7rem;
    max-height: 380px; overflow-y: auto;
  }
  .depth-section { margin-bottom: .25rem; }
  .depth-section-title {
    font-size: .58rem; font-weight: 800; color: var(--gold); letter-spacing: .6px;
    padding: .35rem 0 .15rem; border-bottom: 1px solid #2a2a35;
    margin-bottom: .15rem; display: flex; align-items: center; justify-content: space-between;
  }
  .depth-section-title .pb-tag { color: var(--gray); font-weight: 600; font-size: .55rem; letter-spacing: .3px; }
  .depth-row {
    display: grid; grid-template-columns: 2.2rem 1fr auto auto;
    gap: .35rem; align-items: center; padding: .14rem .2rem;
    border-radius: 3px;
  }
  .depth-row:hover { background: rgba(240,204,48,0.06); }
  .depth-row.boosted { background: rgba(240,204,48,0.10); }
  .depth-slot {
    color: var(--gray); font-weight: 800; font-size: .62rem;
    letter-spacing: .3px;
  }
  .depth-name { font-size: .72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .depth-ovr {
    background: #1c1c24; color: var(--gold); padding: .04rem .38rem;
    border-radius: 3px; font-size: .6rem; font-weight: 800;
    font-variant-numeric: tabular-nums; min-width: 2.1rem; text-align: center;
  }
  .depth-ovr.tier-elite   { background: #f0cc30; color: #000; }
  .depth-ovr.tier-good    { background: #2d4a2d; color: #b6e6b6; }
  .depth-ovr.tier-average { background: #2d2d35; color: #c8c8d0; }
  .depth-ovr.tier-poor    { background: #4a2828; color: #d4a0a0; }
  .depth-boost {
    accent-color: var(--gold); cursor: pointer;
    width: 13px; height: 13px; margin: 0;
  }
  .depth-arch {
    display: inline-block; margin-left: .4rem;
    font-size: .55rem; font-weight: 800; letter-spacing: .3px;
    padding: 0 .25rem; border-radius: 2px; vertical-align: middle;
  }
  .arch-dl { background: #2d1500; color: #ffcc66; }
  .arch-ol { background: #001a40; color: #9bd0ff; }

  .sim-many-select {
    background: var(--bg3); color: var(--white); border: 1px solid var(--border);
    border-radius: 6px; padding: .35rem .5rem; font-weight: 700; cursor: pointer;
    font-size: .8rem;
  }
  .sim-many-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center; z-index: 2000;
    backdrop-filter: blur(4px);
  }
  .sim-many-card {
    position: relative; background: var(--bg2); border: 1px solid var(--gold);
    border-radius: 12px; padding: 1.5rem 1.8rem; max-width: 640px; width: 90%;
    max-height: 86vh; overflow-y: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.8);
  }
  .sim-many-close {
    position: absolute; top: .5rem; right: .8rem; background: transparent;
    border: 0; color: var(--gray); font-size: 1.8rem; cursor: pointer; line-height: 1;
  }
  .sim-many-close:hover { color: var(--gold); }
  .sm-title {
    font-size: 1.2rem; font-weight: 800; color: var(--gold); letter-spacing: .5px;
    margin-bottom: .25rem;
  }
  .sm-sub { color: var(--gray); font-size: .8rem; margin-bottom: 1rem; }
  .sm-section { margin-top: 1.2rem; }
  .sm-section h4 {
    font-size: .7rem; letter-spacing: .6px; color: var(--gold);
    margin-bottom: .4rem; border-bottom: 1px solid var(--border); padding-bottom: .25rem;
  }
  .sm-record {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: .8rem;
    align-items: center; margin-bottom: 1rem;
  }
  .sm-team-block { text-align: center; padding: .8rem; background: var(--bg3); border-radius: 8px; }
  .sm-team-block.winner { background: rgba(240,204,48,0.15); border: 1px solid var(--gold); }
  .sm-team-name { font-weight: 800; font-size: .9rem; color: var(--gold); }
  .sm-team-pct  { font-size: 2rem; font-weight: 900; font-variant-numeric: tabular-nums; margin: .25rem 0; }
  .sm-team-wins { font-size: .75rem; color: var(--gray); }
  .sm-vs { font-size: .9rem; color: var(--gray); font-weight: 800; }
  .sm-stats-table {
    width: 100%; border-collapse: collapse; font-size: .78rem;
  }
  .sm-stats-table td {
    padding: .25rem .4rem; font-variant-numeric: tabular-nums;
  }
  .sm-stats-table td.lbl {
    text-align: center; color: var(--gray); font-size: .68rem;
    letter-spacing: .3px; width: 30%;
  }
  .sm-stats-table td.home { text-align: right; }
  .sm-stats-table td.away { text-align: left; }
  .sm-stats-table td.better { color: var(--gold); font-weight: 700; }
  .player-tooltip {
    position: fixed; pointer-events: none; z-index: 1000;
    background: #0a0a12; border: 1px solid var(--gold); border-radius: 8px;
    padding: .65rem .85rem; font-size: .78rem;
    box-shadow: 0 6px 24px rgba(0,0,0,0.7);
    display: none; min-width: 220px;
  }
  .player-tooltip.show { display: block; }
  .player-tooltip .tt-name { font-weight: 800; color: var(--gold); font-size: .9rem; margin-bottom: .3rem; }
  .player-tooltip .tt-sub  { font-size: .68rem; color: var(--gray); margin-bottom: .4rem; letter-spacing: .3px; }
  .player-tooltip .tt-ovr  {
    display: inline-block; background: var(--gold); color: #000; font-weight: 800;
    padding: .1rem .45rem; border-radius: 4px; margin-right: .35rem; font-size: .72rem;
  }
  .player-tooltip .tt-ovr.tier-elite   { background: #f0cc30; }
  .player-tooltip .tt-ovr.tier-good    { background: #9be09b; }
  .player-tooltip .tt-ovr.tier-average { background: #c0c0c0; }
  .player-tooltip .tt-ovr.tier-poor    { background: #c08080; color: #200; }
  .player-tooltip .tt-stats {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: .15rem .9rem;
    margin-top: .25rem;
  }
  .player-tooltip .tt-stat { display: flex; justify-content: space-between; gap: .4rem; font-variant-numeric: tabular-nums; }
  .player-tooltip .tt-key  { color: var(--gray); }
  .player-tooltip .tt-val  { color: var(--white); font-weight: 700; }
  .player-tooltip .tt-bar  {
    height: 3px; background: #1d1d24; border-radius: 2px; margin-top: .25rem;
    overflow: hidden;
  }
  .player-tooltip .tt-bar-fill {
    height: 100%; background: linear-gradient(90deg, #ff4040, #f0cc30, #9be09b);
  }
  .player-tooltip .tt-arch {
    margin-top: .45rem; padding-top: .4rem;
    border-top: 1px dashed #2a2a35;
  }
  .player-tooltip .tt-arch-name {
    font-weight: 800; color: #ff9040; font-size: .72rem; letter-spacing: .5px;
  }
  .player-tooltip .tt-arch-blurb {
    color: var(--gray); font-size: .68rem; margin-top: .1rem;
  }
  .player-tooltip .tt-arch-moves {
    margin-top: .25rem; display: flex; flex-wrap: wrap; gap: .25rem;
  }
  .player-tooltip .tt-move {
    background: #2d1500; color: #ffcc66; font-size: .6rem; font-weight: 700;
    padding: .08rem .35rem; border-radius: 3px; letter-spacing: .3px;
  }

  /* View mode toggle */
  .view-toggle {
    display: inline-flex; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; margin-left: auto;
  }
  .view-toggle button {
    background: transparent; border: 0; color: var(--gray); padding: .45rem .8rem;
    font-weight: 700; cursor: pointer; font-size: .82rem; letter-spacing: .3px;
  }
  .view-toggle button.active {
    background: var(--gold); color: #000;
  }
  .view-toggle button:not(.active):hover { color: var(--white); }

  /* Cinema move callout */
  .cinema-callout {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8); color: var(--gold); font-weight: 900;
    font-size: 1.8rem; padding: .4rem 1.2rem; border-radius: 4px;
    border: 2px solid var(--gold); letter-spacing: 2px;
    pointer-events: none; opacity: 0; transition: opacity .15s;
    text-shadow: 2px 2px 0 #000;
  }
  .cinema-callout.show { opacity: 1; animation: callout-pop .4s ease-out; }
  @keyframes callout-pop {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    40%  { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏈 Gridiron<span>Chain</span></h1>
  <p>2D Animated Football Simulator — Standalone Demo</p>
</div>

<div class="container">

  <!-- Team selector + depth chart -->
  <div class="selector">
    <div class="team-col">
      <label>Home Team</label>
      <select id="homeTeam"></select>
      <div class="depth-chart" id="homeDepth"></div>
    </div>
    <div class="vs-label">VS</div>
    <div class="team-col">
      <label>Away Team</label>
      <select id="awayTeam"></select>
      <div class="depth-chart" id="awayDepth"></div>
    </div>
  </div>

  <div class="controls">

function calcOverall(pos, s) {

function pickDLArchetype(stats) {
  // Bias archetype by stats: high speed → SPEED, high strength → POWER, etc.
  const [spd, str, agi, awr, _thr, _cat, _blk, prs] = stats;
  const weights = {
    POWER:      Math.max(0, str - 60) + Math.max(0, prs - 65) * 0.5,
    SPEED:      Math.max(0, spd - 55) * 1.2 + Math.max(0, agi - 55) * 0.5,
    TWEENER:    Math.max(0, (spd + agi) / 2 - 50) + (str < 75 ? 8 : 0),
    PENETRATOR: Math.max(0, spd - 60) + Math.max(0, prs - 60),
    TECHNICIAN: Math.max(0, awr - 60) * 1.4 + Math.max(0, agi - 55) * 0.5,
  };
  // Add noise so it's not too deterministic
  for (const k in weights) weights[k] += Math.random() * 8;
  return Object.keys(weights).reduce((a, b) => weights[a] >= weights[b] ? a : b);
}
function pickOLArchetype(stats) {
  const [spd, str, agi, awr, _thr, _cat, blk] = stats;
  const weights = {
    ANCHOR:     Math.max(0, str - 55) * 1.4 + (spd < 60 ? 6 : 0),
    ATHLETIC:   Math.max(0, spd - 50) * 1.5 + Math.max(0, agi - 55) * 0.8,
    TECHNICIAN: Math.max(0, awr - 55) * 1.5 + Math.max(0, blk - 60) * 0.8,
    PLUG:       (str > 60 && spd < 60 ? 12 : 4),
    MAULER:     Math.max(0, str - 60) + Math.max(0, blk - 60) * 1.3,
  };
  for (const k in weights) weights[k] += Math.random() * 7;
  return Object.keys(weights).reduce((a, b) => weights[a] >= weights[b] ? a : b);
}

function genPlayer(pos, tier) {

// Generates a player whose name isn't already in `blockNames`. Falls back to
// appending a roman-numeral suffix after exhausting random retries.
function genUniquePlayer(pos, tier, blockNames) {
  const block = blockNames || new Set();
  let p = genPlayer(pos, tier);
  let attempts = 0;
  while (block.has(p.name) && attempts < 30) {
    p = genPlayer(pos, tier);
    attempts++;
  }
  if (block.has(p.name)) {
    const suffixes = ["II", "III", "IV", "V", "VI", "VII"];
    for (const s of suffixes) {
      const candidate = `${p.name} ${s}`;
      if (!block.has(candidate)) { p.name = candidate; break; }
    }
  }
  return p;
}
function genRoster(playbook = PLAYBOOKS.BALANCED, overrides = {}, blockNames = null) {
  const r = [];
  const used = new Set(blockNames || []);
  for (const [pos, count] of Object.entries(ROSTER_SLOTS)) {
    for (let i = 0; i < count; i++) {
      let tier;
      if (i === 0) tier = overrides[pos] || playbook.tierBias[pos] || "good";
      else if (i === 1) tier = "average";
      else tier = "poor";
      const player = genUniquePlayer(pos, tier, used);
      used.add(player.name);
      r.push(player);
    }
  }
  return r;
}

function normal(mean, sd) {
  const u1 = Math.random() || 0.0001, u2 = Math.random();
  return Math.round(mean + Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2) * sd);
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function buildRatings(roster) {
  const byPos = {};
  for (const p of roster) (byPos[p.position] ||= []).push(p);
  for (const k in byPos) byPos[k].sort((a,b) => b.overall - a.overall);
  const g = (pos, n) => {
    const arr = (byPos[pos] || []).slice(0, n);
    return arr.length ? arr.reduce((s,p) => s + p.overall, 0) / arr.length : 50;
  };
  return {
    offense: g("QB",1)*0.30 + g("RB",2)*0.15 + g("WR",4)*0.25 + g("TE",1)*0.10 + g("OL",5)*0.20,
    defense: g("DL",4)*0.30 + g("LB",3)*0.30 + g("CB",2)*0.25 + g("S",2)*0.15,
    qb: g("QB",1), rb: g("RB",2), wr: g("WR",4), ol: g("OL",5),
    dl: g("DL",4), lb: g("LB",3), cb: g("CB",2), saf: g("S",2),
    k:  g("K",1),
    starters: {

class GameSimulator {

      .slice(0, n)

      away: this._buildTeamStats(this.awayR.starters),

  _buildTeamStats(starters) {

    add(starters.qb, "QB");
    add(starters.rb, "RB");
    add(starters.wr1, "WR");
    add(starters.wr2, "WR");
    add(starters.te, "TE");
    add(starters.k,  "K");

    add(starters.de1, "DE"); add(starters.de2, "DE");
    add(starters.dt1, "DT"); add(starters.dt2, "DT");
    add(starters.lb1, "LB"); add(starters.lb2, "LB"); add(starters.lb3, "LB");
    add(starters.cb1, "CB"); add(starters.cb2, "CB");
    add(starters.fs,  "FS"); add(starters.ss,  "SS");

      team: {
        plays: 0, totalYds: 0, passYds: 0, rushYds: 0,
        pass_att: 0, pass_comp: 0, rush_att: 0,
        sacks: 0, sacks_allowed: 0, turnovers: 0, takeaways: 0,
        firstDowns: 0, thirdAtt: 0, thirdConv: 0, fourthAtt: 0, fourthConv: 0,
        timeOfPoss: 0, penalties: 0, penaltyYds: 0,
      },
      players,
    };
  }
  _emptyLine() {

      pass_att: 0, pass_comp: 0, pass_yds: 0, pass_td: 0, pass_int: 0, pass_long: 0,
      sacks_taken: 0, sack_yds: 0,
      rush_att: 0, rush_yds: 0, rush_td: 0, rush_long: 0,
      rec_tgt: 0, rec: 0, rec_yds: 0, rec_td: 0, rec_long: 0,
      fg_made: 0, fg_att: 0, fg_long: 0, xp_made: 0, xp_att: 0,

  // Pick a defender (weighted by position) and credit a stat field

    const pool = [];

    if (weights.LB) {

      addCandidate(defStarters.lb2, weights.LB);
      addCandidate(defStarters.lb3, weights.LB);
    }
    if (weights.S) {
      addCandidate(defStarters.fs, weights.S);
      addCandidate(defStarters.ss, weights.S);

    if (weights.DL) {

      addCandidate(defStarters.de2, weights.DL);
      addCandidate(defStarters.dt1, weights.DL);
      addCandidate(defStarters.dt2, weights.DL);

      addCandidate(defStarters.cb2, weights.CB);

      let r = Math.random() * sum;
      for (let i = 0; i < list.length; i++) { r -= weights[i]; if (r <= 0) return list[i]; }
      return list[list.length - 1];
    };

    const ol = pickWeighted(olList);

      : `${this.offR.starters.rb} runs for ${yards} yds`;

    // safeties get more credit on big breakaways
    const tacklerName = yards > 0
      ? (yards >= 10 ? this._creditDefStat("tkl", { S: 0.40, CB: 0.20, LB: 0.30, DL: 0.10 })
                     : this._creditDefStat("tkl", { LB: 0.45, DL: 0.30, S: 0.15, CB: 0.10 }))
      : this._creditDefStat("tkl", { DL: 0.50, LB: 0.35, S: 0.10, CB: 0.05 });
    this._pushVisual({ kind: "run", desc, startYard, yards, endYard: clamp(startYard + yards, 0, 100), rusher: carrier, isQBRun, tackler: tacklerName });

  }
  _drive() {

          }
          this.drives.push({ team: start, result: "PUNT-RTN-TD", homeScore: this.score.home, awayScore: this.score.away });
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = 25; this.down = 1; this.ytg = 10; return;
        }
        if (r.punt !== undefined) {
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = clamp(100 - (this.yardLine + r.punt), 1, 99);
        } else {
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = clamp(100 - this.yardLine, 10, 90);
        }
        this.down = 1; this.ytg = 10; break;
      }
      if (r.turnover) {
        this.poss = this.poss === "home" ? "away" : "home";
        this.yardLine = clamp(100 - this.yardLine, 5, 95);
        this.down = 1; this.ytg = 10; break;
      }
      const yards = r.yards || 0;
      if (!r.incomplete) this.yardLine = clamp(this.yardLine + yards, 0, 100);
      const wasThird = (this.down === 3);
      if (this.yardLine >= 100) {
        // Credit TD to last ball carrier
        const off = this.stats[this.poss];
        if (this._lastBallCarrier && off.players[this._lastBallCarrier]) {
          if (this._lastBallType === "pass") {
            off.players[this._lastBallCarrier].rec_td++;
            const qb = this.offR.starters.qb;
            if (off.players[qb]) off.players[qb].pass_td++;
          } else if (this._lastBallType === "rush") {
            off.players[this._lastBallCarrier].rush_td++;
          }
        }
        if (wasThird) off.team.thirdConv++;
        off.team.firstDowns++;
        this._score(6, "Touchdown!");
        const k = this.offR.starters.k, kStats = off.players[k];
        if (Math.random() < 0.92) {
          if (kStats) kStats.xp_att++;
          if (Math.random() < 0.94) { this._score(1, "Extra Point"); if (kStats) kStats.xp_made++; }
        } else {
          if (Math.random() < 0.48) this._score(2, "2-Point Conversion");
        }
        this.drives.push({ team: start, result: "TD", homeScore: this.score.home, awayScore: this.score.away });
        this.poss = this.poss === "home" ? "away" : "home";
        this.yardLine = 25; this.down = 1; this.ytg = 10; return;
      }
      const wasFourth = (this.down === 4);
      if (r.incomplete) this.down++;
      else if (yards >= this.ytg) {
        this.stats[this.poss].team.firstDowns++;
        if (wasThird) this.stats[this.poss].team.thirdConv++;
        if (wasFourth) this.stats[this.poss].team.fourthConv++;
        this.down = 1; this.ytg = 10;
      }
      else { this.down++; this.ytg -= yards; }
      // Turnover on downs — failed 4th-down conversion gives ball to defense
      if (wasFourth && this.down > 4) {
        this._pushVisual({ kind: "to_downs", desc: `Turnover on downs!`, startYard: this.yardLine, endYard: this.yardLine });
        this.drives.push({ team: start, result: "TURNOVER_ON_DOWNS", homeScore: this.score.home, awayScore: this.score.away });
        this.poss = this.poss === "home" ? "away" : "home";
        this.yardLine = clamp(100 - this.yardLine, 1, 99);
        this.down = 1; this.ytg = 10;
        return;
      }
    }
    this.drives.push({ team: start, result: "FG/Punt/TO", homeScore: this.score.home, awayScore: this.score.away });
  }
  simulate() {
    this._pushVisual({ kind: "kickoff", desc: `${this.away.city} ${this.away.name} kicks off`, startYard: 35, endYard: 25 });
    while (this.quarter <= 4) {
      if (this.time <= 0) {
        if (this.quarter === 2) {
          this.plays.push({ kind: "halftime", desc: "═══ HALFTIME ═══", quarter: 2, time: 0, homeScore: this.score.home, awayScore: this.score.away });
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = 25; this.down = 1; this.ytg = 10;
        }
        this.quarter++;
        if (this.quarter <= 4) {
          this.plays.push({ kind: "quarter", desc: `─── Start of Q${this.quarter} ───`, quarter: this.quarter, time: 900, homeScore: this.score.home, awayScore: this.score.away });
        }
        this.time = 900;
        continue;
      }
      this._drive();
    }
    if (this.score.home === this.score.away) {
      this.plays.push({ kind: "ot", desc: "═══ OVERTIME ═══", quarter: 5, time: 600, homeScore: this.score.home, awayScore: this.score.away });
      this.quarter = 5; this.time = 600;
      this.poss = Math.random() < 0.5 ? "home" : "away";
      let n = 0;
      while (this.score.home === this.score.away && n < 8) { this._drive(); n++; }
      if (this.score.home === this.score.away) {
        if (Math.random() < 0.5) this.score.home += 3; else this.score.away += 3;
      }
    }
    // Build a player lookup map for hover tooltips
    const lookup = new Map();
    for (const p of this.hRoster) lookup.set(p.name, { ...p, team: "home" });
    for (const p of this.aRoster) lookup.set(p.name, { ...p, team: "away" });
    return {
      homeTeam: this.home, awayTeam: this.away,
      homeScore: this.score.home, awayScore: this.score.away,
      homeRatings: this.homeR, awayRatings: this.awayR,
      homeRoster: this.hRoster, awayRoster: this.aRoster,
      playerLookup: lookup,
      plays: this.plays, drives: this.drives,
      stats: this.stats,
      winner: this.score.home > this.score.away ? "home" : this.score.away > this.score.home ? "away" : "tie",
    };
  }
}

// ─── Field rendering ───────────────────────────────────────────────────────
const FIELD = {
  W: 1000, H: 420,
  EZ_PX: 60,        // pixels for each end zone
  PX_PER_YARD: 8.8, // playable field width (100 yd × 8.8 = 880px)
  TOP: 30,
  BOT: 390,
};

// Convert yard line + possession to absolute X (0=home goal, 100=away goal)
function yardToAbsX(yardLine, poss) {
  // When home has ball: yardLine 0 = home's own goal (left); yardLine 100 = away goal (right)
  // When away has ball: yardLine 0 = away's own goal (right); yardLine 100 = home goal (left)
  const absYard = poss === "home" ? yardLine : 100 - yardLine;
  return FIELD.EZ_PX + absYard * FIELD.PX_PER_YARD;
}
function absYardToX(absYard) {
  return FIELD.EZ_PX + absYard * FIELD.PX_PER_YARD;
}

function drawField(ctx, homeTeam, awayTeam, ctx_state) {
  const W = FIELD.W, H = FIELD.H;
  // grass bands
  ctx.fillStyle = "#1f6b34";
  ctx.fillRect(0, 0, W, H);
  // alternating mowed bands
  for (let i = 0; i < 10; i++) {
    ctx.fillStyle = i % 2 === 0 ? "#236d36" : "#1f6431";
    const x = FIELD.EZ_PX + i * 10 * FIELD.PX_PER_YARD;
    ctx.fillRect(x, FIELD.TOP, 10 * FIELD.PX_PER_YARD, FIELD.BOT - FIELD.TOP);
  }
  // end zones (team colors)
  ctx.fillStyle = homeTeam.primary;
  ctx.fillRect(0, FIELD.TOP, FIELD.EZ_PX, FIELD.BOT - FIELD.TOP);
  ctx.fillStyle = awayTeam.primary;
  ctx.fillRect(W - FIELD.EZ_PX, FIELD.TOP, FIELD.EZ_PX, FIELD.BOT - FIELD.TOP);

  // End zone team text
  ctx.save();
  ctx.font = "bold 18px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.translate(FIELD.EZ_PX / 2, (FIELD.TOP + FIELD.BOT) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(homeTeam.name.toUpperCase(), 0, 0);
  ctx.restore();
  ctx.save();
  ctx.translate(W - FIELD.EZ_PX / 2, (FIELD.TOP + FIELD.BOT) / 2);
  ctx.rotate(Math.PI / 2);
  ctx.font = "bold 18px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(awayTeam.name.toUpperCase(), 0, 0);
  ctx.restore();

  // sidelines
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, FIELD.TOP); ctx.lineTo(W, FIELD.TOP);
  ctx.moveTo(0, FIELD.BOT); ctx.lineTo(W, FIELD.BOT);
  ctx.stroke();

  // yard lines (every 5 thin, every 10 thick + numbers)
  for (let yd = 0; yd <= 100; yd += 5) {
    const x = absYardToX(yd);
    const isMajor = yd % 10 === 0;
    ctx.strokeStyle = isMajor ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.4)";
    ctx.lineWidth = isMajor ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP);
    ctx.lineTo(x, FIELD.BOT);
    ctx.stroke();
  }

  // Yard numbers (10, 20, 30, 40, 50, 40, 30, 20, 10)
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.font = "bold 18px sans-serif";
  ctx.textAlign = "center";
  for (let yd = 10; yd <= 90; yd += 10) {
    const x = absYardToX(yd);
    const num = yd <= 50 ? yd : 100 - yd;
    ctx.fillText(num, x, FIELD.TOP + 30);
    ctx.fillText(num, x, FIELD.BOT - 14);
  }

  // Hash marks (small ticks every yard)
  ctx.strokeStyle = "rgba(255,255,255,0.55)";
  ctx.lineWidth = 1;
  for (let yd = 1; yd <= 99; yd++) {
    if (yd % 5 === 0) continue;
    const x = absYardToX(yd);
    // top hash
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP + 75);
    ctx.lineTo(x, FIELD.TOP + 80);
    ctx.stroke();
    // bottom hash
    ctx.beginPath();
    ctx.moveTo(x, FIELD.BOT - 80);
    ctx.lineTo(x, FIELD.BOT - 75);
    ctx.stroke();
    // sideline ticks
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP); ctx.lineTo(x, FIELD.TOP + 6);
    ctx.moveTo(x, FIELD.BOT); ctx.lineTo(x, FIELD.BOT - 6);
    ctx.stroke();
  }

  // 50 yard line midfield logo
  ctx.fillStyle = "rgba(200,169,0,0.18)";
  ctx.beginPath();
  ctx.arc(absYardToX(50), (FIELD.TOP + FIELD.BOT) / 2, 32, 0, Math.PI * 2);
  ctx.fill();

  // LOS and first down marker
  if (ctx_state) {
    const { los, firstDownAbs, possColor } = ctx_state;
    if (los != null) {
      ctx.strokeStyle = possColor || "#4b9bd5";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(los, FIELD.TOP); ctx.lineTo(los, FIELD.BOT);
      ctx.stroke();
    }
    if (firstDownAbs != null) {
      ctx.strokeStyle = "#f0cc30";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(firstDownAbs, FIELD.TOP); ctx.lineTo(firstDownAbs, FIELD.BOT);
      ctx.stroke();
    }
  }

  // Goal line posts indicator
  ctx.strokeStyle = "#f0cc30";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(FIELD.EZ_PX, FIELD.TOP); ctx.lineTo(FIELD.EZ_PX, FIELD.BOT);
  ctx.moveTo(W - FIELD.EZ_PX, FIELD.TOP); ctx.lineTo(W - FIELD.EZ_PX, FIELD.BOT);
  ctx.stroke();
}

// Stick-figure player: head (circle) + torso + 2 arms + 2 legs as articulated
// lines. `pose` drives limb angles; `t` is an animation phase 0..1 for run cycles.
// Backwards compatible — old calls without pose render as idle.
function drawPlayer(ctx, x, y, color, secondary, label, pose, t, facing) {
  pose = pose || "idle";
  t = t || 0;
  facing = facing || 1;
  const headR = 5;
  const torsoLen = 8;
  const armLen = 7;
  const legLen = 8;
  const runPhase = Math.sin(t * Math.PI * 2);
  // Limb angles. 0 rad = pointing DOWN. Positive = swings FORWARD (in facing dir).
  let lArm = 0, rArm = 0, lLeg = 0, rLeg = 0;
  let bodyRot = 0;
  let armReachY = 0;  // additional Y offset on hands for "reach" pose
  switch (pose) {
    case "idle":     break;
    case "run":
      lArm = runPhase * 0.95;  rArm = -runPhase * 0.95;
      lLeg = -runPhase * 0.7;  rLeg = runPhase * 0.7;
      break;
    case "throw":
      // Cocked back then release: t goes 0→1 over the throw
      lArm = -2.2 + t * 1.5;   // wind up then forward
      rArm = -0.8;
      lLeg = 0.3;              // back leg planted
      rLeg = -0.4;             // front leg up
      break;
    case "reach":  case "catch":
      lArm = -2.4;             // both arms reaching up
      rArm = -2.4;
      armReachY = -3;          // hands a touch higher
      break;
    case "celebrate":
      lArm = -2.3;             // V shape
      rArm = 2.3;
      lLeg = -0.15; rLeg = 0.15;
      break;
    case "juke":
      bodyRot = facing * 0.35;
      lArm = 0.4;  rArm = -0.4;
      lLeg = -0.7; rLeg = 0.3;
      break;
    case "spin":
      bodyRot = t * Math.PI * 2;
      lArm = 1.2;  rArm = -1.2;
      lLeg = -runPhase * 0.4; rLeg = runPhase * 0.4;
      break;
    case "tackled":
      bodyRot = -Math.PI / 2 * facing;
      lArm = -1.1; rArm = 1.1;
      lLeg = -0.6; rLeg = 0.6;
      break;
    case "stiff":
      lArm = Math.PI / 2;  // arm out front horizontal
      rArm = 0.4;
      lLeg = runPhase * 0.3; rLeg = -runPhase * 0.3;
      break;
    case "block":
      lArm = -0.5; rArm = 0.5;  // hands up
      lLeg = 0.1;  rLeg = -0.1;
      break;
  }
  ctx.save();
  ctx.translate(x, y);
  if (bodyRot !== 0) ctx.rotate(bodyRot);
  ctx.lineCap = "round";
  // Drop shadow under feet
  ctx.fillStyle = "rgba(0,0,0,0.32)";
  ctx.beginPath();
  ctx.ellipse(0, headR + torsoLen + legLen - 2, 7, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Torso line
  const shoulderY = -headR + 1;
  const hipY = shoulderY + torsoLen;
  ctx.strokeStyle = secondary || "#ffffff";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(0, shoulderY);
  ctx.lineTo(0, hipY);
  ctx.stroke();
  // Arms (rendered as facing-aware: positive angle = forward in facing direction)
  ctx.lineWidth = 2.2;
  // Left arm
  {
    const a = lArm * facing;
    const hx = Math.sin(a) * armLen;
    const hy = Math.cos(a) * armLen + armReachY;
    ctx.beginPath();
    ctx.moveTo(-2, shoulderY);
    ctx.lineTo(-2 + hx, shoulderY + hy);
    ctx.stroke();
  }
  // Right arm
  {
    const a = rArm * facing;
    const hx = Math.sin(a) * armLen;
    const hy = Math.cos(a) * armLen + armReachY;
    ctx.beginPath();
    ctx.moveTo(2, shoulderY);
    ctx.lineTo(2 + hx, shoulderY + hy);
    ctx.stroke();
  }
  // Legs
  ctx.lineWidth = 2.6;
  {
    const a = lLeg * facing;
    ctx.beginPath();
    ctx.moveTo(-1.5, hipY);
    ctx.lineTo(-1.5 + Math.sin(a) * legLen, hipY + Math.cos(a) * legLen);
    ctx.stroke();
  }
  {
    const a = rLeg * facing;
    ctx.beginPath();
    ctx.moveTo(1.5, hipY);
    ctx.lineTo(1.5 + Math.sin(a) * legLen, hipY + Math.cos(a) * legLen);
    ctx.stroke();
  }
  // Head (filled circle, primary color)
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(0, -headR, headR + 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = secondary || "#ffffff";
  ctx.lineWidth = 1.8;
  ctx.stroke();
  // Facemask line — short horizontal stripe on the head
  ctx.strokeStyle = "#1a1a22";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-3 * facing, -headR);
  ctx.lineTo(3 * facing, -headR);
  ctx.stroke();
  if (label) {
    ctx.fillStyle = "#fff";
    ctx.font = "bold 7px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label, 0, -headR);
  }
  ctx.restore();
}

// Goalpost (Y-shape, tall yellow uprights) at (cx, cy) — used in tactical view
function drawGoalposts(ctx, cx, cy) {
  const POST_HALF = 40;     // distance from center to each upright
  const POST_TOP  = FIELD.TOP - 4;
  const POST_BOT  = cy + 22;
  ctx.save();
  ctx.strokeStyle = "#ffe048";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  // Crossbar
  ctx.beginPath();
  ctx.moveTo(cx - POST_HALF, cy);
  ctx.lineTo(cx + POST_HALF, cy);
  ctx.stroke();
  // Uprights
  ctx.beginPath();
  ctx.moveTo(cx - POST_HALF, cy);
  ctx.lineTo(cx - POST_HALF, POST_TOP);
  ctx.moveTo(cx + POST_HALF, cy);
  ctx.lineTo(cx + POST_HALF, POST_TOP);
  ctx.stroke();
  // Center support down to ground
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx, POST_BOT);
  ctx.stroke();
  // Base
  ctx.fillStyle = "#ffe048";
  ctx.beginPath();
  ctx.ellipse(cx, POST_BOT, 6, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBall(ctx, x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = "#6b3416";
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-3, 0); ctx.lineTo(3, 0);
  for (let i = -2; i <= 2; i++) { ctx.moveTo(i, -1.2); ctx.lineTo(i, 1.2); }
  ctx.stroke();
  ctx.restore();
}

// ─── Formation & animation ────────────────────────────────────────────────
// Generate 11 offensive + 11 defensive player positions for a given LOS (abs X)
// poss = "home" | "away" → home offense moves left→right, away moves right→left
function makeFormation(losX, poss) {
  const dir = poss === "home" ? 1 : -1;  // direction offense moves (positive = right)
  const cy = (FIELD.TOP + FIELD.BOT) / 2;
  const PX = FIELD.PX_PER_YARD;

  // Offensive line (5) along LOS
  const oline = [];
  for (let i = -2; i <= 2; i++) {
    oline.push({ x: losX - dir * 2, y: cy + i * 14, role: "OL" });
  }
  // TE just outside RT
  const te = { x: losX - dir * 2, y: cy + 38, role: "TE" };
  // 2 WR split out wide
  const wr1 = { x: losX, y: cy - 75, role: "WR1" };
  const wr2 = { x: losX, y: cy + 75, role: "WR2" };
  // QB
  const qb = { x: losX - dir * 6 * PX, y: cy, role: "QB" };
  // RB
  const rb = { x: losX - dir * 8 * PX, y: cy + 18, role: "RB" };

  // Defensive line (4)
  const dline = [];
  for (let i = -1.5; i <= 1.5; i += 1) {
    dline.push({ x: losX + dir * 1.5 * PX, y: cy + i * 18, role: "DL" });
  }
  // 3 LBs
  const lbs = [
    { x: losX + dir * 4 * PX, y: cy - 24, role: "LB" },
    { x: losX + dir * 4 * PX, y: cy,      role: "LB" },
    { x: losX + dir * 4 * PX, y: cy + 24, role: "LB" },
  ];
  // 2 CBs covering WRs
  const cb1 = { x: losX + dir * 7 * PX, y: cy - 75, role: "CB" };
  const cb2 = { x: losX + dir * 7 * PX, y: cy + 75, role: "CB" };
  // 2 Safeties deep
  const s1 = { x: losX + dir * 14 * PX, y: cy - 30, role: "S" };
  const s2 = { x: losX + dir * 14 * PX, y: cy + 30, role: "S" };

  return {
    offense: [...oline, te, wr1, wr2, qb, rb],
    defense: [...dline, ...lbs, cb1, cb2, s1, s2],
    qb, rb, wr1, wr2, te, dline, lbs, cb1, cb2, s1, s2,
  };
}

// Easing functions
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeInOutCubic = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;

// ─── UI / playback ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const homeSel  = $("homeTeam"), awaySel  = $("awayTeam");
const simBtn   = $("simBtn"),   playBtn  = $("playBtn");
const pauseBtn = $("pauseBtn"), endBtn   = $("endBtn");
const speedSlider = $("speedSlider"), speedLabel = $("speedLabel");
const gameArea = $("gameArea");

let gameResult = null, playHead = 0, playing = false;

// ─── Player hover tooltip ─────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function nameSpan(name) {
  if (!name) return "";
  const safe = escapeHtml(name);
  return `<span class="player-name" data-player="${safe}">${safe}</span>`;
}
function playerTier(ovr) {
  if (ovr >= 85) return "elite";
  if (ovr >= 75) return "good";
  if (ovr >= 60) return "average";
  return "poor";
}
function buildPlayerTooltip(p) {
  const [spd, str, agi, awr, thr, cat, blk, prs, cov, tck, kpw] = p.stats;
  const keys = {
    QB: [["SPD",spd],["AGI",agi],["AWR",awr],["THR",thr]],
    RB: [["SPD",spd],["STR",str],["AGI",agi],["CAT",cat]],
    WR: [["SPD",spd],["AGI",agi],["CAT",cat],["AWR",awr]],
    TE: [["CAT",cat],["BLK",blk],["STR",str],["SPD",spd]],
    OL: [["STR",str],["BLK",blk],["AGI",agi],["AWR",awr]],
    DL: [["STR",str],["PRS",prs],["SPD",spd],["TCK",tck]],
    LB: [["PRS",prs],["COV",cov],["TCK",tck],["SPD",spd]],
    CB: [["SPD",spd],["AGI",agi],["COV",cov],["AWR",awr]],
    S:  [["SPD",spd],["COV",cov],["TCK",tck],["AWR",awr]],
    K:  [["KPW",kpw],["AWR",awr]],
  }[p.position] || [];
  const tier = playerTier(p.overall);
  const teamLabel = p.team === "home"
    ? (gameResult ? gameResult.homeTeam.name : "")
    : (gameResult ? gameResult.awayTeam.name : "");

// Absolute index of (pos, idx) within a roster array.
function rosterSlotAbs(pos, idx) {
  let abs = 0;
  for (const [p, count] of Object.entries(ROSTER_SLOTS)) {
    if (p === pos) return idx < count ? abs + idx : -1;
    abs += count;
  }

}
function defaultTierFor(pos, idx, playbook) {

function tierClassFor(ovr) {

  return "poor";

function regenerateFullRoster(team, overrides, blockNames = null) {
  const pb = getPlaybook(team);

  for (const [key, tier] of Object.entries(overrides)) {
    const [pos, idxStr] = key.split(":");
    const abs = rosterSlotAbs(pos, +idxStr);
    if (abs >= 0) {
      // Block all CURRENT names in this roster (except the slot being replaced) + cross-team
      const block = new Set([
        ...r.filter((_, i) => i !== abs).map(p => p.name),

      r[abs] = genUniquePlayer(pos, tier, block);

  else delete state.overrides[key];
  const team = getTeam(state.id);
  const pb = getPlaybook(team);
  const tier = state.overrides[key] || defaultTierFor(pos, idx, pb);
  const abs = rosterSlotAbs(pos, idx);
  if (abs >= 0) {
    // Avoid name collisions with the rest of the roster + the other team
    const block = new Set([
      ...state.roster.filter((_, i) => i !== abs).map(p => p.name),

function renderDepthChart(side) {

      // Archetype mini-tag (DL/OL only)
      const archTag = p.archetype

      html += `<div class="depth-row${isBoosted ? " boosted" : ""}">

// ─── Sim Many — run N games and aggregate ─────────────────────────────────
function runManyGames(home, away, hRoster, aRoster, n) {
  const agg = {
    n,
    homeWins: 0, awayWins: 0, ties: 0,
    homeScoreSum: 0, awayScoreSum: 0,
    homeScoreMax: 0, awayScoreMax: 0,
    biggestBlowout: { margin: 0, home: 0, away: 0 },
    closestGame: { margin: 999, home: 0, away: 0 },
    teamSums: {
      home: { totalYds: 0, passYds: 0, rushYds: 0, sacks: 0, sacks_allowed: 0, turnovers: 0, takeaways: 0, firstDowns: 0, pass_comp: 0, pass_att: 0, rush_att: 0 },
      away: { totalYds: 0, passYds: 0, rushYds: 0, sacks: 0, sacks_allowed: 0, turnovers: 0, takeaways: 0, firstDowns: 0, pass_comp: 0, pass_att: 0, rush_att: 0 },
    },
    qbSums: { home: { yds: 0, td: 0, int: 0 }, away: { yds: 0, td: 0, int: 0 } },
    rbSums: { home: { yds: 0, td: 0 }, away: { yds: 0, td: 0 } },
    wrSums: { home: { yds: 0, td: 0 }, away: { yds: 0, td: 0 } },
  };
  for (let i = 0; i < n; i++) {
    const sim = new GameSimulator(home, away, hRoster, aRoster);
    const r = sim.simulate();
    const hs = r.homeScore, as = r.awayScore;
    if (hs > as) agg.homeWins++;
    else if (as > hs) agg.awayWins++;
    else agg.ties++;
    agg.homeScoreSum += hs;
    agg.awayScoreSum += as;
    if (hs > agg.homeScoreMax) agg.homeScoreMax = hs;
    if (as > agg.awayScoreMax) agg.awayScoreMax = as;
    const margin = Math.abs(hs - as);
    if (margin > agg.biggestBlowout.margin) {
      agg.biggestBlowout = { margin, home: hs, away: as };
    }
    if (margin < agg.closestGame.margin) {
      agg.closestGame = { margin, home: hs, away: as };
    }
    for (const side of ["home", "away"]) {
      const t = r.stats[side].team;
      const s = agg.teamSums[side];
      s.totalYds += t.totalYds; s.passYds += t.passYds; s.rushYds += t.rushYds;
      s.sacks += t.sacks; s.sacks_allowed += t.sacks_allowed;
      s.turnovers += t.turnovers; s.takeaways += t.takeaways;
      s.firstDowns += t.firstDowns;
      s.pass_comp += t.pass_comp; s.pass_att += t.pass_att; s.rush_att += t.rush_att;
      // Top-line player aggregates (top QB / RB / WR by yds)
      const players = Object.values(r.stats[side].players);
      const topQB = players.filter(p => p.pos === "QB").sort((a, b) => b.pass_yds - a.pass_yds)[0];
      const topRB = players.filter(p => p.rush_att > 0).sort((a, b) => b.rush_yds - a.rush_yds)[0];
      const topWR = players.filter(p => p.rec_tgt > 0).sort((a, b) => b.rec_yds - a.rec_yds)[0];
      if (topQB) { agg.qbSums[side].yds += topQB.pass_yds; agg.qbSums[side].td += topQB.pass_td; agg.qbSums[side].int += topQB.pass_int; }
      if (topRB) { agg.rbSums[side].yds += topRB.rush_yds; agg.rbSums[side].td += topRB.rush_td; }
      if (topWR) { agg.wrSums[side].yds += topWR.rec_yds; agg.wrSums[side].td += topWR.rec_td; }
    }
  }
  return agg;
}

function renderSimManyResults(agg, home, away) {

  const html = `
    <div class="sm-title">${home.emoji} ${home.city} ${home.name} <span style="color:var(--gray);font-size:.85rem">vs</span> ${away.emoji} ${away.city} ${away.name}</div>

        <div class="sm-team-wins">${agg.homeWins} wins · ${avg(agg.homeScoreSum)} avg pts</div>
      </div>
      <div class="sm-vs">— vs —<br><span style="font-size:.7rem;color:var(--gray)">${tiePct}% ties</span></div>
      <div class="sm-team-block ${!isHomeWinner ? "winner" : ""}">
        <div class="sm-team-name">${away.name}</div>
        <div class="sm-team-pct">${awayWinPct}%</div>
        <div class="sm-team-wins">${agg.awayWins} wins · ${avg(agg.awayScoreSum)} avg pts</div>
      </div>
    </div>

    <div class="sm-section">
      <h4>Notable games</h4>
      <div style="font-size:.78rem;color:var(--gray);line-height:1.6">
        <div>Biggest blowout: <span style="color:var(--white)">${home.name} ${agg.biggestBlowout.home} — ${away.name} ${agg.biggestBlowout.away}</span> (margin ${agg.biggestBlowout.margin})</div>
        <div>Closest result: <span style="color:var(--white)">${home.name} ${agg.closestGame.home} — ${away.name} ${agg.closestGame.away}</span> (margin ${agg.closestGame.margin})</div>
        <div>Highest score: <span style="color:var(--white)">${home.name} ${agg.homeScoreMax} | ${away.name} ${agg.awayScoreMax}</span></div>
      </div>
    </div>

    <div class="sm-section">
      <h4>Team averages per game</h4>
      <table class="sm-stats-table">
        ${row("TOTAL YDS",     avg(agg.teamSums.home.totalYds),     avg(agg.teamSums.away.totalYds))}
        ${row("PASS YDS",      avg(agg.teamSums.home.passYds),      avg(agg.teamSums.away.passYds))}
        ${row("RUSH YDS",      avg(agg.teamSums.home.rushYds),      avg(agg.teamSums.away.rushYds))}
        ${row("FIRST DOWNS",   avg(agg.teamSums.home.firstDowns),   avg(agg.teamSums.away.firstDowns))}
        ${row("COMP %",        compPct(agg.teamSums.home),          compPct(agg.teamSums.away), v => v)}
        ${row("YPC",           ypc(agg.teamSums.home),              ypc(agg.teamSums.away), v => v)}
        ${row("SACKS",         avg(agg.teamSums.home.sacks),        avg(agg.teamSums.away.sacks))}
        ${row("SACKS ALLOWED", avg(agg.teamSums.home.sacks_allowed), avg(agg.teamSums.away.sacks_allowed))}
        ${row("TURNOVERS",     avg(agg.teamSums.home.turnovers),    avg(agg.teamSums.away.turnovers))}
        ${row("TAKEAWAYS",     avg(agg.teamSums.home.takeaways),    avg(agg.teamSums.away.takeaways))}
      </table>
    </div>

    <div class="sm-section">
      <h4>Top players (averaged per game)</h4>
      <table class="sm-stats-table">
        ${row("QB YDS",  avg(agg.qbSums.home.yds),  avg(agg.qbSums.away.yds))}
        ${row("QB TD",   avg(agg.qbSums.home.td),   avg(agg.qbSums.away.td))}
        ${row("QB INT",  avg(agg.qbSums.home.int),  avg(agg.qbSums.away.int))}
        ${row("RB YDS",  avg(agg.rbSums.home.yds),  avg(agg.rbSums.away.yds))}
        ${row("RB TD",   avg(agg.rbSums.home.td),   avg(agg.rbSums.away.td))}
        ${row("WR YDS",  avg(agg.wrSums.home.yds),  avg(agg.wrSums.away.yds))}
        ${row("WR TD",   avg(agg.wrSums.home.td),   avg(agg.wrSums.away.td))}
      </table>
    </div>
  `;
  $("simManyBody").innerHTML = html;
  $("simManyModal").style.display = "flex";
}

playBtn.addEventListener("click", () => {
  if (!playing) {
    playing = true;
    if (!animState) {
      startNextPlay();
    } else {
      // Resume mid-play: shift timers so we pick up where we left off.
      const now = performance.now();
      if (animState.elapsedOnPause != null) {
        animState.startTime = now - animState.elapsedOnPause;
        animState.elapsedOnPause = null;
      }
      if (animState.holdElapsedOnPause != null) {
        animState.holdStart = now - animState.holdElapsedOnPause;
        animState.holdElapsedOnPause = null;
      }
      rafId = requestAnimationFrame(tick);
    }
    updateButtons();
  }
});
pauseBtn.addEventListener("click", () => {
  playing = false;
  cancelAnimationFrame(rafId);
  if (animState) {
    const now = performance.now();
    animState.elapsedOnPause = now - animState.startTime;
    if (animState.holdStart != null) animState.holdElapsedOnPause = now - animState.holdStart;
  }
  updateButtons();
});
endBtn.addEventListener("click", () => {
  playing = false;
  cancelAnimationFrame(rafId);
  playHead = gameResult.plays.length;
  animState = null;
  renderStaticEnd();
  updateButtons();
});

function updateButtons() {
  const done = !gameResult || playHead >= gameResult.plays.length;
  playBtn.disabled  = !gameResult || playing || done;
  pauseBtn.disabled = !gameResult || !playing;
  endBtn.disabled   = !gameResult || done;
}

  // Wire box score tabs

  // Initial field draw

  if (viewMode === "cinema") {

  }
}

// ─── Per-play animation engine ─────────────────────────────────────────────
function buildAnimForPlay(play, prevPlay) {
  // Returns { duration, render(t01) }
  // t01 = 0..1 progress
  const homeTeam = gameResult.homeTeam, awayTeam = gameResult.awayTeam;

  if (["halftime", "ot", "quarter"].includes(play.kind)) {
    return { duration: 1200, kind: play.kind, render: (t, ctx) => {
      drawField(ctx, homeTeam, awayTeam, null);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, FIELD.W, FIELD.H);
      ctx.fillStyle = "#f0cc30";
      ctx.font = "bold 42px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(play.desc, FIELD.W / 2, FIELD.H / 2);
    }};
  }

  if (play.kind === "kickoff") {
    return { duration: 1800, kind: "kickoff", render: (t, ctx) => {
      // Ball arcs from kicking 35 (away starts game = away's 35) to receiving 25
      drawField(ctx, homeTeam, awayTeam, null);
      const startX = absYardToX(65); // away 35 = abs 65 (since away end on right)
      const endX = absYardToX(25);   // home gets ball at home 25
      const cy = (FIELD.TOP + FIELD.BOT) / 2;
      const x = startX + (endX - startX) * t;
      const arc = Math.sin(t * Math.PI) * 130;
      const y = cy - arc;
      // formation for kickoff (lined up across)
      drawKickoffFormation(ctx, homeTeam, awayTeam);
      drawBall(ctx, x, y, 1 + Math.sin(t * Math.PI) * 0.3);
    }};
  }

  if (!play.startYard && play.startYard !== 0) {
    // Score-only play (extra point, etc.) - just hold
    return { duration: 600, kind: play.kind, render: (t, ctx) => {
      drawField(ctx, homeTeam, awayTeam, null);
    }};
  }

  const poss = play.poss;
  const dir = poss === "home" ? 1 : -1; // offense moves direction
  const losX = yardToAbsX(play.startYard, poss);
  const cy = (FIELD.TOP + FIELD.BOT) / 2;
  const formation = makeFormation(losX, poss);
  const team = poss === "home" ? homeTeam : awayTeam;
  const oppTeam = poss === "home" ? awayTeam : homeTeam;
  const possColor = team.primary;
  const oppColor = oppTeam.primary;

  // First down marker abs X
  let firstDownAbs = null;
  if (play.down > 0) {
    const fdYard = clamp(play.startYard + play.ytg, 0, 100);
    firstDownAbs = yardToAbsX(fdYard, poss);
  }

  const fieldState = { los: losX, firstDownAbs, possColor };

  function drawPlayers(off, def) {
    for (const p of off) drawPlayer(ctx, p.x, p.y, possColor, team.secondary, p.label, p.pose, p.t, p.facing ?? (dir));
    for (const p of def) drawPlayer(ctx, p.x, p.y, oppColor, oppTeam.secondary, p.label, p.pose, p.t, p.facing ?? (-dir));
  }

  let ctx = null;

  // Common: pre-snap freeze (10% of duration), then action
  const PRE = 0.18;

  if (play.kind === "run") {
    const endX = yardToAbsX(play.endYard, poss);
    const yards = play.yards ?? 0;
    const isTD = (play.endYard ?? 0) >= 100;
    return { duration: 1500, kind: "run", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      const rb = { ...formation.rb };
      const qb = { ...formation.qb };
      const runT = t < PRE ? 0 : (t - PRE) / (1 - PRE);
      let ballX, ballY = cy + (t < PRE ? 18 : (1 - runT) * 18);
      if (t < PRE) {
        ballX = formation.qb.x;
      } else {
        ballX = qb.x + (endX - qb.x) * easeOutCubic(runT);
        rb.x = qb.x + (endX - qb.x) * easeOutCubic(runT);
        rb.y = cy + (1 - runT) * 18;
      }
      // Carrier pose — juke briefly if there's a move scheduled around now
      let rbPose = t < PRE ? "idle" : "run";
      let rbT = (t * 3) % 1;  // run cycle 3× the play
      if (runT > 0.88 && yards < 90 && !isTD) rbPose = "tackled";
      else if (runT > 0.30 && runT < 0.42 && yards >= 6) { rbPose = "juke"; }
      else if (runT > 0.50 && runT < 0.62 && yards >= 8) { rbPose = "stiff"; }
      rb.pose = rbPose; rb.t = rbT; rb.facing = dir;
      // Defenders converge slightly
      const def = formation.defense.map((d, i) => {
        const dd = { ...d };
        if (t >= PRE) {
          const tt = runT;
          const tx = endX + dir * (8 + (i % 3) * 4);
          const ty = cy + ((i % 5) - 2) * 14;
          dd.x = d.x + (tx - d.x) * tt * 0.6;
          dd.y = d.y + (ty - d.y) * tt * 0.6;
          dd.pose = "run";
          dd.t = (t * 3 + i * 0.13) % 1;
          dd.facing = -dir;
          if (tt > 0.92 && yards < 90) dd.pose = "tackled";
        } else { dd.pose = "idle"; }
        return dd;
      });
      // OL drives forward into contact, TE seals edge, WRs release downfield
      const off = formation.offense.filter(p => p.role !== "RB").map(p => {
        if (t < PRE) return { ...p, pose: "idle" };
        const tt = runT;
        if (p.role === "OL") {
          const slot = (p.y - cy) / 14;
          const wobble = Math.sin(tt * Math.PI * 5 + slot * 1.7) * 2.5;
          return { ...p, x: p.x + dir * tt * 28, y: p.y + wobble, pose: "block", t: tt, facing: dir };
        }
        if (p.role === "TE") {
          return { ...p, x: p.x + dir * tt * 18, pose: "run", t: (t * 3) % 1, facing: dir };
        }
        return { ...p, x: p.x + dir * tt * 12, pose: "run", t: (t * 3 + 0.5) % 1, facing: dir };
      });
      // QB gets idle (hand-off)
      const off2 = off.map(p => p.role === "QB" ? { ...p, pose: "idle" } : p);
      drawPlayers([...off2, rb], def);
      drawBall(ctx, ballX, ballY);
    }};
  }

  if (play.kind === "complete" || play.kind === "incomplete" || play.kind === "int") {
    const catchDepth = play.catchDepth ?? play.targetDepth ?? 10;
    const targetX = losX + dir * catchDepth * FIELD.PX_PER_YARD;
    // Pick receiver lane deterministically per play
    const wrRoll = ((play.startYard * 13 + (play.time||0)) >>> 0) % 100 / 100;
    const wrChoice = wrRoll < 0.45 ? "wr1" : wrRoll < 0.78 ? "wr2" : wrRoll < 0.92 ? "te" : "rb";
    // Lateral Y where the catch happens — based on receiver lane
    const targetY = wrChoice === "wr1" ? cy - 70
                  : wrChoice === "wr2" ? cy + 65
                  : wrChoice === "te"  ? cy + 28
                  :                       cy - 10;
    const isComplete = play.kind === "complete";
    const endX = isComplete ? yardToAbsX(play.endYard, poss) : targetX;
    const yac = isComplete ? (play.yac ?? Math.max(0, (play.yards ?? 0) - catchDepth)) : 0;
    // Final Y where YAC ends — receiver may drift back toward middle if running upfield
    const finalY = targetY + (cy - targetY) * Math.min(0.5, yac / 40);
    return { duration: 1700, kind: play.kind, render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      const dropPhase = 0.30;     // QB drops back
      const throwPhase = 0.60;    // ball in air
      const qb = { ...formation.qb };
      let ballX, ballY = cy;
      let arc = 0;

      const dropAmt = t < dropPhase ? (t / dropPhase) * 5 * FIELD.PX_PER_YARD : 5 * FIELD.PX_PER_YARD;
      qb.x -= dir * dropAmt;

      // Receiver runs route — fully reaches catch point by throwPhase
      const wrBase = wrChoice === "wr1" ? formation.wr1
                   : wrChoice === "wr2" ? formation.wr2
                   : wrChoice === "te"  ? formation.te
                   :                       formation.rb;
      const wr = { ...wrBase };
      // Route progression: linear 0 → 1 from t=0.05 to t=throwPhase
      const routeT = Math.min(1, Math.max(0, (t - 0.05) / (throwPhase - 0.05)));
      const wrPathX0 = wrBase.x;
      const wrPathY0 = wrBase.y;
      wr.x = wrPathX0 + (targetX - wrPathX0) * routeT;
      wr.y = wrPathY0 + (targetY - wrPathY0) * routeT;

      if (t < dropPhase) {
        ballX = qb.x; ballY = cy;
      } else if (t < throwPhase) {
        const tt = (t - dropPhase) / (throwPhase - dropPhase);
        ballX = qb.x + (targetX - qb.x) * tt;
        arc = Math.sin(tt * Math.PI) * 60;
        ballY = cy + (targetY - cy) * tt - arc;
      } else {
        const tt = (t - throwPhase) / (1 - throwPhase);
        if (play.kind === "complete") {
          // After catch: ball + receiver travel together to (endX, finalY)
          ballX = targetX + (endX - targetX) * easeOutCubic(tt);
          ballY = targetY + (finalY - targetY) * easeOutCubic(tt);
          // Receiver carries the ball — keep them locked together
          wr.x = ballX;
          wr.y = ballY;
        } else if (play.kind === "incomplete") {
          // Ball drops to ground near target
          ballX = targetX;
          ballY = targetY + tt * 25;
        } else {
          // INT — ball goes the other way; the receiver "stops" at the catch point
          const retEndX = losX - dir * 10 * FIELD.PX_PER_YARD;
          ballX = targetX + (retEndX - targetX) * easeOutCubic(tt);
          ballY = targetY + ((cy + 30) - targetY) * tt;
          wr.x = targetX; wr.y = targetY;
        }
      }

      // Defense: rush + DBs cover (and one closes on the ball-carrier post-catch)
      const def = formation.defense.map((d, i) => {
        const dd = { ...d };
        dd.t = (t * 3 + i * 0.13) % 1;
        dd.facing = -dir;
        dd.pose = "run";
        if (i < 4 && t > 0.1 && t < throwPhase + 0.05) {
          const tt = Math.min(1, (t - 0.1) / 0.4);
          dd.x = dd.x + (qb.x - dd.x) * tt * 0.7;
          dd.y = dd.y + (qb.y - dd.y) * tt * 0.5;
        } else if (i >= 7 && t > 0.05) {
          const tt = Math.min(1, (t - 0.05) / 0.55);
          if (i === 7) { dd.x += dir * tt * (catchDepth) * FIELD.PX_PER_YARD * 0.85; }
          if (i === 8) { dd.x += dir * tt * (catchDepth) * FIELD.PX_PER_YARD * 0.85; }
        }
        if (play.kind === "complete" && t > throwPhase) {
          const tt = (t - throwPhase) / (1 - throwPhase);
          if (i === 7 || i === 8 || i === 4 || i === 5) {
            dd.x = dd.x + (ballX - dd.x) * Math.min(1, tt * 1.2) * 0.8;
            dd.y = dd.y + (ballY - dd.y) * Math.min(1, tt * 1.2) * 0.7;
          }
        }
        if (t < 0.05) dd.pose = "idle";
        return dd;
      });

      // Offense: QB drops, WRs run routes, OL drops into pass-block pocket
      const isThrowing = t > dropPhase - 0.02 && t < dropPhase + 0.10;
      const qbWithPose = { ...qb, pose: isThrowing ? "throw" : (t < dropPhase ? "run" : "idle"), t: (t - dropPhase + 0.5) % 1, facing: dir };
      // Target receiver pose — reach during the catch window
      const isCatching = t > throwPhase - 0.05 && t < throwPhase + 0.10;
      const wrWithPose = { ...wr, pose: play.kind === "int"  && t > throwPhase + 0.02 ? "tackled"
                                  : isCatching ? "reach"
                                  : t > throwPhase + 0.08 ? "run"
                                  : "run", t: (t * 3) % 1, facing: dir };
      const off = formation.offense.map(p => {
        if (p.role === "QB") return qbWithPose;
        if (p === formation.wr1 && wrChoice === "wr1") return wrWithPose;
        if (p === formation.wr2 && wrChoice === "wr2") return wrWithPose;
        if (p === formation.te && wrChoice === "te") return wrWithPose;
        if (p === formation.rb && wrChoice === "rb") return wrWithPose;
        if (p.role === "OL" && t > 0.05) {
          const tt = Math.min(1, (t - 0.05) / 0.55);
          const slotDepth = Math.abs((p.y - cy) / 14);
          const dropBack = (4 + slotDepth * 4) * tt;
          const wobble = Math.sin(tt * Math.PI * 6 + p.y * 0.05) * 1.8;
          return { ...p, x: p.x - dir * dropBack, y: p.y + wobble, pose: "block", facing: dir };
        }
        if ((p.role === "WR1" || p.role === "WR2" || p.role === "TE") && t > 0.05) {
          const tt = Math.min(1, (t - 0.05) / 0.6);
          return { ...p, x: p.x + dir * tt * 14, pose: "run", t: (t * 3) % 1, facing: dir };
        }
        return { ...p, pose: "idle", facing: dir };
      });
      drawPlayers(off, def);
      drawBall(ctx, ballX, ballY, arc > 30 ? 1.3 : 1);
    }};
  }

  if (play.kind === "sack") {
    const endX = yardToAbsX(play.endYard, poss);
    return { duration: 1400, kind: "sack", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      const qb = { ...formation.qb };
      // QB drops back, defenders chase
      if (t > PRE) {
        const tt = (t - PRE) / (1 - PRE);
        qb.x = formation.qb.x + (endX - formation.qb.x) * easeOutCubic(tt);
      }
      const def = formation.defense.map((d, i) => {
        const dd = { ...d, pose: t < PRE ? "idle" : "run", t: (t * 3 + i * 0.13) % 1, facing: -dir };
        if (i < 4 && t > PRE) {
          const tt = (t - PRE) / (1 - PRE);
          dd.x = d.x + (qb.x - d.x) * tt * 0.95;
          dd.y = d.y + (qb.y - d.y) * tt * 0.7;
          if (tt > 0.85) dd.pose = "tackled";
        }
        return dd;
      });
      const sackT = Math.max(0, (t - PRE) / (1 - PRE));
      const off = formation.offense.map(p => {
        if (p.role === "QB") return { ...qb, pose: sackT > 0.85 ? "tackled" : "run", t: (t * 3 + 0.4) % 1, facing: dir };
        if (p.role === "OL" && t > PRE) {
          const tt = sackT;
          const slotDepth = Math.abs((p.y - cy) / 14);
          return { ...p, x: p.x - dir * (10 + slotDepth * 5) * tt, y: p.y + Math.sin(tt * Math.PI * 4 + p.y) * 3, pose: "block", facing: dir };
        }
        return { ...p, pose: "idle", facing: dir };
      });
      drawPlayers(off, def);
      drawBall(ctx, qb.x, qb.y);
      // Burst at sack
      if (t > 0.85) {
        ctx.strokeStyle = "rgba(255,200,0,0.6)";
        ctx.lineWidth = 3;
        for (let a = 0; a < 6; a++) {
          const ang = (a / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(qb.x + Math.cos(ang) * 12, qb.y + Math.sin(ang) * 12);
          ctx.lineTo(qb.x + Math.cos(ang) * 22, qb.y + Math.sin(ang) * 22);
          ctx.stroke();
        }
      }
    }};
  }

  if (play.kind === "fumble") {
    return { duration: 1500, kind: "fumble", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      drawPlayers(formation.offense, formation.defense);
      // Ball wobbles and gets recovered
      const wobbleX = losX + dir * 18 + Math.sin(t * 18) * 12;
      const wobbleY = cy + Math.cos(t * 14) * 10;
      drawBall(ctx, wobbleX, wobbleY, 0.9 + Math.sin(t * 20) * 0.3);
      if (t > 0.6) {
        ctx.fillStyle = "rgba(255,80,80,0.55)";
        ctx.beginPath();
        ctx.arc(wobbleX, wobbleY, 30 - (t - 0.6) * 50, 0, Math.PI * 2);
        ctx.fill();
      }
    }};
  }

  if (play.kind === "fg_good" || play.kind === "fg_miss") {
    const isGood = play.kind === "fg_good";
    // Determine miss type deterministically per play
    const missRoll = ((play.startYard * 17 + (play.time || 0)) >>> 0) % 100 / 100;
    const missType = isGood ? "good" : (missRoll < 0.5 ? (missRoll < 0.25 ? "wide_l" : "wide_r") : "short");
    const HASH_HALF = 40; // half-distance between uprights in px
    return { duration: 2400, kind: play.kind, render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      // Goalpost at back of end zone
      const goalX = poss === "home" ? FIELD.W - FIELD.EZ_PX * 0.4 : FIELD.EZ_PX * 0.4;
      drawGoalposts(ctx, goalX, cy);
      drawPlayers(formation.offense, formation.defense);
      const startX = losX - dir * 7 * FIELD.PX_PER_YARD;
      const startY = cy;
      // Trajectory endpoint
      let goalY = cy;
      let goalArcMul = 1;
      if (missType === "wide_l") goalY = cy - HASH_HALF - 8;
      else if (missType === "wide_r") goalY = cy + HASH_HALF + 8;
      else if (missType === "short") { goalArcMul = 0.55; } // never reaches goalX
      let ballX, ballY, arc;
      if (t < 0.15) { ballX = startX; ballY = startY; arc = 0; }
      else {
        const tt = (t - 0.15) / 0.85;
        const reach = missType === "short" ? 0.78 : 1;
        ballX = startX + (goalX - startX) * tt * reach;
        ballY = startY + (goalY - startY) * tt;
        arc = Math.sin(tt * Math.PI) * 90 * goalArcMul;
      }
      drawBall(ctx, ballX, ballY - arc, 1 + (arc / 200));
      // Result banner at end
      if (t > 0.82) {
        const banT = Math.min(1, (t - 0.82) / 0.18);
        ctx.save();
        ctx.globalAlpha = banT;
        ctx.fillStyle = isGood ? "#f0cc30" : "#e07070";
        ctx.font = "900 44px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(isGood ? "IT'S GOOD!" : missType === "short" ? "SHORT!" : missType === "wide_l" ? "WIDE LEFT!" : "WIDE RIGHT!", FIELD.W / 2, 60);
        ctx.restore();
      }
    }};
  }

  if (play.kind === "punt") {
    const landYardAbs = play.landYard ?? play.endYard ?? play.startYard;
    const landX = yardToAbsX(landYardAbs, poss);
    const endX  = yardToAbsX(play.endYard ?? landYardAbs, poss);
    const returnerY = cy + (((play.startYard * 23 + (play.time || 0)) >>> 0) % 80) - 40;
    const returnYards = play.returnYards || 0;
    const isTouchback = !!play.isTouchback;
    const isFairCatch = !!play.isFairCatch;
    const isReturnTD  = !!play.isReturnTD;
    const dur = returnYards >= 20 ? 4000 : 3000;
    return { duration: dur, kind: "punt", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      const startX = losX - dir * 12 * FIELD.PX_PER_YARD;
      let ballX, ballY, arc = 0;
      let phase = "snap";
      if (t < 0.1) { ballX = losX; ballY = cy; phase = "snap"; }
      else if (t < 0.22) { ballX = losX + (startX - losX) * ((t - 0.1) / 0.12); ballY = cy; phase = "wind"; }
      else if (t < 0.62) {
        const tt = (t - 0.22) / 0.40;
        ballX = startX + (landX - startX) * tt;
        arc = Math.sin(tt * Math.PI) * 170;
        ballY = cy - arc + (returnerY - cy) * tt;
        phase = "air";
      } else if (t < 0.72) {
        ballX = landX; ballY = returnerY; phase = "field";
      } else {
        const tt = (t - 0.72) / 0.28;
        if (isTouchback || isFairCatch) {
          ballX = landX; ballY = returnerY;
        } else {
          ballX = landX + (endX - landX) * easeOutCubic(tt);
          ballY = returnerY + Math.sin(tt * 8) * 4;
        }
        phase = "return";
      }
      // Punter
      drawPlayer(ctx, startX, cy, possColor, team.secondary);
      // 3 coverage chasers — pursue returner during return phase
      for (let i = 0; i < 3; i++) {
        const chaserStartX = losX + dir * (i - 1) * 12;
        const target = phase === "return" ? ballX : landX;
        const chaserX = chaserStartX + (target - chaserStartX) * Math.min(1, t * 1.1);
        const chaserY = cy + (i - 1) * 22;
        drawPlayer(ctx, chaserX, chaserY, possColor, team.secondary);
      }
      // 2 blockers escorting the returner
      for (let i = 0; i < 2; i++) {
        const escortX = (phase === "return" ? ballX : landX) + dir * (12 + i * 10);
        const escortY = returnerY + (i === 0 ? -10 : 10);
        drawPlayer(ctx, escortX, escortY, oppColor, oppTeam.secondary);
      }
      // Returner (with ball after fielding)
      const returnerX = phase === "return" ? ballX : landX;
      drawPlayer(ctx, returnerX, returnerY, oppColor, oppTeam.secondary);
      drawBall(ctx, ballX, ballY, 1 + arc / 200);
      // Callouts
      if (phase === "field" || (phase === "return" && t < 0.78)) {
        ctx.save();
        ctx.fillStyle = isTouchback ? "#cccccc" : isFairCatch ? "#9bd0ff" : "#9be09b";
        ctx.font = "900 22px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(isTouchback ? "TOUCHBACK" : isFairCatch ? "FAIR CATCH" : "FIELDED!", landX, returnerY - 24);
        ctx.restore();
      }
      if (phase === "return" && returnYards >= 20 && t > 0.88) {
        ctx.save();
        ctx.fillStyle = "#f0cc30";
        ctx.font = "900 32px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(returnYards >= 40 ? "HOUSE CALL!" : "BIG RETURN!", FIELD.W / 2, 50);
        ctx.restore();
      }
      if (isReturnTD && t > 0.95) {
        ctx.save();
        ctx.fillStyle = "#f0cc30";
        ctx.font = "900 38px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("TOUCHDOWN!", FIELD.W / 2, 90);
        ctx.restore();
      }
    }};
  }

  if (play.kind === "score") {
    return { duration: 1200, kind: "score", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      // Big banner
      ctx.fillStyle = `rgba(26,51,0,${0.4 + t * 0.4})`;
      ctx.fillRect(0, FIELD.H / 2 - 50, FIELD.W, 100);
      ctx.fillStyle = "#f0cc30";
      ctx.font = "bold 38px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("🏈 " + play.desc, FIELD.W / 2, FIELD.H / 2);
    }};
  }

  // Default: just show the field with formation
  return { duration: 800, kind: play.kind, render: (t, c) => {
    drawField(c, homeTeam, awayTeam, fieldState);
    drawPlayers(formation.offense, formation.defense);
  }};
}

function drawKickoffFormation(ctx, homeTeam, awayTeam) {
  const cy = (FIELD.TOP + FIELD.BOT) / 2;
  // Kicking team (away) at their 35
  const kx = absYardToX(65);
  for (let i = -5; i <= 5; i++) {
    if (i === 0) continue;
    drawPlayer(ctx, kx, cy + i * 12, awayTeam.primary, awayTeam.secondary);
  }
  drawPlayer(ctx, kx - 10, cy, awayTeam.primary, awayTeam.secondary, "K");
  // Receiving team (home) deep
  const rx = absYardToX(15);
  for (let i = -3; i <= 3; i++) {
    drawPlayer(ctx, rx, cy + i * 16, homeTeam.primary, homeTeam.secondary);
  }
  drawPlayer(ctx, absYardToX(8), cy, homeTeam.primary, homeTeam.secondary, "R");
}

// Pre-render sprite frames to offscreen canvases per team palette (cached)
const SPRITE_CACHE = new Map();
const SPRITE_SCALE = 5; // each sprite pixel = 5 canvas pixels (90×90 final)

function shade(color, factor) {
  if (color[0] !== "#") return color;
  const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
  return `rgb(${Math.min(255,(r*factor)|0)},${Math.min(255,(g*factor)|0)},${Math.min(255,(b*factor)|0)})`;
}

function getSpriteCanvas(team, frameKey, flipped, dimmed = false) {
  const cacheKey = `${team.primary}|${team.secondary}|${frameKey}|${flipped ? "L" : "R"}|${dimmed ? "d" : "n"}`;
  if (SPRITE_CACHE.has(cacheKey)) return SPRITE_CACHE.get(cacheKey);
  const grid = SPRITE_FRAMES[frameKey];
  const SCALE = SPRITE_SCALE;
  const cv = document.createElement("canvas");
  cv.width = SPRITE_W * SCALE;
  cv.height = SPRITE_H * SCALE;
  const c = cv.getContext("2d");
  c.imageSmoothingEnabled = false;
  const dim = (color) => dimmed ? shade(color, 0.78) : color;
  const helmet = dim(team.primary);
  const helmetShade = dim(shade(team.primary, 0.78));
  const stripe = dim(team.secondary);
  const jersey = dim(team.primary);
  const jerseyShade = dim(shade(team.primary, 0.82));
  const number = dim(team.secondary);
  for (let row = 0; row < grid.length; row++) {
    const line = grid[row];
    for (let col = 0; col < line.length; col++) {
      const ch = line[col];
      if (ch === "." || ch === " ") continue;
      let color;
      switch (ch) {
        case "H": color = helmet; break;
        case "h": color = helmetShade; break;       // helmet shadow side
        case "L": color = stripe; break;             // helmet center stripe
        case "F": color = "#3a3f48"; break;          // facemask / visor (dark tint)
        case "V": color = "#1a1e26"; break;          // deeper visor band
        case "J": color = jersey; break;
        case "j": color = jerseyShade; break;        // jersey shadow side
        case "N": color = number; break;             // jersey number
        case "S": color = "#d6a878"; break;          // skin
        case "s": color = "#a87a52"; break;          // skin shadow
        case "P": color = "#f1f1f1"; break;          // pants
        case "p": color = "#bcbcbc"; break;          // pants shadow
        case "C": color = "#15151a"; break;          // cleats
        case "B": color = "#6b3416"; break;          // ball
        default:  color = jersey;
      }
      c.fillStyle = color;
      const drawCol = flipped ? (line.length - 1 - col) : col;
      c.fillRect(drawCol * SCALE, row * SCALE, SCALE, SCALE);
    }
  }
  SPRITE_CACHE.set(cacheKey, cv);
  return cv;
}

// Pre-rendered black silhouette of the sprite, used for the outline halo
function getSpriteSilhouette(frameKey, flipped) {
  const key = `__silh|${frameKey}|${flipped ? "L" : "R"}`;
  if (SPRITE_CACHE.has(key)) return SPRITE_CACHE.get(key);
  const grid = SPRITE_FRAMES[frameKey];
  const SCALE = SPRITE_SCALE;
  const cv = document.createElement("canvas");
  cv.width = SPRITE_W * SCALE;
  cv.height = SPRITE_H * SCALE;
  const c = cv.getContext("2d");
  c.imageSmoothingEnabled = false;
  c.fillStyle = "#08080c";
  for (let row = 0; row < grid.length; row++) {
    const line = grid[row];
