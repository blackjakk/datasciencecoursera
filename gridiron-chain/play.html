    off.team.rush_att++; off.team.rushYds += yards; off.team.totalYds += yards;
    this._lastBallCarrier = carrier; this._lastBallType = "rush";
    const brokeNote = brokenTackles > 0 ? ` (${brokenTackles} broken tackle${brokenTackles > 1 ? "s" : ""}!)` : "";
    const desc = isQBRun
      ? `${QB} keeps it for ${yards} yds${brokeNote}`
      : `${this.offR.starters.rb} runs for ${yards} yds${brokeNote}`;
    // Tackle credit on runs — LBs and DLs make most tackles at the LOS;
    // safeties get more credit on big breakaways
    const tacklerName = yards > 0
      ? (yards >= 10 ? this._creditDefStat("tkl", { S: 0.40, CB: 0.20, LB: 0.30, DL: 0.10 })
                     : this._creditDefStat("tkl", { LB: 0.45, DL: 0.30, S: 0.15, CB: 0.10 }))
      : this._creditDefStat("tkl", { DL: 0.50, LB: 0.35, S: 0.10, CB: 0.05 });
    this._pushVisual({ kind: "run", desc, startYard, yards, endYard: clamp(startYard + yards, 0, 100), rusher: carrier, isQBRun, tackler: tacklerName, brokenTackles });
    return { yards };
  }
  _drive() {
    const start = this.poss; let plays = 0;
    while (this.time > 0 && plays < 22) {
      plays++;
      // 2-minute warning marker (Q2 + Q4) — push once per half when the
      // clock first crosses 2:00. Doesn't stop play flow, just a UI beat.
      const halfKey = this.quarter <= 2 ? "half1" : "half2";
      if (this.time <= 120 && !this._twoMinWarned[halfKey]
          && (this.quarter === 2 || this.quarter === 4)) {
        this._twoMinWarned[halfKey] = true;
        this.plays.push({
          kind: "two_min_warning",
          desc: this.quarter === 2 ? "⏱ TWO-MINUTE WARNING (Q2)" : "⏱ TWO-MINUTE WARNING (Q4)",
          quarter: this.quarter, time: this.time,
          homeScore: this.score.home, awayScore: this.score.away,
        });
      }
      const r = this._play();
      // After each play, the team that's behind may call timeout to preserve time.
      this._maybeCallTimeout(r);
      if (r.endDrive) {
        if (r.isReturnTD) {
          // Punt returned for a TD by the receiving team
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = 100;
          this._score(6, "Punt Return Touchdown!");
          const k = this.offR.starters.k, kStats = this.offStats.players[k];
          if (Math.random() < 0.92) {
            if (kStats) kStats.xp_att++;
            if (Math.random() < 0.94) { this._score(1, "Extra Point"); if (kStats) kStats.xp_made++; }
          }
          this.drives.push({ team: start, result: "PUNT-RTN-TD", homeScore: this.score.home, awayScore: this.score.away });
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = 25; this.down = 1; this.ytg = 10; return;
        }
        if (r.punt !== undefined) {
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = clamp(100 - (this.yardLine + r.punt), 1, 99);
        } else {
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = clamp(100 - this.yardLine, 10, 90);
        }
        this.down = 1; this.ytg = 10; break;
      }
      if (r.turnover) {
        this.poss = this.poss === "home" ? "away" : "home";
        this.yardLine = clamp(100 - this.yardLine, 5, 95);
        this.down = 1; this.ytg = 10; break;
      }
      const yards = r.yards || 0;
      if (!r.incomplete) this.yardLine = clamp(this.yardLine + yards, 0, 100);
      const wasThird = (this.down === 3);
      if (this.yardLine >= 100) {
        // Credit TD to last ball carrier
        const off = this.stats[this.poss];
        if (this._lastBallCarrier && off.players[this._lastBallCarrier]) {
          if (this._lastBallType === "pass") {
            off.players[this._lastBallCarrier].rec_td++;
            const qb = this.offR.starters.qb;
            if (off.players[qb]) off.players[qb].pass_td++;
          } else if (this._lastBallType === "rush") {
            off.players[this._lastBallCarrier].rush_td++;
          }
        }
        if (wasThird) off.team.thirdConv++;
        off.team.firstDowns++;
        this._score(6, "Touchdown!");
        const k = this.offR.starters.k, kStats = off.players[k];
        if (Math.random() < 0.92) {
          if (kStats) kStats.xp_att++;
          if (Math.random() < 0.94) { this._score(1, "Extra Point"); if (kStats) kStats.xp_made++; }
        } else {
          if (Math.random() < 0.48) this._score(2, "2-Point Conversion");
        }
        this.drives.push({ team: start, result: "TD", homeScore: this.score.home, awayScore: this.score.away });
        this.poss = this.poss === "home" ? "away" : "home";
        this.yardLine = 25; this.down = 1; this.ytg = 10; return;
      }
      const wasFourth = (this.down === 4);
      if (r.incomplete) this.down++;
      else if (yards >= this.ytg) {
        this.stats[this.poss].team.firstDowns++;
        if (wasThird) this.stats[this.poss].team.thirdConv++;
        if (wasFourth) this.stats[this.poss].team.fourthConv++;
        this.down = 1; this.ytg = 10;
      }
      else { this.down++; this.ytg -= yards; }
      // Turnover on downs — failed 4th-down conversion gives ball to defense
      if (wasFourth && this.down > 4) {
        this._pushVisual({ kind: "to_downs", desc: `Turnover on downs!`, startYard: this.yardLine, endYard: this.yardLine });
        this.drives.push({ team: start, result: "TURNOVER_ON_DOWNS", homeScore: this.score.home, awayScore: this.score.away });
        this.poss = this.poss === "home" ? "away" : "home";
        this.yardLine = clamp(100 - this.yardLine, 1, 99);
        this.down = 1; this.ytg = 10;
        return;
      }
    }
    this.drives.push({ team: start, result: "FG/Punt/TO", homeScore: this.score.home, awayScore: this.score.away });
  }
  simulate() {
    this._pushVisual({ kind: "kickoff", desc: `${this.away.city} ${this.away.name} kicks off`, startYard: 35, endYard: 25 });
    while (this.quarter <= 4) {
      if (this.time <= 0) {
        if (this.quarter === 2) {
          // Reset timeouts for the second half
          this.timeouts = { home: 3, away: 3 };
          this.plays.push({ kind: "halftime", desc: "═══ HALFTIME ═══", quarter: 2, time: 0, homeScore: this.score.home, awayScore: this.score.away });
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = 25; this.down = 1; this.ytg = 10;
        }
        this.quarter++;
        if (this.quarter <= 4) {
          this.plays.push({ kind: "quarter", desc: `─── Start of Q${this.quarter} ───`, quarter: this.quarter, time: 900, homeScore: this.score.home, awayScore: this.score.away });
        }
        this.time = 900;
        continue;
      }
      this._drive();
    }
    if (this.score.home === this.score.away) {
      this.plays.push({ kind: "ot", desc: "═══ OVERTIME ═══", quarter: 5, time: 600, homeScore: this.score.home, awayScore: this.score.away });
      this.quarter = 5; this.time = 600;
      this.poss = Math.random() < 0.5 ? "home" : "away";
      let n = 0;
      while (this.score.home === this.score.away && n < 8) { this._drive(); n++; }
      if (this.score.home === this.score.away) {
        if (Math.random() < 0.5) this.score.home += 3; else this.score.away += 3;
      }
    }
    // Build a player lookup map for hover tooltips
    const lookup = new Map();
    for (const p of this.hRoster) lookup.set(p.name, { ...p, team: "home" });
    for (const p of this.aRoster) lookup.set(p.name, { ...p, team: "away" });
    return {
      homeTeam: this.home, awayTeam: this.away,
      homeScore: this.score.home, awayScore: this.score.away,
      homeRatings: this.homeR, awayRatings: this.awayR,
      homeRoster: this.hRoster, awayRoster: this.aRoster,
      playerLookup: lookup,
      plays: this.plays, drives: this.drives,
      stats: this.stats,
      winner: this.score.home > this.score.away ? "home" : this.score.away > this.score.home ? "away" : "tie",
    };
  }
}

// ─── Field rendering ───────────────────────────────────────────────────────
const FIELD = {
  W: 1000, H: 420,
  EZ_PX: 60,        // pixels for each end zone
  PX_PER_YARD: 8.8, // playable field width (100 yd × 8.8 = 880px)
  TOP: 30,
  BOT: 390,
};

// Convert yard line + possession to absolute X (0=home goal, 100=away goal)
function yardToAbsX(yardLine, poss) {
  // When home has ball: yardLine 0 = home's own goal (left); yardLine 100 = away goal (right)
  // When away has ball: yardLine 0 = away's own goal (right); yardLine 100 = home goal (left)
  const absYard = poss === "home" ? yardLine : 100 - yardLine;
  return FIELD.EZ_PX + absYard * FIELD.PX_PER_YARD;
}
function absYardToX(absYard) {
  return FIELD.EZ_PX + absYard * FIELD.PX_PER_YARD;
}

function drawField(ctx, homeTeam, awayTeam, ctx_state) {
  const W = FIELD.W, H = FIELD.H;
  // grass bands
  ctx.fillStyle = "#1f6b34";
  ctx.fillRect(0, 0, W, H);
  // alternating mowed bands
  for (let i = 0; i < 10; i++) {
    ctx.fillStyle = i % 2 === 0 ? "#236d36" : "#1f6431";
    const x = FIELD.EZ_PX + i * 10 * FIELD.PX_PER_YARD;
    ctx.fillRect(x, FIELD.TOP, 10 * FIELD.PX_PER_YARD, FIELD.BOT - FIELD.TOP);
  }
  // end zones (team colors)
  ctx.fillStyle = homeTeam.primary;
  ctx.fillRect(0, FIELD.TOP, FIELD.EZ_PX, FIELD.BOT - FIELD.TOP);
  ctx.fillStyle = awayTeam.primary;
  ctx.fillRect(W - FIELD.EZ_PX, FIELD.TOP, FIELD.EZ_PX, FIELD.BOT - FIELD.TOP);

  // End zone team text
  ctx.save();
  ctx.font = "bold 18px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.translate(FIELD.EZ_PX / 2, (FIELD.TOP + FIELD.BOT) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(homeTeam.name.toUpperCase(), 0, 0);
  ctx.restore();
  ctx.save();
  ctx.translate(W - FIELD.EZ_PX / 2, (FIELD.TOP + FIELD.BOT) / 2);
  ctx.rotate(Math.PI / 2);
  ctx.font = "bold 18px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(awayTeam.name.toUpperCase(), 0, 0);
  ctx.restore();

  // sidelines
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, FIELD.TOP); ctx.lineTo(W, FIELD.TOP);
  ctx.moveTo(0, FIELD.BOT); ctx.lineTo(W, FIELD.BOT);
  ctx.stroke();

  // yard lines (every 5 thin, every 10 thick + numbers)
  for (let yd = 0; yd <= 100; yd += 5) {
    const x = absYardToX(yd);
    const isMajor = yd % 10 === 0;
    ctx.strokeStyle = isMajor ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.4)";
    ctx.lineWidth = isMajor ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP);
    ctx.lineTo(x, FIELD.BOT);
    ctx.stroke();
  }

  // Yard numbers (10, 20, 30, 40, 50, 40, 30, 20, 10)
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.font = "bold 18px sans-serif";
  ctx.textAlign = "center";
  for (let yd = 10; yd <= 90; yd += 10) {
    const x = absYardToX(yd);
    const num = yd <= 50 ? yd : 100 - yd;
    ctx.fillText(num, x, FIELD.TOP + 30);
    ctx.fillText(num, x, FIELD.BOT - 14);
  }

  // Hash marks (small ticks every yard)
  ctx.strokeStyle = "rgba(255,255,255,0.55)";
  ctx.lineWidth = 1;
  for (let yd = 1; yd <= 99; yd++) {
    if (yd % 5 === 0) continue;
    const x = absYardToX(yd);
    // top hash
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP + 75);
    ctx.lineTo(x, FIELD.TOP + 80);
    ctx.stroke();
    // bottom hash
    ctx.beginPath();
    ctx.moveTo(x, FIELD.BOT - 80);
    ctx.lineTo(x, FIELD.BOT - 75);
    ctx.stroke();
    // sideline ticks
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP); ctx.lineTo(x, FIELD.TOP + 6);
    ctx.moveTo(x, FIELD.BOT); ctx.lineTo(x, FIELD.BOT - 6);
    ctx.stroke();
  }

  // 50 yard line midfield logo
  ctx.fillStyle = "rgba(200,169,0,0.18)";
  ctx.beginPath();
  ctx.arc(absYardToX(50), (FIELD.TOP + FIELD.BOT) / 2, 32, 0, Math.PI * 2);
  ctx.fill();

  // LOS and first down marker
  if (ctx_state) {
    const { los, firstDownAbs, possColor } = ctx_state;
    if (los != null) {
      ctx.strokeStyle = possColor || "#4b9bd5";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(los, FIELD.TOP); ctx.lineTo(los, FIELD.BOT);
      ctx.stroke();
    }
    if (firstDownAbs != null) {
      ctx.strokeStyle = "#f0cc30";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(firstDownAbs, FIELD.TOP); ctx.lineTo(firstDownAbs, FIELD.BOT);
      ctx.stroke();
    }
  }

  // Goal line posts indicator
  ctx.strokeStyle = "#f0cc30";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(FIELD.EZ_PX, FIELD.TOP); ctx.lineTo(FIELD.EZ_PX, FIELD.BOT);
  ctx.moveTo(W - FIELD.EZ_PX, FIELD.TOP); ctx.lineTo(W - FIELD.EZ_PX, FIELD.BOT);
  ctx.stroke();
}

// Stick-figure player: head (circle) + torso + 2 arms + 2 legs as articulated
// lines. `pose` drives limb angles; `t` is an animation phase 0..1 for run cycles.
// Backwards compatible — old calls without pose render as idle.
// Per-position default running style + signature celebration
const RUN_STYLES = {
  smooth:   { armAmp: 0.95, legAmp: 0.70, lean: 0.05, kneeBend: 0.55, bob: 1.0 },
  powerful: { armAmp: 1.20, legAmp: 0.95, lean: 0.10, kneeBend: 0.85, bob: 1.6 },  // RBs — high knees, churn
  loping:   { armAmp: 0.70, legAmp: 1.05, lean: 0.02, kneeBend: 0.30, bob: 1.2 },  // burners — long stride
  short:    { armAmp: 0.85, legAmp: 0.55, lean: 0.03, kneeBend: 0.65, bob: 0.7 },  // shifty — high turnover
  plodding: { armAmp: 0.55, legAmp: 0.45, lean: 0.06, kneeBend: 0.40, bob: 0.5 },  // OL/DL — big guys
  glider:   { armAmp: 0.80, legAmp: 0.80, lean: 0.0,  kneeBend: 0.35, bob: 0.4 },  // WR — smooth tempo
  scrambler:{ armAmp: 1.10, legAmp: 0.75, lean: 0.12, kneeBend: 0.70, bob: 1.0 },  // mobile QB — frantic
};
const CELEB_STYLES = ["fist_pump", "ref_signal", "spike", "first_down", "point_sky", "shimmy", "bow", "leap_yell", "kneel"];

// Body type profiles — drive shoulder width, torso shape, leg/arm length.
// BIG = upside-down triangle (massive shoulders, thick torso) — OL/DL/POWER RB
// BROAD = stocky triangle — default RBs, thumper LBs
// NORMAL = balanced — QB / DB
// LEAN = narrow shoulders, longer limbs — most WRs, shutdown CBs
// COMPACT = short and small — slot WR/CB, elusive RB
const BODY_TYPES = {
  //               padW   torsoLen  torsoBotW  legLen  armLen  helmH   scale  bulk    (extra width on sides of pads)
  HUGE:        { padW: 16.0, torsoLen: 9.8, torsoBotW: 6.0, legLen: 9.0,  armLen: 7.8, helmH: 5.9, scale: 1.10, bulk: 1.6 },  // mountain (NT, RT)
  BIG:         { padW: 13.5, torsoLen: 9.0, torsoBotW: 4.8, legLen: 8.8,  armLen: 7.5, helmH: 5.7, scale: 1.05, bulk: 1.0 },
  HEAVY_SHORT: { padW: 14.5, torsoLen: 7.8, torsoBotW: 5.5, legLen: 7.5,  armLen: 7.0, helmH: 5.6, scale: 1.04, bulk: 1.4 },  // squat guard
  TALL_HEAVY:  { padW: 14.0, torsoLen: 10.2,torsoBotW: 5.2, legLen: 10.0, armLen: 8.2, helmH: 5.7, scale: 1.08, bulk: 1.2 },  // tall + thick (LT, DE)
  BROAD:       { padW: 11.8, torsoLen: 8.5, torsoBotW: 4.0, legLen: 9.0,  armLen: 7.5, helmH: 5.5, scale: 1.0,  bulk: 0.8 },
  NORMAL:      { padW: 10.0, torsoLen: 8.5, torsoBotW: 3.5, legLen: 9.0,  armLen: 7.5, helmH: 5.5, scale: 1.0,  bulk: 0.5 },
  LEAN:        { padW: 9.0,  torsoLen: 9.5, torsoBotW: 2.6, legLen: 10.2, armLen: 8.4, helmH: 5.3, scale: 1.0,  bulk: 0.2 },
  COMPACT:     { padW: 8.8,  torsoLen: 7.5, torsoBotW: 3.0, legLen: 8.2,  armLen: 6.8, helmH: 5.2, scale: 0.95, bulk: 0.4 },
};
const LINE_BODY_POOL = ["HUGE", "BIG", "HEAVY_SHORT", "TALL_HEAVY", "BIG", "TALL_HEAVY"];
function pickBodyType(pos, archetype) {
  if (pos === "OL" || pos === "DL") {
    // Linemen come in different sizes — pick from a pool so a line is visually varied.
    // Archetype tilts toward specific looks: POWER → HUGE, SPEED → TALL_HEAVY/BIG, etc.
    if (pos === "DL") {
      if (archetype === "POWER")      return Math.random() < 0.55 ? "HUGE" : "BIG";
      if (archetype === "SPEED")      return Math.random() < 0.55 ? "TALL_HEAVY" : "BIG";
      if (archetype === "PENETRATOR") return Math.random() < 0.50 ? "BIG" : "TALL_HEAVY";
      if (archetype === "TWEENER")    return "BIG";
      return Math.random() < 0.45 ? "TALL_HEAVY" : "BIG";
    }
    // OL
    if (archetype === "ANCHOR")    return Math.random() < 0.55 ? "HUGE" : "HEAVY_SHORT";
    if (archetype === "MAULER")    return Math.random() < 0.55 ? "HUGE" : "BIG";
    if (archetype === "ATHLETIC")  return Math.random() < 0.6  ? "TALL_HEAVY" : "BIG";
    if (archetype === "PLUG")      return Math.random() < 0.65 ? "HEAVY_SHORT" : "HUGE";
    if (archetype === "TECHNICIAN")return Math.random() < 0.55 ? "BIG" : "TALL_HEAVY";
    return LINE_BODY_POOL[Math.floor(Math.random() * LINE_BODY_POOL.length)];
  }
  if (pos === "RB") {
    if (archetype === "POWER") return "BIG";
    if (archetype === "ELUSIVE") return "COMPACT";
    if (archetype === "SPEED") return "BROAD";
    return "BROAD";
  }
  if (pos === "WR") {
    if (archetype === "DEEP_THREAT" || archetype === "POSSESSION" || archetype === "ROUTE_RUNNER") return "LEAN";
    if (archetype === "RED_ZONE") return "BROAD";
    if (archetype === "SLOT") return "COMPACT";
    return Math.random() < 0.7 ? "LEAN" : "NORMAL";
  }
  if (pos === "TE") return archetype === "RECEIVING" ? "BROAD" : Math.random() < 0.5 ? "TALL_HEAVY" : "BIG";
  if (pos === "LB") return archetype === "THUMPER" ? "BIG" : "BROAD";
  if (pos === "CB") {
    if (archetype === "SHUTDOWN") return "LEAN";
    if (archetype === "SLOT_CB")  return "COMPACT";
    return "NORMAL";
  }
  if (pos === "S")  return archetype === "BOX" ? "BROAD" : "NORMAL";
  if (pos === "QB") return "NORMAL";
  if (pos === "K" || pos === "P") return "LEAN";
  return "NORMAL";
}

function drawPlayer(ctx, x, y, color, secondary, label, pose, t, facing, style = {}) {
  pose = pose || "idle";
  t = t || 0;
  facing = facing || 1;
  const runStyle = style.runStyle || "smooth";
  const celebStyle = style.celebStyle || "fist_pump";
  // OL/DL default to a 3-point stance when they're not actively doing something
  if ((pose === "idle") && (style.role === "OL" || style.role === "DL")) pose = "stance";
  const rs = RUN_STYLES[runStyle] || RUN_STYLES.smooth;
  const bt = BODY_TYPES[style.bodyType] || BODY_TYPES.NORMAL;

  // Shade helpers — multiply RGB by factor to get a darker / lighter variant
  // for shading the body parts. Falls back to the input on parse error.
  const tweakColor = (c, factor) => {
    if (!c || c[0] !== "#" || c.length !== 7) return c;
    const r = Math.min(255, Math.max(0, Math.round(parseInt(c.slice(1,3),16) * factor)));
    const g = Math.min(255, Math.max(0, Math.round(parseInt(c.slice(3,5),16) * factor)));
    const b = Math.min(255, Math.max(0, Math.round(parseInt(c.slice(5,7),16) * factor)));
    return `rgb(${r},${g},${b})`;
  };
  const shadeDark  = tweakColor(color, 0.62);
  const shadeMid   = tweakColor(color, 0.85);
  const shadeLight = tweakColor(color, 1.18);

  const headR = 4.2;
  const helmH = bt.helmH;
  const torsoLen = bt.torsoLen;
  const padW = bt.padW;
  const armLen = bt.armLen;
  const legLen = bt.legLen;
  const runPhase = Math.sin(t * Math.PI * 2);

  // Limb angles. 0 rad = pointing DOWN. Positive = swings FORWARD (in facing dir).
  let lArm = 0, rArm = 0, lLeg = 0, rLeg = 0;
  let lLegLift = 0, rLegLift = 0;   // vertical lift (foot off ground) for each leg
  let bodyRot = 0, bodyTilt = 0;
  let armReachY = 0, bodyDY = 0;
  let leftHandBall = false, rightHandBall = false;
  let exclaim = null;
  let drawGroundHand = false;   // for 3-point stance

  switch (pose) {
    case "idle":
      bodyDY = Math.sin(t * Math.PI * 1.5) * 0.4;
      break;
    case "run":
    case "carry": {
      const ph = runPhase;
      // Legs alternate. The leg swinging BACK gets lifted (knee comes up = back foot off ground)
      lLeg =  ph * rs.legAmp;          // positive when forward
      rLeg = -ph * rs.legAmp;
      lLegLift = Math.max(0, -ph) * 7; // lift when going back/swing
      rLegLift = Math.max(0,  ph) * 7;
      // Arms swing OPPOSITE to legs
      lArm = -ph * rs.armAmp;
      rArm =  ph * rs.armAmp;
      bodyTilt = facing * rs.lean;
      bodyDY = -(Math.abs(ph) * 0.5 + 0.2) * rs.bob;
      if (pose === "carry") {
        rArm = -0.25;  // ball-side arm tucked in
        rightHandBall = true;
      }
      break;
    }
    case "stance": {
      // 3-point stance — body crouched, lead hand on the ground, butt up, head up.
      bodyDY = 5;
      bodyTilt = facing * 0.55;
      lArm = facing * Math.PI * 0.55;   // lead arm reaches down-forward to ground
      rArm = -0.4;                       // off arm on knee
      lLeg = 0.5;
      rLeg = -0.4;
      drawGroundHand = true;
      break;
    }
    case "throw":
      lArm = -2.2 + t * 1.5;
      rArm = -0.8;
      lLeg = 0.3; rLeg = -0.4;
      rightHandBall = t < 0.5;
      bodyTilt = facing * 0.05;
      break;
    case "reach": case "catch":
      lArm = -2.4; rArm = -2.4;
      armReachY = -3;
      break;
    case "celebrate": {
      const cs = celebStyle;
      if (cs === "ref_signal") {
        lArm = -Math.PI; rArm = -Math.PI;
      } else if (cs === "spike") {
        const phase = (t * 1.2) % 1;
        const cock = phase < 0.4 ? phase / 0.4 : 1;
        const swing = phase < 0.4 ? 0 : (phase - 0.4) / 0.6;
        lArm = -Math.PI * (1 - swing * 0.7) + (1 - cock) * 0.6;
        rArm = 0.3;
        leftHandBall = phase < 0.55;
      } else if (cs === "fist_pump") {
        lArm = -Math.PI * 0.78 - Math.abs(Math.sin(t * Math.PI * 5)) * 0.25;
        rArm = 0.4;
      } else if (cs === "first_down") {
        lArm = facing * Math.PI * 0.5;
        rArm = -0.4;
        bodyTilt = facing * 0.1;
      } else if (cs === "point_sky") {
        lArm = -Math.PI; rArm = -Math.PI;
      } else if (cs === "shimmy") {
        bodyRot = Math.sin(t * Math.PI * 6) * 0.12;
        lArm = -0.4 + Math.sin(t * Math.PI * 5) * 0.6;
        rArm = 0.4 - Math.sin(t * Math.PI * 5) * 0.6;
      } else if (cs === "bow") {
        bodyTilt = facing * 0.6;
        lArm = -0.3; rArm = 0.3;
      } else if (cs === "leap_yell") {
        bodyDY = -Math.abs(Math.sin(t * Math.PI * 2)) * 5;
        lArm = -Math.PI * 0.8;
        rArm = -Math.PI * 0.8;
      } else if (cs === "kneel") {
        bodyDY = 4;
        lLeg = 0.9; rLeg = -0.3;
        lArm = -0.6; rArm = 0.2;
        bodyTilt = facing * 0.15;
      } else {
        lArm = -2.3; rArm = 2.3;
      }
      break;
    }
    case "juke":
      bodyRot = facing * 0.35;
      lArm = 0.4;  rArm = -0.4;
      lLeg = -0.7; rLeg = 0.3;
      break;
    case "spin":
      bodyRot = t * Math.PI * 2;
      lArm = 1.2;  rArm = -1.2;
      lLeg = -runPhase * 0.4; rLeg = runPhase * 0.4;
      break;
    case "hurdle":
      // Mid-air hurdle — both legs tucked up, body airborne
      bodyDY = -7;
      bodyTilt = facing * 0.3;
      lLeg = -1.3;  // back leg tucked up
      rLeg = -0.4;  // front leg slightly bent forward
      lArm = -0.3;
      rArm = 0.4;
      break;
    case "truck":
      // Truck stick — shoulder lowered, body driving forward, knees high
      bodyTilt = facing * 0.45;
      bodyDY = 1.5;
      lArm = -0.7;          // off arm cocked back
      rArm = -1.0;           // lead arm/shoulder driving forward
      lLeg = Math.abs(Math.sin(t * Math.PI * 4)) * 0.7;
      rLeg = -Math.abs(Math.sin(t * Math.PI * 4 + Math.PI)) * 0.7;
      break;
    case "tackled":
      bodyRot = -Math.PI / 2 * facing;
      lArm = -1.1; rArm = 1.1;
      lLeg = -0.6; rLeg = 0.6;
      break;
    case "stiff":
      lArm = Math.PI / 2;
      rArm = 0.4;
      lLeg = runPhase * 0.3; rLeg = -runPhase * 0.3;
      break;
    case "block":
      lArm = -0.5; rArm = 0.5;
      lLeg = 0.1;  rLeg = -0.1;
      bodyTilt = facing * 0.15;
      break;
    case "engage":
      lArm = facing * Math.PI / 2 - 0.2;
      rArm = facing * Math.PI / 2 + 0.2;
      lLeg = 0.4; rLeg = -0.4;
      bodyTilt = facing * 0.2;
      bodyDY = Math.sin(t * Math.PI * 6) * 0.4;
      break;
    case "sack":
      lArm = -0.6; rArm = -0.6;
      lLeg = -0.5; rLeg = 0.5;
      bodyTilt = facing * 0.25;
      break;
    case "kick":
      lArm = -0.4; rArm = -0.8;
      lLeg = -1.4;
      rLeg = facing * (1.1 - Math.abs(t - 0.5) * 1.5);
      bodyTilt = facing * -0.15;
      break;
    case "lateral":
      lArm = -facing * Math.PI * 0.7;
      rArm = 0.3;
      bodyRot = facing * -0.2;
      leftHandBall = t < 0.5;
      break;
  }
  ctx.save();
  ctx.translate(x, y + bodyDY);
  if (bodyTilt !== 0) ctx.rotate(bodyTilt);
  if (bodyRot !== 0) ctx.rotate(bodyRot);
  if (bt.scale && bt.scale !== 1.0) ctx.scale(bt.scale, bt.scale);
  ctx.lineCap = "round";

  // Drop shadow — bigger for bulkier players
  ctx.fillStyle = "rgba(0,0,0,0.40)";
  ctx.beginPath();
  ctx.ellipse(0, headR + torsoLen + legLen - 1, 7.5 + bt.bulk * 0.8, 2.4, 0, 0, Math.PI * 2);
  ctx.fill();

  const shoulderY = -headR + 1;
  const hipY = shoulderY + torsoLen;

  // ── Legs with knee bend + foot lift (thicker w/ shaded edge) ──
  const legW = 3.4 + bt.bulk * 0.4;
  const drawLeg = (side, angle, lift) => {
    const a = angle * facing;
    const sx = side * 1.6;
    const upperLen = legLen * 0.55;
    const lowerLen = legLen * 0.55;
    // Knee bend amount: in run/carry, also amplified by lift (back foot up to butt)
    const bending = pose === "run" || pose === "carry";
    const bendBase = bending ? rs.kneeBend * Math.abs(Math.sin(a)) : 0;
    const bend = bendBase + (lift / 7) * 0.8;
    const kneeX = sx + Math.sin(a) * upperLen;
    const kneeY = hipY + Math.cos(a) * upperLen - lift * 0.55;
    // Lower leg angle — when lifted, foot tucks up behind/under the body
    const lowerA = a + facing * bend * (a >= 0 ? 1 : -1);
    const footX = kneeX + Math.sin(lowerA) * lowerLen;
    const footY = kneeY + Math.cos(lowerA) * lowerLen - lift * 0.35;
    // Shadow base
    ctx.strokeStyle = "#c0c0c0";
    ctx.lineWidth = legW;
    ctx.beginPath();
    ctx.moveTo(sx + 0.3, hipY + 0.3);
    ctx.lineTo(kneeX + 0.2, kneeY + 0.3);
    ctx.lineTo(footX + 0.2, footY + 0.3);
    ctx.stroke();
    // Main leg (white pants)
    ctx.strokeStyle = "#f1f1f1";
    ctx.lineWidth = legW - 0.6;
    ctx.beginPath();
    ctx.moveTo(sx, hipY);
    ctx.lineTo(kneeX, kneeY);
    ctx.lineTo(footX, footY);
    ctx.stroke();
    // Cleat (only show when grounded; when lifted, foot is angled)
    ctx.fillStyle = "#0a0a14";
    ctx.beginPath();
    ctx.ellipse(footX, footY + 0.5, 2.6, 1.4, 0, 0, Math.PI * 2);
    ctx.fill();
  };
  drawLeg(-1, lLeg, lLegLift);
  drawLeg(1, rLeg, rLegLift);

  // ── Shoulder pads (trapezoid w/ top→bottom shading + neckline) ──
  const padTopY = shoulderY - 1.5;
  const padBotY = shoulderY + 2;
  const padGrad = ctx.createLinearGradient(0, padTopY, 0, padBotY);
  padGrad.addColorStop(0,    shadeLight);
  padGrad.addColorStop(0.45, color);
  padGrad.addColorStop(1,    shadeDark);
  ctx.fillStyle = padGrad;
  ctx.strokeStyle = secondary || "#fff";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-padW/2, padTopY);
  ctx.lineTo(padW/2,  padTopY);
  ctx.lineTo(padW/2 - 0.8, padBotY);
  ctx.lineTo(-padW/2 + 0.8, padBotY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Pad lip — dark shadow line under the pad lip
  ctx.strokeStyle = shadeDark;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-padW/2 + 0.2, padBotY - 0.3);
  ctx.lineTo(padW/2 - 0.2,  padBotY - 0.3);
  ctx.stroke();

  // ── Torso — left→right gradient gives a barrel-chested 3D feel ──
  const torsoTopW = padW/2 - 0.8;
  const torsoBotW = bt.torsoBotW;
  const torsoGradH = ctx.createLinearGradient(-torsoTopW, 0, torsoTopW, 0);
  torsoGradH.addColorStop(0,    shadeDark);
  torsoGradH.addColorStop(0.35, color);
  torsoGradH.addColorStop(0.65, color);
  torsoGradH.addColorStop(1,    shadeMid);
  ctx.fillStyle = torsoGradH;
  ctx.strokeStyle = secondary || "#fff";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-torsoTopW, shoulderY + 2);
  ctx.lineTo(torsoTopW,  shoulderY + 2);
  ctx.lineTo(torsoBotW, hipY);
  ctx.lineTo(-torsoBotW, hipY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Subtle chest highlight
  ctx.strokeStyle = `rgba(255,255,255,0.18)`;
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(-torsoTopW * 0.35, shoulderY + 3.2);
  ctx.lineTo(-torsoBotW * 0.35, hipY - 1);
  ctx.stroke();

  if (label && /^\d{1,2}$/.test(label)) {
    ctx.fillStyle = secondary || "#fff";
    ctx.font = "bold 6.5px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label, 0, shoulderY + torsoLen * 0.55);
  }

  // ── Arms (thicker shadow base + lit top stroke for a 3D look) ──
  const armW = 3.2 + bt.bulk * 0.6;
  const drawArm = (side, angle, holdsBall) => {
    const a = angle * facing;
    const sx = side * (padW/2 - 0.5);
    const upper = armLen * 0.55;
    const lower = armLen * 0.55;
    const elbowX = sx + Math.sin(a) * upper;
    const elbowY = shoulderY + Math.cos(a) * upper + armReachY * 0.4;
    const lowerA = a - facing * 0.35 * Math.sign(Math.cos(a));
    const handX = elbowX + Math.sin(lowerA) * lower;
    const handY = elbowY + Math.cos(lowerA) * lower + armReachY * 0.6;
    // Shadow base (slightly offset)
    ctx.strokeStyle = shadeDark;
    ctx.lineWidth = armW;
    ctx.beginPath();
    ctx.moveTo(sx + 0.3, shoulderY + 0.3);
    ctx.lineTo(elbowX + 0.2, elbowY + 0.3);
    ctx.lineTo(handX + 0.2, handY + 0.3);
    ctx.stroke();
    // Main arm
    ctx.strokeStyle = color;
    ctx.lineWidth = armW - 0.5;
    ctx.beginPath();
    ctx.moveTo(sx, shoulderY);
    ctx.lineTo(elbowX, elbowY);
    ctx.lineTo(handX, handY);
    ctx.stroke();
    ctx.fillStyle = "#d6a878";
    ctx.beginPath();
    ctx.arc(handX, handY, 1.5, 0, Math.PI * 2);
    ctx.fill();
    if (holdsBall) {
      ctx.fillStyle = "#6b3416";
      ctx.beginPath();
      ctx.ellipse(handX, handY + 0.5, 3, 1.7, facing * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(handX - 0.5, handY - 0.3);
      ctx.lineTo(handX + 0.5, handY - 0.3);
      ctx.stroke();
    }
    return { handX, handY };
  };
  const lHand = drawArm(-1, lArm, leftHandBall);
  const rHand = drawArm(1, rArm, rightHandBall);

  // For 3-point stance, draw a ground line where the lead hand plants
  if (drawGroundHand) {
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(lHand.handX, lHand.handY + 0.5, 3, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Helmet (radial gradient for 3D dome feel) ──────────
  const helmY = shoulderY - helmH - 0.5;
  const helmRx = headR + 1.2;
  // Off-center radial gradient (highlight on the top-front quadrant)
  const helmGrad = ctx.createRadialGradient(facing * 1.5, helmY - helmH * 0.4, 0.5,
                                            0, helmY, helmRx + 1);
  helmGrad.addColorStop(0,    shadeLight);
  helmGrad.addColorStop(0.45, color);
  helmGrad.addColorStop(1,    shadeDark);
  ctx.fillStyle = helmGrad;
  ctx.strokeStyle = secondary || "#fff";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, helmY, helmRx, helmH, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Helmet rim shadow — dark crescent on the bottom
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.ellipse(0, helmY + 0.7, helmRx - 0.3, helmH - 0.3, 0, 0.15, Math.PI - 0.15);
  ctx.stroke();
  ctx.strokeStyle = secondary || "#fff";
  ctx.lineWidth = 1.1;
  ctx.beginPath();
  ctx.moveTo(0, helmY - helmH * 0.95);
  ctx.lineTo(0, helmY + helmH * 0.2);
  ctx.stroke();
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.beginPath();
  ctx.arc(-facing * 1.5, helmY + 0.5, 0.9, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "#c8c8c8";
  ctx.lineWidth = 0.9;
  const fx = facing * (headR + 0.5);
  const fy = helmY + 1.5;
  ctx.beginPath();
  ctx.moveTo(fx, fy - 2.2);
  ctx.lineTo(fx, fy + 1.8);
  ctx.stroke();
  for (const dy of [-1.5, 0, 1.2]) {
    ctx.beginPath();
    ctx.moveTo(fx, fy + dy);
    ctx.lineTo(fx - facing * 2.8, fy + dy);
    ctx.stroke();
  }
  ctx.strokeStyle = "#f1f1f1";
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(-facing * 2, helmY + helmH * 0.65);
  ctx.lineTo(facing * 2, helmY + helmH * 0.65);
  ctx.stroke();

  if (exclaim) {
    ctx.fillStyle = "#f0cc30";
    ctx.font = "bold 9px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(exclaim, 0, helmY - helmH - 4);
  }

  ctx.restore();
}

// Goalpost (Y-shape, tall yellow uprights) at (cx, cy) — used in tactical view
function drawGoalposts(ctx, cx, cy) {
  const POST_HALF = 40;     // distance from center to each upright
  const POST_TOP  = FIELD.TOP - 4;
  const POST_BOT  = cy + 22;
  ctx.save();
  ctx.strokeStyle = "#ffe048";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  // Crossbar
  ctx.beginPath();
  ctx.moveTo(cx - POST_HALF, cy);
  ctx.lineTo(cx + POST_HALF, cy);
  ctx.stroke();
  // Uprights
  ctx.beginPath();
  ctx.moveTo(cx - POST_HALF, cy);
  ctx.lineTo(cx - POST_HALF, POST_TOP);
  ctx.moveTo(cx + POST_HALF, cy);
  ctx.lineTo(cx + POST_HALF, POST_TOP);
  ctx.stroke();
  // Center support down to ground
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx, POST_BOT);
  ctx.stroke();
  // Base
  ctx.fillStyle = "#ffe048";
  ctx.beginPath();
  ctx.ellipse(cx, POST_BOT, 6, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBall(ctx, x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = "#6b3416";
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-3, 0); ctx.lineTo(3, 0);
  for (let i = -2; i <= 2; i++) { ctx.moveTo(i, -1.2); ctx.lineTo(i, 1.2); }
  ctx.stroke();
  ctx.restore();
}

// ─── Formation & animation ────────────────────────────────────────────────
// Generate 11 offensive + 11 defensive player positions for a given LOS (abs X)
// poss = "home" | "away" → home offense moves left→right, away moves right→left
function makeFormation(losX, poss) {
  const dir = poss === "home" ? 1 : -1;  // direction offense moves (positive = right)
  const cy = (FIELD.TOP + FIELD.BOT) / 2;
  const PX = FIELD.PX_PER_YARD;

  // Offensive line (5) along LOS
  const oline = [];
  for (let i = -2; i <= 2; i++) {
    oline.push({ x: losX - dir * 2, y: cy + i * 14, role: "OL" });
  }
  // TE just outside RT
  const te = { x: losX - dir * 2, y: cy + 38, role: "TE" };
  // 2 WR split out wide
  const wr1 = { x: losX, y: cy - 75, role: "WR1" };
  const wr2 = { x: losX, y: cy + 75, role: "WR2" };
  // QB
  const qb = { x: losX - dir * 6 * PX, y: cy, role: "QB" };
  // RB
  const rb = { x: losX - dir * 8 * PX, y: cy + 18, role: "RB" };

  // Defensive line (4)
  const dline = [];
  for (let i = -1.5; i <= 1.5; i += 1) {
    dline.push({ x: losX + dir * 1.5 * PX, y: cy + i * 18, role: "DL" });
  }
  // 3 LBs
  const lbs = [
    { x: losX + dir * 4 * PX, y: cy - 24, role: "LB" },
    { x: losX + dir * 4 * PX, y: cy,      role: "LB" },
    { x: losX + dir * 4 * PX, y: cy + 24, role: "LB" },
  ];
  // 2 CBs covering WRs
  const cb1 = { x: losX + dir * 7 * PX, y: cy - 75, role: "CB" };
  const cb2 = { x: losX + dir * 7 * PX, y: cy + 75, role: "CB" };
  // 2 Safeties deep
  const s1 = { x: losX + dir * 14 * PX, y: cy - 30, role: "S" };
  const s2 = { x: losX + dir * 14 * PX, y: cy + 30, role: "S" };

  return {
    offense: [...oline, te, wr1, wr2, qb, rb],
    defense: [...dline, ...lbs, cb1, cb2, s1, s2],
    qb, rb, wr1, wr2, te, dline, lbs, cb1, cb2, s1, s2,
    oline, // expose for style attachment
  };
}

// Map each formation slot to a real roster player so drawPlayer can use
// their personal running style + signature celebration. Mutates the passed
// formation in place — attaches `runStyle`, `celebStyle`, and `label` (jersey #).
const JERSEYS_BY_POS = {
  QB: ["1","7","9","10","12","17"],  RB: ["20","21","22","23","26","28","32"],
  WR: ["10","11","13","14","17","18","19","80","81","84","87","88"],
  TE: ["44","82","83","85","86","89"],
  OL: ["50","53","60","61","65","66","68","70","72","74","76","77","79"],
  DL: ["52","55","58","69","73","75","90","91","92","93","94","95","97","98","99"],
  LB: ["40","42","43","45","48","51","54","56","57","59"],
  CB: ["21","22","23","24","25","27","29","31"],
  S:  ["20","26","30","32","33","36","37","38","39"],
  K:  ["2","3","4","5","6","8"], P: ["2","3","4","5","6","8"],
};
function jerseyForPlayer(p) {
  // Deterministic jersey based on the player's name so it stays consistent
  if (!p) return "";
  const pool = JERSEYS_BY_POS[p.position] || ["00"];
  let hash = 0;
  for (let i = 0; i < p.name.length; i++) hash = (hash * 31 + p.name.charCodeAt(i)) >>> 0;
  return pool[hash % pool.length];
}
function attachPlayerStyles(formation, offStarters, defStarters, lookup) {
  if (!lookup) return;
  const pickup = (name) => name ? lookup.get(name) : null;
  const decorate = (slot, p) => {
    if (!slot) return;
    if (p) {
      slot.runStyle = p.runStyle;
      slot.celebStyle = p.celebStyle;
      slot.bodyType = p.bodyType;
      slot.label = jerseyForPlayer(p);
      slot.archetype = p.archetype;
      slot.position = p.position;
    }
  };
  if (offStarters) {
    decorate(formation.qb,  pickup(offStarters.qb));
    decorate(formation.rb,  pickup(offStarters.rb));
    decorate(formation.wr1, pickup(offStarters.wr1));
    decorate(formation.wr2, pickup(offStarters.wr2));
    decorate(formation.te,  pickup(offStarters.te));
  }
  if (formation.oline) for (const ol of formation.oline) {
    ol.runStyle = "plodding";
    ol.bodyType = "BIG";
    ol.label = JERSEYS_BY_POS.OL[Math.floor(Math.random() * JERSEYS_BY_POS.OL.length)];
  }
  if (defStarters) {
    const dl = [defStarters.de1, defStarters.dt1, defStarters.dt2, defStarters.de2];
    const lb = [defStarters.lb1, defStarters.lb2, defStarters.lb3];
    formation.dline.forEach((slot, i) => decorate(slot, pickup(dl[i])));
    formation.lbs.forEach((slot, i) => decorate(slot, pickup(lb[i])));
    decorate(formation.cb1, pickup(defStarters.cb1));
    decorate(formation.cb2, pickup(defStarters.cb2));
    decorate(formation.s1,  pickup(defStarters.fs));
    decorate(formation.s2,  pickup(defStarters.ss));
  }
}

// Easing functions
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeInOutCubic = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;

// ─── UI / playback ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const homeSel  = $("homeTeam"), awaySel  = $("awayTeam");
const simBtn   = $("simBtn"),   playBtn  = $("playBtn");
const pauseBtn = $("pauseBtn"), endBtn   = $("endBtn");
const speedSlider = $("speedSlider"), speedLabel = $("speedLabel");
const gameArea = $("gameArea");

let gameResult = null, playHead = 0, playing = false;

// ─── Player hover tooltip ─────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function nameSpan(name) {
  if (!name) return "";
  const safe = escapeHtml(name);
  return `<span class="player-name" data-player="${safe}">${safe}</span>`;
}
function playerTier(ovr) {

// ─── Sim Many — run N games and aggregate ─────────────────────────────────
function runManyGames(home, away, hRoster, aRoster, n) {
  const agg = {
    n,
    homeWins: 0, awayWins: 0, ties: 0,
    homeScoreSum: 0, awayScoreSum: 0,
    homeScoreMax: 0, awayScoreMax: 0,
    biggestBlowout: { margin: 0, home: 0, away: 0 },
    closestGame: { margin: 999, home: 0, away: 0 },
    teamSums: {
      home: { totalYds: 0, passYds: 0, rushYds: 0, sacks: 0, sacks_allowed: 0, turnovers: 0, takeaways: 0, firstDowns: 0, pass_comp: 0, pass_att: 0, rush_att: 0 },
      away: { totalYds: 0, passYds: 0, rushYds: 0, sacks: 0, sacks_allowed: 0, turnovers: 0, takeaways: 0, firstDowns: 0, pass_comp: 0, pass_att: 0, rush_att: 0 },
    },
    qbSums: { home: { passYds: 0, passTD: 0, int: 0, rushYds: 0, rushTD: 0, sacksTaken: 0 },
              away: { passYds: 0, passTD: 0, int: 0, rushYds: 0, rushTD: 0, sacksTaken: 0 } },
    rbSums: { home: { yds: 0, td: 0 }, away: { yds: 0, td: 0 } },
    wrSums: { home: { yds: 0, td: 0 }, away: { yds: 0, td: 0 } },
    // Top defensive performers per game (best sacker, best INT-getter, best tackler)
    topSackerSums:  { home: { sk: 0 }, away: { sk: 0 } },
    topIntSums:     { home: { ints: 0 }, away: { ints: 0 } },
    topTacklerSums: { home: { tkl: 0 }, away: { tkl: 0 } },
  };
  for (let i = 0; i < n; i++) {
    const sim = new GameSimulator(home, away, hRoster, aRoster);
    const r = sim.simulate();
    const hs = r.homeScore, as = r.awayScore;
    if (hs > as) agg.homeWins++;
    else if (as > hs) agg.awayWins++;
    else agg.ties++;
    agg.homeScoreSum += hs;
    agg.awayScoreSum += as;
    if (hs > agg.homeScoreMax) agg.homeScoreMax = hs;
    if (as > agg.awayScoreMax) agg.awayScoreMax = as;
    const margin = Math.abs(hs - as);
    if (margin > agg.biggestBlowout.margin) {
      agg.biggestBlowout = { margin, home: hs, away: as };
    }
    if (margin < agg.closestGame.margin) {
      agg.closestGame = { margin, home: hs, away: as };
    }
    for (const side of ["home", "away"]) {
      const t = r.stats[side].team;
      const s = agg.teamSums[side];
      s.totalYds += t.totalYds; s.passYds += t.passYds; s.rushYds += t.rushYds;
      s.sacks += t.sacks; s.sacks_allowed += t.sacks_allowed;
      s.turnovers += t.turnovers; s.takeaways += t.takeaways;
      s.firstDowns += t.firstDowns;
      s.pass_comp += t.pass_comp; s.pass_att += t.pass_att; s.rush_att += t.rush_att;
      // Top-line player aggregates (top QB / RB / WR by yds)
      const players = Object.values(r.stats[side].players);
      const topQB = players.filter(p => p.pos === "QB").sort((a, b) => b.pass_yds - a.pass_yds)[0];
      const topRB = players.filter(p => p.rush_att > 0).sort((a, b) => b.rush_yds - a.rush_yds)[0];
      const topWR = players.filter(p => p.rec_tgt > 0).sort((a, b) => b.rec_yds - a.rec_yds)[0];
      if (topQB) {
        agg.qbSums[side].passYds    += topQB.pass_yds;
        agg.qbSums[side].passTD     += topQB.pass_td;
        agg.qbSums[side].int        += topQB.pass_int;
        agg.qbSums[side].rushYds    += topQB.rush_yds   || 0;
        agg.qbSums[side].rushTD     += topQB.rush_td    || 0;
        agg.qbSums[side].sacksTaken += topQB.sacks_taken || 0;
      }
      if (topRB) { agg.rbSums[side].yds += topRB.rush_yds; agg.rbSums[side].td += topRB.rush_td; }
      if (topWR) { agg.wrSums[side].yds += topWR.rec_yds; agg.wrSums[side].td += topWR.rec_td; }
      // Top defensive performers — pick the BEST in each category for this game
      const defPlayers = players.filter(p => ["DE","DT","LB","CB","FS","SS"].includes(p.pos));
      const topSk  = defPlayers.sort((a, b) => (b.sk || 0) - (a.sk || 0))[0];
      const topInt = defPlayers.sort((a, b) => (b.int_made || 0) - (a.int_made || 0))[0];
      const topTkl = defPlayers.sort((a, b) => (b.tkl || 0) - (a.tkl || 0))[0];
      if (topSk)  agg.topSackerSums[side].sk    += topSk.sk        || 0;
      if (topInt) agg.topIntSums[side].ints     += topInt.int_made || 0;
      if (topTkl) agg.topTacklerSums[side].tkl  += topTkl.tkl      || 0;
    }
  }
  return agg;
}

// Compute the key matchup drivers from ratings + sim results.
// Returns up to 4 ordered insights: which side won the trenches, coverage, QB, etc.
function computeKeyDrivers(agg, home, away, hRoster, aRoster) {
  const hR = buildRatings(hRoster), aR = buildRatings(aRoster);
  const drivers = [];

  // Trench (pass-rush): DL vs OL
  const homePassRush = hR.dl - aR.ol;  // home DL vs away OL
  const awayPassRush = aR.dl - hR.ol;  // away DL vs home OL
  const passRushEdge = homePassRush - awayPassRush;
  if (Math.abs(passRushEdge) >= 4) {
    const winner = passRushEdge > 0 ? home : away;
    const loser  = passRushEdge > 0 ? away : home;
    drivers.push({
      mag: Math.abs(passRushEdge),
      icon: "💪",
      text: `<b>${winner.name}</b> wins the trenches — DL ${(passRushEdge > 0 ? hR.dl : aR.dl).toFixed(0)} vs ${loser.name} OL ${(passRushEdge > 0 ? aR.ol : hR.ol).toFixed(0)}. Drives sacks + pressure throughout the game.`
    });
  }

  // QB advantage
  const qbEdge = hR.qb - aR.qb;
  if (Math.abs(qbEdge) >= 6) {
    const winner = qbEdge > 0 ? home : away;
    drivers.push({
      mag: Math.abs(qbEdge),
      icon: "🎯",
      text: `<b>${winner.name}</b> has the QB edge (${hR.qb.toFixed(0)} vs ${aR.qb.toFixed(0)}). Higher comp%, fewer INTs, deeper average throws.`
    });
  }

  // Coverage: WR vs CB+S
  const homeCoverageVsAwayWR = (hR.cb + hR.saf) / 2 - aR.wr;  // home D vs away WRs
  const awayCoverageVsHomeWR = (aR.cb + aR.saf) / 2 - hR.wr;  // away D vs home WRs
  if (Math.abs(homeCoverageVsAwayWR) >= 6) {
    const winner = homeCoverageVsAwayWR > 0 ? home : away;
    drivers.push({
      mag: Math.abs(homeCoverageVsAwayWR),
      icon: "🛡️",
      text: `<b>${winner.name}</b> coverage outclasses ${homeCoverageVsAwayWR > 0 ? away.name : home.name} receivers (${homeCoverageVsAwayWR > 0 ? `${hR.cb.toFixed(0)}/${hR.saf.toFixed(0)} CB/S vs ${aR.wr.toFixed(0)} WR` : `${aR.cb.toFixed(0)}/${aR.saf.toFixed(0)} CB/S vs ${hR.wr.toFixed(0)} WR`}).`
    });
  }
  if (Math.abs(awayCoverageVsHomeWR) >= 6 && Math.sign(awayCoverageVsHomeWR) !== Math.sign(homeCoverageVsAwayWR)) {
    const winner = awayCoverageVsHomeWR > 0 ? away : home;
    drivers.push({
      mag: Math.abs(awayCoverageVsHomeWR),
      icon: "🛡️",
      text: `<b>${winner.name}</b> coverage outclasses ${awayCoverageVsHomeWR > 0 ? home.name : away.name} receivers.`
    });
  }

  // Run-game / RB
  const rbEdge = hR.rb - aR.rb;
  if (Math.abs(rbEdge) >= 6) {
    const winner = rbEdge > 0 ? home : away;
    drivers.push({
      mag: Math.abs(rbEdge),
      icon: "🏃",
      text: `<b>${winner.name}</b> has the better RB room (${hR.rb.toFixed(0)} vs ${aR.rb.toFixed(0)}) — more chunk runs and YAC.`
    });
  }

  // Notable archetype tells from the rosters
  const archCount = (roster, pos, arch) => roster.filter(p => p.position === pos && p.archetype === arch).length;
  const tag = (count, label, who) => {
    if (count >= 2) drivers.push({ mag: count * 3, icon: "🔥", text: `<b>${who.name}</b> rolls out ${count} ${label}s — schematic advantage.` });
  };
  tag(archCount(hRoster, "CB", "SHUTDOWN"), "Shutdown CB", home);
  tag(archCount(aRoster, "CB", "SHUTDOWN"), "Shutdown CB", away);
  tag(archCount(hRoster, "DL", "SPEED"),    "Speed rusher", home);
  tag(archCount(aRoster, "DL", "SPEED"),    "Speed rusher", away);
  tag(archCount(hRoster, "S",  "BALL_HAWK"),"Ball Hawk safety", home);
  tag(archCount(aRoster, "S",  "BALL_HAWK"),"Ball Hawk safety", away);

  // Statistical tells from the sim itself
  const hSackDiff = (agg.teamSums.home.sacks - agg.teamSums.home.sacks_allowed) / agg.n;
  if (Math.abs(hSackDiff) >= 1.5) {
    const winner = hSackDiff > 0 ? home : away;
    drivers.push({ mag: Math.abs(hSackDiff) * 3, icon: "⚡", text: `<b>${winner.name}</b> wins the sack battle by ${Math.abs(hSackDiff).toFixed(1)}/game on average.` });
  }
  const hTOdiff = (agg.teamSums.home.takeaways - agg.teamSums.home.turnovers) / agg.n;
  if (Math.abs(hTOdiff) >= 0.6) {
    const winner = hTOdiff > 0 ? home : away;
    drivers.push({ mag: Math.abs(hTOdiff) * 6, icon: "🔄", text: `<b>${winner.name}</b> wins the turnover battle by ${Math.abs(hTOdiff).toFixed(2)}/game.` });
  }

  // Sort by magnitude, take top 5
  return drivers.sort((a, b) => b.mag - a.mag).slice(0, 5);
}

// ─── Sim by QB Archetype — run N games for each of the 5 QB archetypes ────
// For each archetype we swap the home team's starting QB with a freshly-
// generated test QB tuned to that archetype at the target overall, so every
// archetype gets a fair shot at the same rating ceiling.
function runManyGamesByQBArchetype(home, away, hRoster, aRoster, n, targetOvr) {
  const archetypes = Object.keys(QB_ARCHETYPES);
  // Strip ALL QBs from the cloned roster — we'll add a single test QB per arch.
  // Otherwise a 65-OVR backup could outrank our 60-OVR test QB and start instead.
  const rosterNoQB = hRoster.filter(p => p.position !== "QB");
  const origStarter = hRoster.filter(p => p.position === "QB")
    .sort((a, b) => b.overall - a.overall)[0];
  if (!origStarter) return null;
  const results = {};
  const testQBs = {};
  for (const arch of archetypes) {
    const testQB = genTestQB(arch, targetOvr);
    testQBs[arch] = testQB;
    const rosterCopy = [testQB, ...rosterNoQB];
    results[arch] = runManyGames(home, away, rosterCopy, aRoster, n);
  }
  return { archetypes, results, testQBs, targetOvr, origStarterName: origStarter.name, origStarterOvr: origStarter.overall };
}

function renderSimByQBResults(data, home, away) {
  const { archetypes, results, testQBs, targetOvr, origStarterName } = data;
  const n = results[archetypes[0]].n;
  // Build rows: one per archetype
  const rows = archetypes.map(arch => {
    const agg = results[arch];
    const winPct = agg.homeWins / agg.n * 100;
    const qb = testQBs[arch];
    const [spd, _str, agi, awr, thr] = qb.stats;
    return {
      arch,
      label: QB_ARCHETYPES[arch].label,
      blurb: QB_ARCHETYPES[arch].blurb,
      qbOvr: qb.overall,
      spd, agi, awr, thr,
      winPct,
      record: `${agg.homeWins}-${agg.awayWins}${agg.ties ? `-${agg.ties}` : ""}`,
      ptsFor:  agg.homeScoreSum / agg.n,
      ptsAgst: agg.awayScoreSum / agg.n,
      passYds: agg.qbSums.home.passYds / agg.n,
      passTD:  agg.qbSums.home.passTD  / agg.n,
      intThr:  agg.qbSums.home.int     / agg.n,
      sackT:   agg.qbSums.home.sacksTaken / agg.n,
      rushYds: agg.qbSums.home.rushYds / agg.n,
      totalYds: agg.teamSums.home.totalYds / agg.n,
    };
  });
  // Best/worst markers
  const bestBy = (key, higherIsBetter = true) => {
    let bi = 0, wi = 0;
    for (let i = 1; i < rows.length; i++) {
      if ((higherIsBetter ? rows[i][key] > rows[bi][key] : rows[i][key] < rows[bi][key])) bi = i;
      if ((higherIsBetter ? rows[i][key] < rows[wi][key] : rows[i][key] > rows[wi][key])) wi = i;
    }
    return { bi, wi };
  };
  const winMarks = bestBy("winPct", true);
  const cell = (val, marks, idx, fmt = (v) => v.toFixed(1)) => {
    let cls = "metric";
    if (idx === marks.bi) cls += " best";
    else if (idx === marks.wi) cls += " worst";
    return `<td class="${cls}">${fmt(val)}</td>`;
  };
  // Find overall winner
  const winnerRow = rows.reduce((a, b) => a.winPct >= b.winPct ? a : b);

  // Per-column best/worst (used by row-coloring trick: we color all cells of best/worst row, not per-metric)
  // Simpler: highlight best win-pct row gold, worst red.
  const html = `
    <div class="sm-title">🧪 Sim by QB Archetype · ${targetOvr} OVR</div>
    <div class="sm-sub">
      ${home.emoji} ${home.city} ${home.name} <span style="color:var(--gray)">vs</span>
      ${away.emoji} ${away.city} ${away.name}
      &middot; replacing ${origStarterName} with a generated ${targetOvr}-OVR test QB per archetype
      &middot; ${n} games each (${n * 5} total)
    </div>

    <table class="sm-qb-table">
      <thead>
        <tr>
          <th class="arch">QB Archetype · Stat Profile</th>
          <th>WIN %</th>
          <th>RECORD</th>
          <th>PF</th>
          <th>PA</th>
          <th>PASS YDS</th>
          <th>TD</th>
          <th>INT</th>
          <th>SACKED</th>
          <th>RUSH YDS</th>
          <th>TOT YDS</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((r, i) => `
          <tr class="${i === winMarks.bi ? "best" : (i === winMarks.wi ? "worst" : "")}">
            <td class="arch">
              ${r.label} <span style="color:var(--gray);font-weight:400">(${r.qbOvr})</span>
              <div class="sm-qb-blurb">${r.blurb}</div>
              <div class="sm-qb-statline">
                <span>SPD ${r.spd}</span>
                <span>AGI ${r.agi}</span>
                <span>AWR ${r.awr}</span>
                <span>THR ${r.thr}</span>
              </div>
            </td>
            ${cell(r.winPct, winMarks, i, v => v.toFixed(1) + "%")}
            <td class="metric">${r.record}</td>
            ${cell(r.ptsFor,  bestBy("ptsFor",  true),  i)}
            ${cell(r.ptsAgst, bestBy("ptsAgst", false), i)}
            ${cell(r.passYds, bestBy("passYds", true),  i, v => v.toFixed(0))}
            ${cell(r.passTD,  bestBy("passTD",  true),  i, v => v.toFixed(2))}
            ${cell(r.intThr,  bestBy("intThr",  false), i, v => v.toFixed(2))}
            ${cell(r.sackT,   bestBy("sackT",   false), i, v => v.toFixed(2))}
            ${cell(r.rushYds, bestBy("rushYds", true),  i, v => v.toFixed(0))}
            ${cell(r.totalYds, bestBy("totalYds", true),  i, v => v.toFixed(0))}
          </tr>
        `).join("")}
      </tbody>
    </table>

    <div class="sm-qb-winner">
      <div class="label">BEST ARCHETYPE FOR THIS MATCHUP</div>
      <div class="name">${winnerRow.label} — ${winnerRow.winPct.toFixed(1)}% win rate</div>
    </div>

    <div class="sm-section">
      <div style="font-size:.7rem;color:var(--gray);line-height:1.5">
        The home QB is replaced with a freshly-generated ${targetOvr}-OVR test QB per archetype.
        Stats are biased toward the archetype but the weighted overall is identical across all five.
        Rest of the roster, playbook, and matchup are held constant.
        Gold = best in column · Red = worst in column.
      </div>
    </div>
  `;
  $("simManyBody").innerHTML = html;
  document.querySelector(".sim-many-card").classList.add("wide");
  $("simManyModal").style.display = "flex";
}

function runManyGamesByPlaybook(home, away, hRoster, aRoster, n) {
  const playbooks = Object.keys(PLAYBOOKS);
  const origPb = home.playbook;
  const results = {};
  for (const pbId of playbooks) {
    const teamCopy = { ...home, playbook: pbId };
    results[pbId] = runManyGames(teamCopy, away, hRoster, aRoster, n);
  }
  return { playbooks, results, origPb };

// Each team plays every other team `gamesPerPair` times (default 1).
// 32 teams × 31 opponents / 2 unique pairs = 496 pairs.
function runPowerRankings(gamesPerPair = 1) {
  // Generate one roster per team once
  const rosters = {};
  for (const t of TEAMS) {
    rosters[t.id] = regenerateFullRoster(t, {});
  }
  // Track W/L/T + total points scored/allowed
  const standings = {};
  for (const t of TEAMS) {
    standings[t.id] = { id: t.id, team: t, w: 0, l: 0, t: 0, pf: 0, pa: 0, games: 0 };
  }
  // Round-robin
  for (let i = 0; i < TEAMS.length; i++) {
    for (let j = i + 1; j < TEAMS.length; j++) {
      const h = TEAMS[i], a = TEAMS[j];
      for (let g = 0; g < gamesPerPair; g++) {
        const sim = new GameSimulator(h, a, rosters[h.id], rosters[a.id]);
        const r = sim.simulate();
        const hs = r.homeScore, as = r.awayScore;
        const sh = standings[h.id], sa = standings[a.id];
        sh.pf += hs; sh.pa += as; sa.pf += as; sa.pa += hs;
        sh.games++; sa.games++;
        if (hs > as)      { sh.w++; sa.l++; }
        else if (as > hs) { sa.w++; sh.l++; }
        else              { sh.t++; sa.t++; }
      }
    }
  }
  // Compute win pct and rank
  const ranked = Object.values(standings).map(s => ({
    ...s,
    winPct: (s.w + s.t * 0.5) / Math.max(1, s.games),
    pd: (s.pf - s.pa) / Math.max(1, s.games),
  })).sort((a, b) => b.winPct - a.winPct || b.pd - a.pd);
  return ranked;
}

function renderPowerRankings(ranked, gamesPerPair) {
  // Group by conference for the breakdown
  const byConf = { AFC: [], NFC: [] };
  for (const r of ranked) (byConf[r.team.conference] || (byConf[r.team.conference] = [])).push(r);
  const totalGames = ranked.reduce((s, r) => s + r.games, 0) / 2;  // each game double-counted

  const rankRow = (r, rank) => `
    <tr>
      <td class="pr-rank">${rank}</td>
      <td class="pr-team">
        <span class="pr-emoji">${r.team.emoji}</span>
        <span class="pr-name">${r.team.city} ${r.team.name}</span>
        <span class="pr-conf">${r.team.conference}·${r.team.division}</span>
      </td>
      <td class="pr-record">${r.w}-${r.l}${r.t ? `-${r.t}` : ""}</td>
      <td class="pr-pct">${(r.winPct * 100).toFixed(1)}%</td>
      <td class="pr-pf">${(r.pf / r.games).toFixed(1)}</td>
      <td class="pr-pa">${(r.pa / r.games).toFixed(1)}</td>
      <td class="pr-pd ${r.pd >= 0 ? "pos" : "neg"}">${r.pd >= 0 ? "+" : ""}${r.pd.toFixed(1)}</td>
    </tr>
  `;

  const html = `
    <div class="sm-title">📊 Power Rankings</div>
    <div class="sm-sub">
      Round-robin across all ${TEAMS.length} teams · ${gamesPerPair} game${gamesPerPair > 1 ? "s" : ""} per matchup · ${totalGames} games total
    </div>

    <table class="pr-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>Record</th>
          <th>WIN %</th>
          <th>PF/G</th>
          <th>PA/G</th>
          <th>DIFF</th>
        </tr>
      </thead>
      <tbody>
        ${ranked.map((r, i) => rankRow(r, i + 1)).join("")}
      </tbody>
    </table>

    <div class="sm-section">
      <h4>By conference</h4>
      <div class="pr-conf-grid">
        ${["AFC", "NFC"].map(c => `
          <div class="pr-conf-block">
            <div class="pr-conf-title">${c}</div>
            <ol class="pr-conf-list">
              ${byConf[c].slice(0, 8).map(r => `
                <li><span class="pr-emoji">${r.team.emoji}</span> ${r.team.name} <span style="color:var(--gray)">${r.w}-${r.l}${r.t ? `-${r.t}` : ""}</span></li>
              `).join("")}
            </ol>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="sm-section">
      <div style="font-size:.7rem;color:var(--gray);line-height:1.5">
        Tiebreakers: win pct first, then point differential. With only ${gamesPerPair} game${gamesPerPair > 1 ? "s" : ""} per matchup, expect some upsets and variance.
        Bump games-per-pair higher for a smoother ranking.
      </div>
    </div>
  `;
  $("simManyBody").innerHTML = html;
  document.querySelector(".sim-many-card").classList.add("wide");
  $("simManyModal").style.display = "flex";
}

// ─── Tournament Bracket — single-elimination playoff ───────────────────
// Seeds the top 8 (or 16) teams from a quick round-robin, then runs a
// single-elimination bracket. Each round runs `gamesPerRound` games and
// the team that wins more advances (tiebreaker: total points scored).
function runTournament(bracketSize, gamesPerRound) {
  // 1) Quick seed round — every team plays 1 game vs every other
  const rosters = {};
  for (const t of TEAMS) rosters[t.id] = regenerateFullRoster(t, {});
  const standings = {};
  for (const t of TEAMS) standings[t.id] = { team: t, w: 0, pf: 0, games: 0 };
  for (let i = 0; i < TEAMS.length; i++) {
    for (let j = i + 1; j < TEAMS.length; j++) {
      const h = TEAMS[i], a = TEAMS[j];
      const sim = new GameSimulator(h, a, rosters[h.id], rosters[a.id]);
      const r = sim.simulate();
      standings[h.id].pf += r.homeScore; standings[a.id].pf += r.awayScore;
      standings[h.id].games++; standings[a.id].games++;
      if (r.homeScore > r.awayScore) standings[h.id].w++;
      else if (r.awayScore > r.homeScore) standings[a.id].w++;
    }
  }
  const seeded = Object.values(standings)
    .sort((a, b) => b.w - a.w || b.pf - a.pf)
    .slice(0, bracketSize);

  // 2) Bracket — standard playoff pairing: 1v8, 4v5, 2v7, 3v6 (then 1v16 etc for 16-team)
  const pairings = (size) => {
    const out = [];
    for (let i = 0; i < size / 2; i++) out.push([i, size - 1 - i]);
    // Reorder so winners meet in proper bracket positions
    if (size === 8)  return [[0,7],[3,4],[1,6],[2,5]];
    if (size === 16) return [[0,15],[7,8],[3,12],[4,11],[1,14],[6,9],[2,13],[5,10]];
    return out;
  };
  const firstRound = pairings(bracketSize);

  const playMatchup = (hSeed, aSeed) => {
    // Higher seed (lower index) hosts
    const home = hSeed.team, away = aSeed.team;
    let homeW = 0, awayW = 0, homePF = 0, awayPF = 0;
    const games = [];
    for (let g = 0; g < gamesPerRound; g++) {
      const sim = new GameSimulator(home, away, rosters[home.id], rosters[away.id]);
      const r = sim.simulate();
      games.push({ homeScore: r.homeScore, awayScore: r.awayScore });
      homePF += r.homeScore; awayPF += r.awayScore;
      if (r.homeScore > r.awayScore) homeW++;
      else if (r.awayScore > r.homeScore) awayW++;
    }
    const winner = homeW > awayW ? hSeed : awayW > homeW ? aSeed : (homePF >= awayPF ? hSeed : aSeed);
    return { home: hSeed, away: aSeed, homeW, awayW, homePF, awayPF, winner, games };
  };

  const rounds = [];
  let currentRound = firstRound.map(([i, j]) => playMatchup(seeded[i], seeded[j]));
  rounds.push(currentRound);
  while (currentRound.length > 1) {
    const next = [];
    for (let i = 0; i < currentRound.length; i += 2) {
      next.push(playMatchup(currentRound[i].winner, currentRound[i + 1].winner));
    }
    rounds.push(next);
    currentRound = next;
  }
  const champion = currentRound[0].winner;
  return { bracketSize, gamesPerRound, seeded, rounds, champion };
}

function renderTournament(data) {
  const { bracketSize, gamesPerRound, seeded, rounds, champion } = data;
  const roundNames = bracketSize === 8
    ? ["Quarterfinals", "Semifinals", "Championship"]
    : ["First Round", "Quarterfinals", "Semifinals", "Championship"];

  const matchupCard = (m, roundIdx) => {
    const h = m.home, a = m.away;
    const hSeed = seeded.indexOf(h) + 1;
    const aSeed = seeded.indexOf(a) + 1;
    const hWin = m.winner === h;
    const aWin = m.winner === a;
    const homeScore = gamesPerRound > 1 ? `${m.homeW}-${m.awayW}` : `${m.games[0].homeScore}`;
    const awayScore = gamesPerRound > 1 ? "" : `${m.games[0].awayScore}`;
    const detail = gamesPerRound > 1
      ? `${m.homeW}-${m.awayW} series, ${Math.round(m.homePF/gamesPerRound)}-${Math.round(m.awayPF/gamesPerRound)} avg`
      : `${m.games[0].homeScore} - ${m.games[0].awayScore}`;
    return `
      <div class="tn-matchup">
        <div class="tn-team ${hWin ? "winner" : "loser"}">
          <span class="tn-seed">#${hSeed}</span>
          <span class="tn-emoji">${h.team.emoji}</span>
          <span class="tn-name">${h.team.name}</span>
        </div>
        <div class="tn-score">${detail}</div>
        <div class="tn-team ${aWin ? "winner" : "loser"}">
          <span class="tn-seed">#${aSeed}</span>
          <span class="tn-emoji">${a.team.emoji}</span>
          <span class="tn-name">${a.team.name}</span>
        </div>
      </div>
    `;
  };

  const html = `
    <div class="sm-title">🏆 Tournament — Top ${bracketSize}</div>
    <div class="sm-sub">
      Single elimination · ${gamesPerRound > 1 ? `Best of ${gamesPerRound * 2 - 1} per round` : "1 game per round"}
    </div>

    <div class="tn-champion">
      <div class="label">CHAMPION</div>
      <div class="trophy">🏆</div>
      <div class="name">${champion.team.emoji} ${champion.team.city} ${champion.team.name}</div>
      <div class="sub">#${seeded.indexOf(champion) + 1} seed · ${champion.team.conference} ${champion.team.division}</div>
    </div>

    <div class="tn-rounds">
      ${rounds.map((round, ri) => `
        <div class="tn-round">
          <h4>${roundNames[ri]}</h4>
          <div class="tn-matchups">
            ${round.map(m => matchupCard(m, ri)).join("")}
          </div>
        </div>
      `).join("")}
    </div>

    <div class="sm-section">
      <h4>Seeding (from round-robin)</h4>
      <table class="sm-stats-table" style="font-size:.74rem">
        ${seeded.map((s, i) => `
          <tr>
            <td style="text-align:left;width:8%">#${i + 1}</td>
            <td style="text-align:left">${s.team.emoji} ${s.team.city} ${s.team.name}</td>
            <td style="text-align:right">${s.w}-${s.games - s.w}</td>
            <td style="text-align:right;color:var(--gray)">${(s.pf / s.games).toFixed(1)} PPG</td>
          </tr>
        `).join("")}
      </table>
    </div>
  `;
  $("simManyBody").innerHTML = html;
  document.querySelector(".sim-many-card").classList.add("wide");
  $("simManyModal").style.display = "flex";
}

  // 500 → 16-team, 3 games/round
  // 1000 → 16-team, 5 games/round (best of 9)

playBtn.addEventListener("click", () => {
  if (!playing) {
    playing = true;
    if (!animState) {
      startNextPlay();
    } else {
      // Resume mid-play: shift timers so we pick up where we left off.
      const now = performance.now();
      if (animState.elapsedOnPause != null) {
        animState.startTime = now - animState.elapsedOnPause;
        animState.elapsedOnPause = null;
      }
      if (animState.holdElapsedOnPause != null) {
        animState.holdStart = now - animState.holdElapsedOnPause;
        animState.holdElapsedOnPause = null;
      }
      rafId = requestAnimationFrame(tick);
    }
    updateButtons();
  }
});
pauseBtn.addEventListener("click", () => {
  playing = false;
  cancelAnimationFrame(rafId);
  if (animState) {
    const now = performance.now();
    animState.elapsedOnPause = now - animState.startTime;
    if (animState.holdStart != null) animState.holdElapsedOnPause = now - animState.holdStart;
  }
  updateButtons();
});
endBtn.addEventListener("click", () => {
  playing = false;
  cancelAnimationFrame(rafId);
  playHead = gameResult.plays.length;
  animState = null;
  renderStaticEnd();
  updateButtons();
});

function updateButtons() {
  const done = !gameResult || playHead >= gameResult.plays.length;
  playBtn.disabled  = !gameResult || playing || done;
  pauseBtn.disabled = !gameResult || !playing;
  endBtn.disabled   = !gameResult || done;
}
