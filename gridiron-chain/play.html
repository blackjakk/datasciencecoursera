<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GridironChain — Football Simulator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>">
<style>
  :root {
    --green: #1a5c2e; --green-lt: #2e8b57; --green-dk: #0d3318;
    --gold: #c8a900;  --gold-lt:  #f0cc30;
    --bg: #0a0f0a;    --bg2: #111811; --bg3: #1a221a;
    --card: #182018; --border: #2e3d2e;
    --white: #f0f0f0; --gray: #999; --red: #c0392b;
    --field: #1f6b34; --field-dk: #185b2c; --field-lt: #2a7d40;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--white);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; line-height: 1.5;
  }
  .header {
    background: linear-gradient(180deg, var(--green-dk), #050a05);
    border-bottom: 2px solid var(--green);
    padding: 1.25rem 2rem; text-align: center;
  }
  .header h1 {
    font-size: 1.8rem; letter-spacing: -1px;
    color: var(--gold); font-weight: 900;
  }
  .header h1 span { color: var(--white); }
  .header p { color: var(--gray); font-size: .85rem; margin-top: .25rem; }
  .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }

  /* Team Selector */
  .selector {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 1rem; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem;
  }
  .vs-label { font-weight: 900; font-size: 1.5rem; color: var(--gray); }
  label { font-size: .8rem; color: var(--gray); display: block; margin-bottom: .35rem; }
  select, input[type="number"] {
    background: var(--bg2); border: 1px solid var(--border); color: var(--white);
    padding: .55rem .85rem; border-radius: 6px; width: 100%;
    font-size: .95rem; font-family: inherit;
  }
  select:focus { outline: none; border-color: var(--green-lt); }

  /* Buttons */
  .btn {
    padding: .65rem 1.25rem; border-radius: 6px; cursor: pointer;
    border: none; font-weight: 700; font-size: .9rem;
    transition: all .15s; display: inline-flex; align-items: center; gap: .4rem;
  }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-gold:hover { background: var(--gold-lt); }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-lt); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--white); }
  .btn-outline:hover { border-color: var(--green-lt); color: var(--green-lt); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-sm { padding: .35rem .75rem; font-size: .8rem; }

  /* Controls bar */
  .controls {
    display: flex; gap: .5rem; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .speed-control {
    margin-left: auto; display: flex; align-items: center; gap: .5rem;
    color: var(--gray); font-size: .85rem;
  }

  /* Game layout */
  .game-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 1rem; }
  @media (max-width: 1100px) { .game-grid { grid-template-columns: 1fr; } }

  /* Field viewer */
  .field-wrap {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: .75rem; margin-bottom: 1rem;
  }
  #field {
    width: 100%; height: auto; display: block; border-radius: 6px;
    background: var(--field-dk);
  }
  .field-overlay {
    display: flex; align-items: center; justify-content: space-between;
    padding: .35rem .5rem .55rem .5rem; font-size: .8rem; color: var(--gray);
  }
  .field-status {
    font-weight: 700; color: var(--white); font-size: .85rem;
  }
  .play-caption {
    background: var(--bg3); border-radius: 6px; padding: .55rem .8rem;
    font-size: .9rem; min-height: 38px; display: flex; align-items: center;
    margin-top: .4rem; border-left: 3px solid var(--green-lt);
    transition: border-color .15s;
  }
  .play-caption.score    { border-color: var(--gold); color: var(--gold-lt); font-weight: 700; }
  .play-caption.int      { border-color: #ff6060; color: #ff8a8a; font-weight: 700; }
  .play-caption.fumble   { border-color: #ff6060; color: #ff8a8a; font-weight: 700; }
  .play-caption.sack     { border-color: #c8a900; }
  .play-caption.fg_good  { border-color: var(--gold); color: var(--gold-lt); }
  .play-caption.fg_miss  { border-color: #ff6060; color: #ff8a8a; }
  .play-caption.kickoff,
  .play-caption.punt     { border-color: #4b9bd5; }

  /* Scoreboard */
  .scoreboard {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 1.5rem; padding: 1rem 1.5rem;
    background: var(--bg2); border-radius: 10px;
    border: 1px solid var(--border); margin-bottom: 1rem;
    align-items: center;
  }
  .score-team { text-align: center; }
  .score-team-emoji { font-size: 1.6rem; }
  .score-team-name { font-size: .8rem; color: var(--gray); margin-top: .15rem; }
  .score-team-full { font-weight: 700; font-size: .8rem; }
  .score-num { font-size: 3rem; font-weight: 900; line-height: 1; margin-top: .15rem; }
  .score-num.win { color: var(--gold); }
  .score-mid { text-align: center; }
  .score-status { font-size: .8rem; color: var(--gray); }
  .score-status.live { color: #4caf7a; }
  .score-status.final { color: var(--gold); font-weight: 700; }
  .quarter-clock { font-size: 1.1rem; font-weight: 700; margin-top: .25rem; }
  .down-distance { font-size: .78rem; color: var(--gray); margin-top: .15rem; }
  .poss-indicator { font-size: .75rem; color: var(--gold); margin-top: .15rem; }

  /* Progress bar */
  .progress-wrap { margin-bottom: .75rem; }
  .progress-label { font-size: .75rem; color: var(--gray); margin-bottom: .25rem; display: flex; justify-content: space-between; }
  .progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green-lt); transition: width .12s; }

  /* Play log (smaller now) */
  .play-log {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: .5rem; max-height: 240px; overflow-y: auto; font-size: .82rem;
  }
  .play-entry {
    padding: .35rem .5rem; border-radius: 4px; margin-bottom: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .play-entry .meta { color: var(--gray); font-size: .7rem; margin-right: .5rem; }
  .play-entry.score    { background: #1a3300; color: var(--gold); font-weight: 700; }
  .play-entry.int      { background: #330000; color: #ff8a8a; }
  .play-entry.fumble   { background: #330000; color: #ff8a8a; }
  .play-entry.sack     { background: #1a1a00; }
  .play-entry.fg_good  { background: #1a3300; color: var(--gold); }
  .play-entry.fg_miss  { background: #2a1500; color: #ff8a8a; }
  .play-entry.halftime,
  .play-entry.ot,
  .play-entry.quarter {
    background: var(--bg3); text-align: center; font-weight: 700; color: var(--gold-lt);
    padding: .55rem; margin: .25rem 0;
  }
  .play-entry.kickoff  { background: var(--green-dk); }

  /* Card */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem; margin-bottom: 1rem;
  }
  .card-header { font-weight: 700; color: var(--gold); margin-bottom: .65rem; font-size: .95rem; }
  .ratings-table { width: 100%; }
  .ratings-table tr td { padding: .25rem .35rem; }
  .ratings-table .lbl { text-align: center; color: var(--gray); font-size: .72rem; font-weight: 600; letter-spacing: .5px; }
  .ratings-table .home { text-align: right; font-weight: 700; }
  .ratings-table .away { text-align: left; font-weight: 700; }
  .ratings-table .winner { color: var(--green-lt); }

  /* Box score */
  .boxscore-tabs { display: flex; gap: .25rem; margin-bottom: .65rem; }
  .boxscore-tab {
    flex: 1; padding: .35rem .25rem; border-radius: 6px; cursor: pointer;
    background: var(--bg3); border: 1px solid var(--border); color: var(--gray);
    font-size: .72rem; font-weight: 700; text-align: center; letter-spacing: .3px;
    transition: all .12s;
  }
  .boxscore-tab:hover { color: var(--white); }
  .boxscore-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
  .boxscore-section { font-size: .78rem; }
  .boxscore-section h4 {
    margin: .9rem 0 .3rem; font-size: .72rem; color: var(--gold);
    letter-spacing: .5px; font-weight: 700; padding-bottom: .2rem;
    border-bottom: 1px solid var(--border);
  }
  .boxscore-section h4:first-child { margin-top: 0; }
  .boxscore-table { width: 100%; border-collapse: collapse; font-size: .76rem; }
  .boxscore-table th, .boxscore-table td { padding: .25rem .35rem; text-align: right; }
  .boxscore-table th { color: var(--gray); font-weight: 600; font-size: .68rem; letter-spacing: .3px; border-bottom: 1px solid var(--border); }
  .boxscore-table td.name { text-align: left; font-weight: 700; color: var(--white); }
  .boxscore-table td.pos { text-align: left; color: var(--gray); font-size: .68rem; width: 24px; }
  .team-totals {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: .5rem;
    padding: .4rem 0; font-size: .76rem; border-bottom: 1px solid var(--border);
  }
  .team-totals .lbl { text-align: center; color: var(--gray); font-size: .68rem; letter-spacing: .3px; }
  .team-totals .h { text-align: right; font-weight: 700; }
  .team-totals .a { text-align: left; font-weight: 700; }

  /* Drive log */
  .drive-entry {
    padding: .35rem .5rem; border-bottom: 1px solid var(--border);
    font-size: .8rem; display: flex; justify-content: space-between;
  }
  .drive-team-home { color: var(--green-lt); font-weight: 700; }
  .drive-team-away { color: var(--gold); font-weight: 700; }
  .drive-result-td { color: var(--gold); font-weight: 700; }

  .empty {
    text-align: center; color: var(--gray); padding: 4rem 1rem;
  }
  .empty-icon { font-size: 4rem; margin-bottom: .5rem; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .badge {
    display: inline-block; padding: .15rem .55rem; border-radius: 99px;
    font-size: .7rem; font-weight: 700; letter-spacing: .4px;
  }
  .badge-afc { background: #001a40; color: #5b9bd5; }
  .badge-nfc { background: #3d0000; color: #e07070; }
  .badge-gold { background: #3d3000; color: var(--gold); }
</style>
</head>
<body>

<div class="header">
  <h1>🏈 Gridiron<span>Chain</span></h1>
  <p>2D Animated Football Simulator — Standalone Demo</p>
</div>

<div class="container">

  <!-- Team selector -->
  <div class="selector">
    <div>
      <label>Home Team</label>
      <select id="homeTeam"></select>
    </div>
    <div class="vs-label">VS</div>
    <div>
      <label>Away Team</label>
      <select id="awayTeam"></select>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-gold" id="simBtn">⚡ Simulate Game</button>
    <button class="btn btn-primary" id="playBtn" disabled>▶ Play</button>
    <button class="btn btn-outline" id="pauseBtn" disabled>⏸ Pause</button>
    <button class="btn btn-outline" id="endBtn" disabled>⏭ Skip to End</button>
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" id="speedSlider" min="1" max="10" step="1" value="5" style="width: 130px;" />
      <span id="speedLabel">1.0×</span>
    </div>
  </div>

  <!-- Game area -->
  <div id="gameArea" class="empty">
    <div class="empty-icon">🏈</div>
    <div style="font-size: 1.2rem; font-weight: 700; margin-bottom: .25rem;">Pick two teams and hit Simulate</div>
    <div style="color: var(--gray);">Animated 2D field with live play-by-play action</div>
  </div>

</div>

<script>
// ─── 32 fictional teams ────────────────────────────────────────────────────
const TEAMS = [
  { id:1,  city:"New Albion",  name:"Kraken",     conference:"AFC", division:"East",  primary:"#00264D", secondary:"#84B6F4", emoji:"🦑" },
  { id:2,  city:"Stonehaven",  name:"Titans",     conference:"AFC", division:"East",  primary:"#4B92DB", secondary:"#FFFFFF", emoji:"⚡" },
  { id:3,  city:"Ironport",    name:"Wolves",     conference:"AFC", division:"East",  primary:"#1A1A1A", secondary:"#A0A0A0", emoji:"🐺" },
  { id:4,  city:"Coldwater",   name:"Buccaneers", conference:"AFC", division:"East",  primary:"#0072CE", secondary:"#FFB81C", emoji:"🏴‍☠️" },
  { id:5,  city:"Steelforge",  name:"Hammers",    conference:"AFC", division:"North", primary:"#FFB612", secondary:"#101820", emoji:"🔨" },
  { id:6,  city:"Riverdale",   name:"Grizzlies",  conference:"AFC", division:"North", primary:"#FB4F14", secondary:"#000000", emoji:"🐻" },
  { id:7,  city:"Coalport",    name:"Ravens",     conference:"AFC", division:"North", primary:"#241773", secondary:"#9E7C0C", emoji:"🦅" },
  { id:8,  city:"Lakewood",    name:"Bulldogs",   conference:"AFC", division:"North", primary:"#0B162A", secondary:"#C83803", emoji:"🐶" },
  { id:9,  city:"Sunbelt",     name:"Vipers",     conference:"AFC", division:"South", primary:"#002244", secondary:"#69BE28", emoji:"🐍" },
  { id:10, city:"Palmetto",    name:"Jaguars",    conference:"AFC", division:"South", primary:"#006778", secondary:"#D7A22A", emoji:"🐆" },
  { id:11, city:"Bayou",       name:"Gators",     conference:"AFC", division:"South", primary:"#03202F", secondary:"#A71930", emoji:"🐊" },
  { id:12, city:"Redrock",     name:"Stallions",  conference:"AFC", division:"South", primary:"#4F2683", secondary:"#FFC62F", emoji:"🐎" },
  { id:13, city:"Desert",      name:"Scorpions",  conference:"AFC", division:"West",  primary:"#002244", secondary:"#C60C30", emoji:"🦂" },
  { id:14, city:"Silicon",     name:"Raiders",    conference:"AFC", division:"West",  primary:"#101820", secondary:"#A5ACAF", emoji:"⚔️" },
  { id:15, city:"Cascade",     name:"Thunder",    conference:"AFC", division:"West",  primary:"#002C5F", secondary:"#69BE28", emoji:"⛈️" },
  { id:16, city:"Frontier",    name:"Outlaws",    conference:"AFC", division:"West",  primary:"#E31837", secondary:"#FFB81C", emoji:"🤠" },
  { id:17, city:"Capitol",     name:"Sentinels",  conference:"NFC", division:"East",  primary:"#003594", secondary:"#869397", emoji:"🛡️" },
  { id:18, city:"Metro",       name:"Predators",  conference:"NFC", division:"East",  primary:"#004C54", secondary:"#A5ACAF", emoji:"🦁" },
  { id:19, city:"Eastport",    name:"Eagles",     conference:"NFC", division:"East",  primary:"#004C54", secondary:"#A5ACAF", emoji:"🦅" },
  { id:20, city:"Colonial",    name:"Minutemen",  conference:"NFC", division:"East",  primary:"#003366", secondary:"#B0B7BC", emoji:"🎯" },
  { id:21, city:"Great Lakes", name:"Frost",      conference:"NFC", division:"North", primary:"#4F2683", secondary:"#FFC62F", emoji:"❄️" },
  { id:22, city:"Ironwood",    name:"Vikings",    conference:"NFC", division:"North", primary:"#4B2E83", secondary:"#FFC62F", emoji:"🪓" },
  { id:23, city:"Prairie",     name:"Wolves",     conference:"NFC", division:"North", primary:"#203731", secondary:"#FFB612", emoji:"🐺" },
  { id:24, city:"Blizzard",    name:"Bears",      conference:"NFC", division:"North", primary:"#0B162A", secondary:"#C83803", emoji:"🐻" },
  { id:25, city:"Magnolia",    name:"Saints",     conference:"NFC", division:"South", primary:"#D3BC8D", secondary:"#101820", emoji:"⚜️" },
  { id:26, city:"Gulf",        name:"Marauders",  conference:"NFC", division:"South", primary:"#D50A0A", secondary:"#0A0A08", emoji:"🏴" },
  { id:27, city:"Swamp",       name:"Kings",      conference:"NFC", division:"South", primary:"#002244", secondary:"#FFC62F", emoji:"👑" },
  { id:28, city:"Peach State", name:"Falcons",    conference:"NFC", division:"South", primary:"#A71930", secondary:"#000000", emoji:"🦅" },
  { id:29, city:"Pacific",     name:"Surge",      conference:"NFC", division:"West",  primary:"#002244", secondary:"#69BE28", emoji:"🌊" },
  { id:30, city:"Redwood",     name:"Giants",     conference:"NFC", division:"West",  primary:"#0B2265", secondary:"#A71930", emoji:"🌲" },
  { id:31, city:"Canyon",      name:"Hawks",      conference:"NFC", division:"West",  primary:"#002244", secondary:"#A5ACAF", emoji:"🦅" },
  { id:32, city:"Volcanic",    name:"Fury",       conference:"NFC", division:"West",  primary:"#97233F", secondary:"#000000", emoji:"🌋" },
];
const getTeam = id => TEAMS.find(t => t.id === Number(id));

// ─── Player generation ────────────────────────────────────────────────────
const FIRST = ["Marcus","Tyler","Darius","Jordan","Malik","Devon","Elijah","Xavier","Cameron","Jaylen","Trevor","Caleb","Nathan","Brandon","Derrick","Antonio","Deon","Travon","Rasheed","Quincy","Zach","Hunter","Brayden","Cole","Jake","Ryan","Luke","Evan","Aaron","Chris","Isaiah","Jamal","Tyrone","Lamar","Andre","Reggie","Stefon","Amari","Cooper","Travis"];
const LAST = ["Johnson","Williams","Brown","Jones","Davis","Miller","Wilson","Moore","Taylor","Anderson","Thomas","Jackson","White","Harris","Martin","Thompson","Garcia","Martinez","Robinson","Clark","Rodriguez","Lewis","Lee","Walker","Hall","Allen","Young","Hill","Flores","Green","Adams","Nelson","Baker","Carter","Mitchell","Roberts","Turner","Phillips","Campbell","Reed"];

const ROSTER_SLOTS = { QB:3, RB:4, WR:6, TE:3, OL:8, DL:6, LB:5, CB:5, S:3, K:1, P:1 };

const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const randf = (a, b) => Math.random() * (b - a) + a;
const randName = () => `${FIRST[rand(0, FIRST.length - 1)]} ${LAST[rand(0, LAST.length - 1)]}`;

function statsFor(pos, tier) {
  const r = { elite:{lo:78,hi:99}, good:{lo:63,hi:80}, average:{lo:48,hi:67}, poor:{lo:35,hi:54} }[tier];
  const b = () => rand(r.lo, r.hi);
  const l = () => rand(Math.max(30, r.lo - 14), Math.max(45, r.hi - 14));
  switch (pos) {
    case "QB": return [l(),l(),b(),b(),b(),l(),l(),l(),l(),l(),l()];
    case "RB": return [b(),b(),b(),b(),l(),b(),l(),l(),l(),l(),l()];
    case "WR": return [b(),l(),b(),b(),l(),b(),l(),l(),b(),l(),l()];
    case "TE": return [b(),b(),b(),b(),l(),b(),b(),l(),l(),l(),l()];
    case "OL": return [l(),b(),b(),b(),l(),l(),b(),l(),l(),l(),l()];
    case "DL": return [b(),b(),b(),b(),l(),l(),l(),b(),l(),b(),l()];
    case "LB": return [b(),b(),b(),b(),l(),l(),l(),b(),b(),b(),l()];
    case "CB": return [b(),l(),b(),b(),l(),l(),l(),l(),b(),b(),l()];
    case "S":  return [b(),b(),b(),b(),l(),l(),l(),l(),b(),b(),l()];
    default:   return [l(),l(),l(),b(),l(),l(),l(),l(),l(),l(),b()];
  }
}
function calcOverall(pos, s) {
  const [spd,str,agi,awr,thr,cat,blk,prs,cov,tck,kpw] = s;
  let v;
  switch (pos) {
    case "QB": v = spd*10+agi*15+awr*25+thr*50; break;
    case "RB": v = spd*35+str*20+agi*25+cat*20; break;
    case "WR": v = spd*30+agi*25+cat*35+awr*10; break;
    case "TE": v = spd*20+cat*40+blk*30+str*10; break;
    case "OL": v = str*35+blk*45+agi*20;        break;
    case "DL": v = str*35+prs*40+spd*25;        break;
    case "LB": v = prs*25+cov*25+tck*30+spd*20; break;
    case "CB": v = spd*30+agi*25+cov*35+awr*10; break;
    case "S":  v = spd*25+cov*35+tck*30+awr*10; break;
    default:   v = kpw*50+awr*50;
  }
  return Math.min(99, Math.max(40, Math.round(v / 100)));
}
function genPlayer(pos, tier) {
  const stats = statsFor(pos, tier);
  return { name: randName(), position: pos, age: rand(21, 33), stats, overall: calcOverall(pos, stats) };
}
function genRoster() {
  const r = [];
  for (const [pos, count] of Object.entries(ROSTER_SLOTS)) {
    for (let i = 0; i < count; i++) {
      const tier = i === 0 ? "good" : i === 1 ? "average" : "poor";
      r.push(genPlayer(pos, tier));
    }
  }
  return r;
}

// ─── Game simulator ───────────────────────────────────────────────────────
function normal(mean, sd) {
  const u1 = Math.random() || 0.0001, u2 = Math.random();
  return Math.round(mean + Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2) * sd);
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function buildRatings(roster) {
  const byPos = {};
  for (const p of roster) (byPos[p.position] ||= []).push(p);
  for (const k in byPos) byPos[k].sort((a,b) => b.overall - a.overall);
  const g = (pos, n) => {
    const arr = (byPos[pos] || []).slice(0, n);
    return arr.length ? arr.reduce((s,p) => s + p.overall, 0) / arr.length : 50;
  };
  return {
    offense: g("QB",1)*0.30 + g("RB",2)*0.15 + g("WR",4)*0.25 + g("TE",1)*0.10 + g("OL",5)*0.20,
    defense: g("DL",4)*0.30 + g("LB",3)*0.30 + g("CB",2)*0.25 + g("S",2)*0.15,
    qb: g("QB",1), rb: g("RB",2), wr: g("WR",4), ol: g("OL",5),
    dl: g("DL",4), lb: g("LB",3), cb: g("CB",2), saf: g("S",2),
    k:  g("K",1),
    starters: {
      qb:  (byPos.QB?.[0])?.name || "QB",
      rb:  (byPos.RB?.[0])?.name || "RB",
      wr1: (byPos.WR?.[0])?.name || "WR1",
      wr2: (byPos.WR?.[1])?.name || "WR2",
      te:  (byPos.TE?.[0])?.name || "TE",
      k:   (byPos.K?.[0])?.name  || "K",
    }
  };
}

class GameSimulator {
  constructor(home, away, hRoster, aRoster) {
    this.home = home; this.away = away;
    this.homeR = buildRatings(hRoster); this.awayR = buildRatings(aRoster);
    this.score = { home: 0, away: 0 };
    this.quarter = 1; this.time = 900;
    this.poss = Math.random() < 0.5 ? "home" : "away";
    this.yardLine = 25; this.down = 1; this.ytg = 10;
    this.plays = []; this.drives = [];
    this.stats = {
      home: this._buildTeamStats(this.homeR.starters),
      away: this._buildTeamStats(this.awayR.starters),
    };
    this._lastBallCarrier = null; // who got the ball on the last positive play
    this._lastBallType = null;    // 'pass' | 'rush'
  }
  _buildTeamStats(starters) {
    const players = {};
    const add = (name, pos) => { if (name && !players[name]) players[name] = { name, pos, ...this._emptyLine() }; };
    add(starters.qb, "QB");
    add(starters.rb, "RB");
    add(starters.wr1, "WR");
    add(starters.wr2, "WR");
    add(starters.te, "TE");
    add(starters.k,  "K");
    return {
      team: {
        plays: 0, totalYds: 0, passYds: 0, rushYds: 0,
        pass_att: 0, pass_comp: 0, rush_att: 0,
        sacks: 0, sacks_allowed: 0, turnovers: 0, takeaways: 0,
        firstDowns: 0, thirdAtt: 0, thirdConv: 0, fourthAtt: 0, fourthConv: 0,
        timeOfPoss: 0, penalties: 0, penaltyYds: 0,
      },
      players,
    };
  }
  _emptyLine() {
    return {
      pass_att: 0, pass_comp: 0, pass_yds: 0, pass_td: 0, pass_int: 0, pass_long: 0,
      sacks_taken: 0, sack_yds: 0,
      rush_att: 0, rush_yds: 0, rush_td: 0, rush_long: 0,
      rec_tgt: 0, rec: 0, rec_yds: 0, rec_td: 0, rec_long: 0,
      fg_made: 0, fg_att: 0, fg_long: 0, xp_made: 0, xp_att: 0,
    };
  }
  get offR()     { return this.poss === "home" ? this.homeR : this.awayR; }
  get defR()     { return this.poss === "home" ? this.awayR : this.homeR; }
  get possTeam() { return this.poss === "home" ? this.home : this.away; }
  get offStats() { return this.stats[this.poss]; }
  get defStats() { return this.stats[this.poss === "home" ? "away" : "home"]; }
  _pushVisual(data) {
    this.plays.push({
      ...data,
      poss: this.poss,
      quarter: this.quarter,
      time: this.time,
      down: this.down,
      ytg: this.ytg,
      yardLine: this.yardLine,
      homeScore: this.score.home,
      awayScore: this.score.away,
      statsSnap: JSON.parse(JSON.stringify(this.stats)),
    });
  }
  _score(pts, type) {
    this.score[this.poss] += pts;
    this._pushVisual({ kind: "score", desc: `${this.possTeam.city} ${this.possTeam.name} — ${type} (+${pts})` });
  }
  _play() {
    const adv = (this.offR.offense - this.defR.defense) / 100;
    const dt = clamp(normal(33, 9), 12, 55);
    this.time -= dt;
    if (this.time < 0) this.time = 0;
    const startYard = this.yardLine;
    const off = this.offStats, def = this.defStats;
    const QB = this.offR.starters.qb, RB = this.offR.starters.rb, K = this.offR.starters.k;
    const isThird = this.down === 3, isFourth = this.down === 4;

    if (this.down === 4) {
      const toEZ = 100 - this.yardLine;
      // FG attempt
      if (toEZ <= 52 && this.ytg <= 5) {
        const dist = toEZ + 17;
        const fgPct = clamp(0.95 - (dist - 20) * 0.018 + (this.offR.k - 60) / 250, 0.20, 0.97);
        const kStats = off.players[K]; if (kStats) { kStats.fg_att++; }
        off.team.fourthAtt++;
        if (Math.random() < fgPct) {
          if (kStats) { kStats.fg_made++; if (dist > kStats.fg_long) kStats.fg_long = dist; }
          this._score(3, `${dist}-yd FG`);
          this._pushVisual({ kind: "fg_good", desc: `${this.offR.starters.k} drills it from ${dist} yds!`, startYard, endYard: 100, fgDist: dist });
        } else {
          this._pushVisual({ kind: "fg_miss", desc: `${this.offR.starters.k} misses from ${dist} — no good`, startYard, endYard: startYard, fgDist: dist });
        }
        return { endDrive: true };
      }
      // Punt
      off.team.fourthAtt++;
      const punt = clamp(normal(46, 7), 28, 68);
      this._pushVisual({ kind: "punt", desc: `${this.possTeam.name} punts ${punt} yards`, startYard, puntYards: punt, endYard: clamp(startYard + punt, 0, 99) });
      return { endDrive: true, punt };
    }
    off.team.plays++;
    if (isThird) off.team.thirdAtt++;
    const isLong = this.ytg >= 8, isShort = this.ytg <= 2;
    const passProb = isLong ? 0.72 : isShort ? 0.42 : 0.58;
    const playType = Math.random() < passProb ? "pass" : "run";

    if (playType === "pass") {
      const qbStats = off.players[QB];
      const intPct = clamp(0.022 - adv * 0.010 + (this.defR.cb - 60) / 1200, 0.005, 0.06);
      if (Math.random() < intPct) {
        const targetDepth = clamp(normal(11, 7), 2, 35);
        if (qbStats) { qbStats.pass_att++; qbStats.pass_int++; }
        off.team.pass_att++; off.team.turnovers++;
        def.team.takeaways++;
        this._pushVisual({ kind: "int", desc: `INTERCEPTION! ${this.offR.starters.qb} picked off!`, startYard, targetDepth, endYard: startYard });
        return { turnover: true };
      }
      const sackPct = clamp(0.06 + (this.defR.dl - 60) / 500 - adv * 0.03, 0.02, 0.12);
      if (Math.random() < sackPct) {
        const loss = rand(3, 11);
        if (qbStats) { qbStats.sacks_taken++; qbStats.sack_yds += loss; }
        off.team.sacks_allowed++; def.team.sacks++;
        this._pushVisual({ kind: "sack", desc: `${this.offR.starters.qb} sacked for -${loss} yds`, startYard, sackLoss: loss, endYard: clamp(startYard - loss, 1, 99) });
        this.yardLine = clamp(this.yardLine - loss, 1, 99);
        this.down++; this.ytg += loss;
        return {};
      }
      const compPct = clamp(0.60 + adv * 0.14 + (this.offR.qb - 60) / 300, 0.34, 0.82);
      if (Math.random() < compPct) {
        const yards = clamp(normal(8.5 + adv * 3, 12), -2, 70);
        const targetDepth = clamp(yards + rand(-2, 4), 1, 60);
        const rcvrPick = Math.random();
        const rcvr = rcvrPick < 0.4 ? this.offR.starters.wr1 : rcvrPick < 0.7 ? this.offR.starters.wr2 : this.offR.starters.te;
        const rcvrStats = off.players[rcvr];
        if (qbStats) { qbStats.pass_att++; qbStats.pass_comp++; qbStats.pass_yds += yards; if (yards > qbStats.pass_long) qbStats.pass_long = yards; }
        if (rcvrStats) { rcvrStats.rec_tgt++; rcvrStats.rec++; rcvrStats.rec_yds += yards; if (yards > rcvrStats.rec_long) rcvrStats.rec_long = yards; }
        off.team.pass_att++; off.team.pass_comp++; off.team.passYds += yards; off.team.totalYds += yards;
        this._lastBallCarrier = rcvr; this._lastBallType = "pass";
        this._pushVisual({ kind: "complete", desc: `${this.offR.starters.qb} → ${rcvr} for ${yards} yds`, startYard, targetDepth, yards, endYard: clamp(startYard + yards, 0, 100), receiver: rcvr });
        return { yards };
      }
      const targetDepth = clamp(normal(13, 8), 3, 45);
      const rcvrPick = Math.random();
      const rcvr = rcvrPick < 0.4 ? this.offR.starters.wr1 : rcvrPick < 0.7 ? this.offR.starters.wr2 : this.offR.starters.te;
      const rcvrStats = off.players[rcvr];
      if (qbStats) qbStats.pass_att++;
      if (rcvrStats) rcvrStats.rec_tgt++;
      off.team.pass_att++;
      this._pushVisual({ kind: "incomplete", desc: `${this.offR.starters.qb} pass incomplete`, startYard, targetDepth, endYard: startYard });
      return { yards: 0, incomplete: true };
    }
    if (Math.random() < 0.012) {
      off.team.turnovers++; def.team.takeaways++;
      this._pushVisual({ kind: "fumble", desc: `FUMBLE recovered by defense!`, startYard, endYard: startYard });
      return { turnover: true };
    }
    const yards = clamp(normal(4.3 + adv * 1.8, 5.5), -4, 50);
    const rbStats = off.players[RB];
    if (rbStats) { rbStats.rush_att++; rbStats.rush_yds += yards; if (yards > rbStats.rush_long) rbStats.rush_long = yards; }
    off.team.rush_att++; off.team.rushYds += yards; off.team.totalYds += yards;
    this._lastBallCarrier = RB; this._lastBallType = "rush";
    this._pushVisual({ kind: "run", desc: `${this.offR.starters.rb} runs for ${yards} yds`, startYard, yards, endYard: clamp(startYard + yards, 0, 100) });
    return { yards };
  }
  _drive() {
    const start = this.poss; let plays = 0;
    while (this.time > 0 && plays < 22) {
      plays++;
      const r = this._play();
      if (r.endDrive) {
        if (r.punt) {
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = clamp(100 - (this.yardLine + r.punt), 10, 95);
        } else {
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = clamp(100 - this.yardLine, 10, 90);
        }
        this.down = 1; this.ytg = 10; break;
      }
      if (r.turnover) {
        this.poss = this.poss === "home" ? "away" : "home";
        this.yardLine = clamp(100 - this.yardLine, 5, 95);
        this.down = 1; this.ytg = 10; break;
      }
      const yards = r.yards || 0;
      if (!r.incomplete) this.yardLine = clamp(this.yardLine + yards, 0, 100);
      const wasThird = (this.down === 3);
      if (this.yardLine >= 100) {
        // Credit TD to last ball carrier
        const off = this.stats[this.poss];
        if (this._lastBallCarrier && off.players[this._lastBallCarrier]) {
          if (this._lastBallType === "pass") {
            off.players[this._lastBallCarrier].rec_td++;
            const qb = this.offR.starters.qb;
            if (off.players[qb]) off.players[qb].pass_td++;
          } else if (this._lastBallType === "rush") {
            off.players[this._lastBallCarrier].rush_td++;
          }
        }
        if (wasThird) off.team.thirdConv++;
        off.team.firstDowns++;
        this._score(6, "Touchdown!");
        const k = this.offR.starters.k, kStats = off.players[k];
        if (Math.random() < 0.92) {
          if (kStats) kStats.xp_att++;
          if (Math.random() < 0.94) { this._score(1, "Extra Point"); if (kStats) kStats.xp_made++; }
        } else {
          if (Math.random() < 0.48) this._score(2, "2-Point Conversion");
        }
        this.drives.push({ team: start, result: "TD", homeScore: this.score.home, awayScore: this.score.away });
        this.poss = this.poss === "home" ? "away" : "home";
        this.yardLine = 25; this.down = 1; this.ytg = 10; return;
      }
      if (r.incomplete) this.down++;
      else if (yards >= this.ytg) {
        this.stats[this.poss].team.firstDowns++;
        if (wasThird) this.stats[this.poss].team.thirdConv++;
        this.down = 1; this.ytg = 10;
      }
      else { this.down++; this.ytg -= yards; }
    }
    this.drives.push({ team: start, result: "FG/Punt/TO", homeScore: this.score.home, awayScore: this.score.away });
  }
  simulate() {
    this._pushVisual({ kind: "kickoff", desc: `${this.away.city} ${this.away.name} kicks off`, startYard: 35, endYard: 25 });
    while (this.quarter <= 4) {
      if (this.time <= 0) {
        if (this.quarter === 2) {
          this.plays.push({ kind: "halftime", desc: "═══ HALFTIME ═══", quarter: 2, time: 0, homeScore: this.score.home, awayScore: this.score.away });
          this.poss = this.poss === "home" ? "away" : "home";
          this.yardLine = 25; this.down = 1; this.ytg = 10;
        }
        this.quarter++;
        if (this.quarter <= 4) {
          this.plays.push({ kind: "quarter", desc: `─── Start of Q${this.quarter} ───`, quarter: this.quarter, time: 900, homeScore: this.score.home, awayScore: this.score.away });
        }
        this.time = 900;
        continue;
      }
      this._drive();
    }
    if (this.score.home === this.score.away) {
      this.plays.push({ kind: "ot", desc: "═══ OVERTIME ═══", quarter: 5, time: 600, homeScore: this.score.home, awayScore: this.score.away });
      this.quarter = 5; this.time = 600;
      this.poss = Math.random() < 0.5 ? "home" : "away";
      let n = 0;
      while (this.score.home === this.score.away && n < 8) { this._drive(); n++; }
      if (this.score.home === this.score.away) {
        if (Math.random() < 0.5) this.score.home += 3; else this.score.away += 3;
      }
    }
    return {
      homeTeam: this.home, awayTeam: this.away,
      homeScore: this.score.home, awayScore: this.score.away,
      homeRatings: this.homeR, awayRatings: this.awayR,
      plays: this.plays, drives: this.drives,
      stats: this.stats,
      winner: this.score.home > this.score.away ? "home" : this.score.away > this.score.home ? "away" : "tie",
    };
  }
}

// ─── Field rendering ───────────────────────────────────────────────────────
const FIELD = {
  W: 1000, H: 420,
  EZ_PX: 60,        // pixels for each end zone
  PX_PER_YARD: 8.8, // playable field width (100 yd × 8.8 = 880px)
  TOP: 30,
  BOT: 390,
};

// Convert yard line + possession to absolute X (0=home goal, 100=away goal)
function yardToAbsX(yardLine, poss) {
  // When home has ball: yardLine 0 = home's own goal (left); yardLine 100 = away goal (right)
  // When away has ball: yardLine 0 = away's own goal (right); yardLine 100 = home goal (left)
  const absYard = poss === "home" ? yardLine : 100 - yardLine;
  return FIELD.EZ_PX + absYard * FIELD.PX_PER_YARD;
}
function absYardToX(absYard) {
  return FIELD.EZ_PX + absYard * FIELD.PX_PER_YARD;
}

function drawField(ctx, homeTeam, awayTeam, ctx_state) {
  const W = FIELD.W, H = FIELD.H;
  // grass bands
  ctx.fillStyle = "#1f6b34";
  ctx.fillRect(0, 0, W, H);
  // alternating mowed bands
  for (let i = 0; i < 10; i++) {
    ctx.fillStyle = i % 2 === 0 ? "#236d36" : "#1f6431";
    const x = FIELD.EZ_PX + i * 10 * FIELD.PX_PER_YARD;
    ctx.fillRect(x, FIELD.TOP, 10 * FIELD.PX_PER_YARD, FIELD.BOT - FIELD.TOP);
  }
  // end zones (team colors)
  ctx.fillStyle = homeTeam.primary;
  ctx.fillRect(0, FIELD.TOP, FIELD.EZ_PX, FIELD.BOT - FIELD.TOP);
  ctx.fillStyle = awayTeam.primary;
  ctx.fillRect(W - FIELD.EZ_PX, FIELD.TOP, FIELD.EZ_PX, FIELD.BOT - FIELD.TOP);

  // End zone team text
  ctx.save();
  ctx.font = "bold 18px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.translate(FIELD.EZ_PX / 2, (FIELD.TOP + FIELD.BOT) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(homeTeam.name.toUpperCase(), 0, 0);
  ctx.restore();
  ctx.save();
  ctx.translate(W - FIELD.EZ_PX / 2, (FIELD.TOP + FIELD.BOT) / 2);
  ctx.rotate(Math.PI / 2);
  ctx.font = "bold 18px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(awayTeam.name.toUpperCase(), 0, 0);
  ctx.restore();

  // sidelines
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, FIELD.TOP); ctx.lineTo(W, FIELD.TOP);
  ctx.moveTo(0, FIELD.BOT); ctx.lineTo(W, FIELD.BOT);
  ctx.stroke();

  // yard lines (every 5 thin, every 10 thick + numbers)
  for (let yd = 0; yd <= 100; yd += 5) {
    const x = absYardToX(yd);
    const isMajor = yd % 10 === 0;
    ctx.strokeStyle = isMajor ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.4)";
    ctx.lineWidth = isMajor ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP);
    ctx.lineTo(x, FIELD.BOT);
    ctx.stroke();
  }

  // Yard numbers (10, 20, 30, 40, 50, 40, 30, 20, 10)
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.font = "bold 18px sans-serif";
  ctx.textAlign = "center";
  for (let yd = 10; yd <= 90; yd += 10) {
    const x = absYardToX(yd);
    const num = yd <= 50 ? yd : 100 - yd;
    ctx.fillText(num, x, FIELD.TOP + 30);
    ctx.fillText(num, x, FIELD.BOT - 14);
  }

  // Hash marks (small ticks every yard)
  ctx.strokeStyle = "rgba(255,255,255,0.55)";
  ctx.lineWidth = 1;
  for (let yd = 1; yd <= 99; yd++) {
    if (yd % 5 === 0) continue;
    const x = absYardToX(yd);
    // top hash
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP + 75);
    ctx.lineTo(x, FIELD.TOP + 80);
    ctx.stroke();
    // bottom hash
    ctx.beginPath();
    ctx.moveTo(x, FIELD.BOT - 80);
    ctx.lineTo(x, FIELD.BOT - 75);
    ctx.stroke();
    // sideline ticks
    ctx.beginPath();
    ctx.moveTo(x, FIELD.TOP); ctx.lineTo(x, FIELD.TOP + 6);
    ctx.moveTo(x, FIELD.BOT); ctx.lineTo(x, FIELD.BOT - 6);
    ctx.stroke();
  }

  // 50 yard line midfield logo
  ctx.fillStyle = "rgba(200,169,0,0.18)";
  ctx.beginPath();
  ctx.arc(absYardToX(50), (FIELD.TOP + FIELD.BOT) / 2, 32, 0, Math.PI * 2);
  ctx.fill();

  // LOS and first down marker
  if (ctx_state) {
    const { los, firstDownAbs, possColor } = ctx_state;
    if (los != null) {
      ctx.strokeStyle = possColor || "#4b9bd5";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(los, FIELD.TOP); ctx.lineTo(los, FIELD.BOT);
      ctx.stroke();
    }
    if (firstDownAbs != null) {
      ctx.strokeStyle = "#f0cc30";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(firstDownAbs, FIELD.TOP); ctx.lineTo(firstDownAbs, FIELD.BOT);
      ctx.stroke();
    }
  }

  // Goal line posts indicator
  ctx.strokeStyle = "#f0cc30";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(FIELD.EZ_PX, FIELD.TOP); ctx.lineTo(FIELD.EZ_PX, FIELD.BOT);
  ctx.moveTo(W - FIELD.EZ_PX, FIELD.TOP); ctx.lineTo(W - FIELD.EZ_PX, FIELD.BOT);
  ctx.stroke();
}

function drawPlayer(ctx, x, y, color, secondary, label) {
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  ctx.strokeStyle = secondary || "#fff";
  ctx.lineWidth = 2;
  ctx.stroke();
  if (label) {
    ctx.fillStyle = "#fff";
    ctx.font = "bold 9px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label, x, y);
  }
  ctx.restore();
}

function drawBall(ctx, x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = "#6b3416";
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-3, 0); ctx.lineTo(3, 0);
  for (let i = -2; i <= 2; i++) { ctx.moveTo(i, -1.2); ctx.lineTo(i, 1.2); }
  ctx.stroke();
  ctx.restore();
}

// ─── Formation & animation ────────────────────────────────────────────────
// Generate 11 offensive + 11 defensive player positions for a given LOS (abs X)
// poss = "home" | "away" → home offense moves left→right, away moves right→left
function makeFormation(losX, poss) {
  const dir = poss === "home" ? 1 : -1;  // direction offense moves (positive = right)
  const cy = (FIELD.TOP + FIELD.BOT) / 2;
  const PX = FIELD.PX_PER_YARD;

  // Offensive line (5) along LOS
  const oline = [];
  for (let i = -2; i <= 2; i++) {
    oline.push({ x: losX - dir * 2, y: cy + i * 14, role: "OL" });
  }
  // TE just outside RT
  const te = { x: losX - dir * 2, y: cy + 38, role: "TE" };
  // 2 WR split out wide
  const wr1 = { x: losX, y: cy - 75, role: "WR1" };
  const wr2 = { x: losX, y: cy + 75, role: "WR2" };
  // QB
  const qb = { x: losX - dir * 6 * PX, y: cy, role: "QB" };
  // RB
  const rb = { x: losX - dir * 8 * PX, y: cy + 18, role: "RB" };

  // Defensive line (4)
  const dline = [];
  for (let i = -1.5; i <= 1.5; i += 1) {
    dline.push({ x: losX + dir * 1.5 * PX, y: cy + i * 18, role: "DL" });
  }
  // 3 LBs
  const lbs = [
    { x: losX + dir * 4 * PX, y: cy - 24, role: "LB" },
    { x: losX + dir * 4 * PX, y: cy,      role: "LB" },
    { x: losX + dir * 4 * PX, y: cy + 24, role: "LB" },
  ];
  // 2 CBs covering WRs
  const cb1 = { x: losX + dir * 7 * PX, y: cy - 75, role: "CB" };
  const cb2 = { x: losX + dir * 7 * PX, y: cy + 75, role: "CB" };
  // 2 Safeties deep
  const s1 = { x: losX + dir * 14 * PX, y: cy - 30, role: "S" };
  const s2 = { x: losX + dir * 14 * PX, y: cy + 30, role: "S" };

  return {
    offense: [...oline, te, wr1, wr2, qb, rb],
    defense: [...dline, ...lbs, cb1, cb2, s1, s2],
    qb, rb, wr1, wr2, te, dline, lbs, cb1, cb2, s1, s2,
  };
}

// Easing functions
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeInOutCubic = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;

// ─── UI / playback ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const homeSel  = $("homeTeam"), awaySel  = $("awayTeam");
const simBtn   = $("simBtn"),   playBtn  = $("playBtn");
const pauseBtn = $("pauseBtn"), endBtn   = $("endBtn");
const speedSlider = $("speedSlider"), speedLabel = $("speedLabel");
const gameArea = $("gameArea");

let gameResult = null, playHead = 0, playing = false;
let speedMul = 1.0; // 1.0 = normal
let animState = null; // current play animation state
let rafId = null;

function buildOptions(sel, defaultId) {
  sel.innerHTML = "";
  for (const conf of ["AFC", "NFC"]) {
    const og = document.createElement("optgroup");
    og.label = conf;
    for (const t of TEAMS.filter(x => x.conference === conf)) {
      const o = document.createElement("option");
      o.value = t.id;
      o.textContent = `${t.emoji} ${t.city} ${t.name} (${t.division})`;
      og.appendChild(o);
    }
    sel.appendChild(og);
  }
  sel.value = defaultId;
}
buildOptions(homeSel, 1);
buildOptions(awaySel, 14);

speedSlider.addEventListener("input", e => {
  const v = +e.target.value; // 1-10
  // 1 → 0.25× (very slow), 5 → 1×, 10 → 3× (fast)
  speedMul = v <= 5 ? (0.25 + (v - 1) * 0.1875) : (1 + (v - 5) * 0.4);
  speedLabel.textContent = `${speedMul.toFixed(2)}×`;
});

simBtn.addEventListener("click", () => {
  const homeId = +homeSel.value, awayId = +awaySel.value;
  if (homeId === awayId) { alert("Pick two different teams!"); return; }
  const home = getTeam(homeId), away = getTeam(awayId);
  const sim = new GameSimulator(home, away, genRoster(), genRoster());
  gameResult = sim.simulate();
  playHead = 0;
  renderGameLayout();
  startNextPlay();
  playing = true;
  updateButtons();
});

playBtn.addEventListener("click", () => {
  if (!playing) {
    playing = true;
    if (!animState) startNextPlay();
    updateButtons();
  }
});
pauseBtn.addEventListener("click", () => {
  playing = false;
  cancelAnimationFrame(rafId);
  updateButtons();
});
endBtn.addEventListener("click", () => {
  playing = false;
  cancelAnimationFrame(rafId);
  playHead = gameResult.plays.length;
  animState = null;
  renderStaticEnd();
  updateButtons();
});

function updateButtons() {
  const done = !gameResult || playHead >= gameResult.plays.length;
  playBtn.disabled  = !gameResult || playing || done;
  pauseBtn.disabled = !gameResult || !playing;
  endBtn.disabled   = !gameResult || done;
}

let boxTab = "totals";

function renderGameLayout() {
  gameArea.classList.remove("empty");
  boxTab = "totals";
  gameArea.innerHTML = `
    <div class="game-grid">
      <div>
        <div id="scoreboard" class="scoreboard"></div>
        <div class="field-wrap">
          <canvas id="field" width="${FIELD.W}" height="${FIELD.H}"></canvas>
          <div class="field-overlay">
            <div class="field-status" id="fieldStatus">Pre-game</div>
            <div id="quarterClock">—</div>
          </div>
          <div id="playCaption" class="play-caption">Game starting…</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-label"><span id="progLabel">Play 0/0</span><span id="quarterLabel"></span></div>
          <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
        </div>
        <div id="playLog" class="play-log"></div>
      </div>
      <div>
        <div class="card">
          <div class="card-header">Box Score</div>
          <div class="boxscore-tabs" id="boxTabs">
            <div class="boxscore-tab active" data-tab="totals">Totals</div>
            <div class="boxscore-tab" data-tab="home">Home</div>
            <div class="boxscore-tab" data-tab="away">Away</div>
          </div>
          <div id="boxScore"></div>
        </div>
        <div class="card">
          <div class="card-header">Team Ratings</div>
          <table class="ratings-table" id="ratings"></table>
        </div>
        <div class="card">
          <div class="card-header">Drive Log</div>
          <div id="driveLog" style="max-height: 220px; overflow-y: auto;"></div>
        </div>
      </div>
    </div>
  `;
  renderRatings();
  renderDrives();
  renderScoreboard();
  renderBoxScore();
  // Wire box score tabs
  document.querySelectorAll("#boxTabs .boxscore-tab").forEach(el => {
    el.addEventListener("click", () => {
      boxTab = el.dataset.tab;
      document.querySelectorAll("#boxTabs .boxscore-tab").forEach(x => x.classList.toggle("active", x.dataset.tab === boxTab));
      renderBoxScore();
    });
  });
  // Initial field draw
  const ctx = $("field").getContext("2d");
  drawField(ctx, gameResult.homeTeam, gameResult.awayTeam, null);
}

// ─── Per-play animation engine ─────────────────────────────────────────────
function buildAnimForPlay(play, prevPlay) {
  // Returns { duration, render(t01) }
  // t01 = 0..1 progress
  const homeTeam = gameResult.homeTeam, awayTeam = gameResult.awayTeam;

  if (["halftime", "ot", "quarter"].includes(play.kind)) {
    return { duration: 1200, kind: play.kind, render: (t, ctx) => {
      drawField(ctx, homeTeam, awayTeam, null);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, FIELD.W, FIELD.H);
      ctx.fillStyle = "#f0cc30";
      ctx.font = "bold 42px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(play.desc, FIELD.W / 2, FIELD.H / 2);
    }};
  }

  if (play.kind === "kickoff") {
    return { duration: 1800, kind: "kickoff", render: (t, ctx) => {
      // Ball arcs from kicking 35 (away starts game = away's 35) to receiving 25
      drawField(ctx, homeTeam, awayTeam, null);
      const startX = absYardToX(65); // away 35 = abs 65 (since away end on right)
      const endX = absYardToX(25);   // home gets ball at home 25
      const cy = (FIELD.TOP + FIELD.BOT) / 2;
      const x = startX + (endX - startX) * t;
      const arc = Math.sin(t * Math.PI) * 130;
      const y = cy - arc;
      // formation for kickoff (lined up across)
      drawKickoffFormation(ctx, homeTeam, awayTeam);
      drawBall(ctx, x, y, 1 + Math.sin(t * Math.PI) * 0.3);
    }};
  }

  if (!play.startYard && play.startYard !== 0) {
    // Score-only play (extra point, etc.) - just hold
    return { duration: 600, kind: play.kind, render: (t, ctx) => {
      drawField(ctx, homeTeam, awayTeam, null);
    }};
  }

  const poss = play.poss;
  const dir = poss === "home" ? 1 : -1; // offense moves direction
  const losX = yardToAbsX(play.startYard, poss);
  const cy = (FIELD.TOP + FIELD.BOT) / 2;
  const formation = makeFormation(losX, poss);
  const team = poss === "home" ? homeTeam : awayTeam;
  const oppTeam = poss === "home" ? awayTeam : homeTeam;
  const possColor = team.primary;
  const oppColor = oppTeam.primary;

  // First down marker abs X
  let firstDownAbs = null;
  if (play.down > 0) {
    const fdYard = clamp(play.startYard + play.ytg, 0, 100);
    firstDownAbs = yardToAbsX(fdYard, poss);
  }

  const fieldState = { los: losX, firstDownAbs, possColor };

  function drawPlayers(off, def) {
    for (const p of off) drawPlayer(ctx, p.x, p.y, possColor, team.secondary);
    for (const p of def) drawPlayer(ctx, p.x, p.y, oppColor, oppTeam.secondary);
  }

  let ctx = null;

  // Common: pre-snap freeze (10% of duration), then action
  const PRE = 0.18;

  if (play.kind === "run") {
    const endX = yardToAbsX(play.endYard, poss);
    return { duration: 1500, kind: "run", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      // animate RB
      const rb = { ...formation.rb };
      const qb = { ...formation.qb };
      let ballX, ballY = cy + (t < PRE ? 18 : (1-(t-PRE)/(1-PRE)) * 18);
      if (t < PRE) {
        // pre-snap
        ballX = formation.qb.x;
      } else {
        const tt = (t - PRE) / (1 - PRE);
        ballX = qb.x + (endX - qb.x) * easeOutCubic(tt);
        // Move RB toward end position
        rb.x = qb.x + (endX - qb.x) * easeOutCubic(tt);
        rb.y = cy + (1 - tt) * 18;
      }
      // Defenders converge slightly
      const def = formation.defense.map((d, i) => {
        if (t < PRE) return d;
        const tt = (t - PRE) / (1 - PRE);
        const tx = endX + dir * (8 + (i % 3) * 4);
        const ty = cy + ((i % 5) - 2) * 14;
        return { ...d, x: d.x + (tx - d.x) * tt * 0.6, y: d.y + (ty - d.y) * tt * 0.6 };
      });
      // OL drives forward into contact, TE seals edge, WRs release downfield
      const off = formation.offense.filter(p => p.role !== "RB").map(p => {
        if (t < PRE) return p;
        const tt = (t - PRE) / (1 - PRE);
        if (p.role === "OL") {
          // surge forward + wobble from contact with DL
          const slot = (p.y - cy) / 14;       // -2..+2
          const wobble = Math.sin(tt * Math.PI * 5 + slot * 1.7) * 2.5;
          return { ...p, x: p.x + dir * tt * 28, y: p.y + wobble };
        }
        if (p.role === "TE") {
          return { ...p, x: p.x + dir * tt * 18 };
        }
        // WRs release downfield
        return { ...p, x: p.x + dir * tt * 12 };
      });
      drawPlayers([...off, rb], def);
      drawBall(ctx, ballX, ballY);
    }};
  }

  if (play.kind === "complete" || play.kind === "incomplete" || play.kind === "int") {
    const targetDepth = play.targetDepth || 10;
    const targetX = losX + dir * targetDepth * FIELD.PX_PER_YARD;
    // Pick receiver Y
    const wrChoice = (play.receiver === formation.te.role) ? "te" : (Math.random() < 0.5 ? "wr1" : "wr2");
    const targetY = play.kind === "incomplete" ? cy + (Math.random() < 0.5 ? -65 : 65) : (Math.random() < 0.5 ? cy - 60 : cy + 60);
    const isComplete = play.kind === "complete";
    const endX = isComplete ? yardToAbsX(play.endYard, poss) : targetX;
    return { duration: 1700, kind: play.kind, render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      const dropPhase = 0.30;     // QB drops back
      const throwPhase = 0.60;    // ball in air
      // 0..dropPhase: snap + drop back
      // dropPhase..throwPhase: ball flies to target
      // throwPhase..1: catch + run after catch (or INT return)
      const qb = { ...formation.qb };
      let ballX, ballY = cy;
      let arc = 0;

      // QB drops back
      const dropAmt = t < dropPhase ? (t / dropPhase) * 5 * FIELD.PX_PER_YARD : 5 * FIELD.PX_PER_YARD;
      qb.x -= dir * dropAmt;

      // Receiver runs route
      const wr = wrChoice === "wr1" ? { ...formation.wr1 } : wrChoice === "wr2" ? { ...formation.wr2 } : { ...formation.te };
      if (t > 0.05) {
        const rt = Math.min(1, (t - 0.05) / 0.55);
        wr.x = wr.x + dir * rt * (targetDepth + 2) * FIELD.PX_PER_YARD;
        wr.y = wr.y + (targetY - wr.y) * rt * 0.6;
      }

      if (t < dropPhase) {
        ballX = qb.x; ballY = cy;
      } else if (t < throwPhase) {
        const tt = (t - dropPhase) / (throwPhase - dropPhase);
        ballX = qb.x + (targetX - qb.x) * tt;
        arc = Math.sin(tt * Math.PI) * 60;
        ballY = cy + (targetY - cy) * tt - arc;
      } else {
        const tt = (t - throwPhase) / (1 - throwPhase);
        if (play.kind === "complete") {
          // Run after catch toward endX
          ballX = targetX + (endX - targetX) * easeOutCubic(tt);
          ballY = targetY + (cy - targetY) * tt * 0.4;
        } else if (play.kind === "incomplete") {
          // Ball drops to ground near target
          ballX = targetX;
          ballY = targetY + tt * 25;
        } else {
          // INT — ball goes other way
          const retEndX = losX - dir * 10 * FIELD.PX_PER_YARD;
          ballX = targetX + (retEndX - targetX) * easeOutCubic(tt);
          ballY = targetY + ((cy + 30) - targetY) * tt;
        }
      }

      // Defense: rush + DBs cover
      const def = formation.defense.map((d, i) => {
        const dd = { ...d };
        if (i < 4 && t > 0.1) {
          // DL rushes QB
          const tt = Math.min(1, (t - 0.1) / 0.4);
          dd.x = dd.x + (qb.x - dd.x) * tt * 0.7;
          dd.y = dd.y + (qb.y - dd.y) * tt * 0.5;
        } else if (i >= 7 && t > 0.05) {
          // CBs follow WRs
          const tt = Math.min(1, (t - 0.05) / 0.55);
          if (i === 7) { dd.x += dir * tt * (targetDepth) * FIELD.PX_PER_YARD * 0.85; }
          if (i === 8) { dd.x += dir * tt * (targetDepth) * FIELD.PX_PER_YARD * 0.85; }
        }
        return dd;
      });

      // Offense: QB drops, WRs run routes, OL drops into pass-block pocket
      const off = formation.offense.map(p => {
        if (p.role === "QB") return qb;
        if (p === formation.wr1 && wrChoice === "wr1") return wr;
        if (p === formation.wr2 && wrChoice === "wr2") return wr;
        if (p === formation.te && wrChoice === "te") return wr;
        if (p.role === "OL" && t > 0.05) {
          const tt = Math.min(1, (t - 0.05) / 0.55);
          // Tackles drop deeper than center → forms a U-shaped pocket
          const slotDepth = Math.abs((p.y - cy) / 14);  // 0 (center) → 2 (tackles)
          const dropBack = (4 + slotDepth * 4) * tt;
          const wobble = Math.sin(tt * Math.PI * 6 + p.y * 0.05) * 1.8;
          return { ...p, x: p.x - dir * dropBack, y: p.y + wobble };
        }
        // Non-target WR/TE/RB: stay roughly put or short release
        if ((p.role === "WR1" || p.role === "WR2" || p.role === "TE") && t > 0.05) {
          const tt = Math.min(1, (t - 0.05) / 0.6);
          return { ...p, x: p.x + dir * tt * 14 };
        }
        return p;
      });
      drawPlayers(off, def);
      drawBall(ctx, ballX, ballY, arc > 30 ? 1.3 : 1);
    }};
  }

  if (play.kind === "sack") {
    const endX = yardToAbsX(play.endYard, poss);
    return { duration: 1400, kind: "sack", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      const qb = { ...formation.qb };
      // QB drops back, defenders chase
      if (t > PRE) {
        const tt = (t - PRE) / (1 - PRE);
        qb.x = formation.qb.x + (endX - formation.qb.x) * easeOutCubic(tt);
      }
      const def = formation.defense.map((d, i) => {
        if (i < 4 && t > PRE) {
          const tt = (t - PRE) / (1 - PRE);
          return { ...d, x: d.x + (qb.x - d.x) * tt * 0.95, y: d.y + (qb.y - d.y) * tt * 0.7 };
        }
        return d;
      });
      const off = formation.offense.map(p => {
        if (p.role === "QB") return qb;
        if (p.role === "OL" && t > PRE) {
          const tt = (t - PRE) / (1 - PRE);
          // OL got beat — collapses backward toward QB
          const slotDepth = Math.abs((p.y - cy) / 14);
          return { ...p, x: p.x - dir * (10 + slotDepth * 5) * tt, y: p.y + Math.sin(tt * Math.PI * 4 + p.y) * 3 };
        }
        return p;
      });
      drawPlayers(off, def);
      drawBall(ctx, qb.x, qb.y);
      // Burst at sack
      if (t > 0.85) {
        ctx.strokeStyle = "rgba(255,200,0,0.6)";
        ctx.lineWidth = 3;
        for (let a = 0; a < 6; a++) {
          const ang = (a / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(qb.x + Math.cos(ang) * 12, qb.y + Math.sin(ang) * 12);
          ctx.lineTo(qb.x + Math.cos(ang) * 22, qb.y + Math.sin(ang) * 22);
          ctx.stroke();
        }
      }
    }};
  }

  if (play.kind === "fumble") {
    return { duration: 1500, kind: "fumble", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      drawPlayers(formation.offense, formation.defense);
      // Ball wobbles and gets recovered
      const wobbleX = losX + dir * 18 + Math.sin(t * 18) * 12;
      const wobbleY = cy + Math.cos(t * 14) * 10;
      drawBall(ctx, wobbleX, wobbleY, 0.9 + Math.sin(t * 20) * 0.3);
      if (t > 0.6) {
        ctx.fillStyle = "rgba(255,80,80,0.55)";
        ctx.beginPath();
        ctx.arc(wobbleX, wobbleY, 30 - (t - 0.6) * 50, 0, Math.PI * 2);
        ctx.fill();
      }
    }};
  }

  if (play.kind === "fg_good" || play.kind === "fg_miss") {
    const isGood = play.kind === "fg_good";
    return { duration: 1700, kind: play.kind, render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      drawPlayers(formation.offense, formation.defense);
      // Ball: from holder spot (LOS - 7yd) → through goalpost (or wide)
      const startX = losX - dir * 7 * FIELD.PX_PER_YARD;
      const startY = cy;
      const goalX = poss === "home" ? FIELD.W - FIELD.EZ_PX : FIELD.EZ_PX;
      const goalY = isGood ? cy : cy + (Math.random() < 0.5 ? -50 : 50);
      let ballX, ballY, arc;
      if (t < 0.15) { ballX = startX; ballY = startY; arc = 0; }
      else {
        const tt = (t - 0.15) / 0.85;
        ballX = startX + (goalX - startX) * tt;
        ballY = startY + (goalY - startY) * tt;
        arc = Math.sin(tt * Math.PI) * 90;
      }
      drawBall(ctx, ballX, ballY - arc, 1 + (arc / 200));
      // Goalpost flash
      if (t > 0.85 && isGood) {
        ctx.strokeStyle = "rgba(240,204,48,0.8)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(goalX, FIELD.TOP); ctx.lineTo(goalX, FIELD.BOT);
        ctx.stroke();
      }
    }};
  }

  if (play.kind === "punt") {
    const endX = yardToAbsX(play.endYard, poss);
    return { duration: 2000, kind: "punt", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      drawPlayers(formation.offense, formation.defense);
      const startX = losX - dir * 12 * FIELD.PX_PER_YARD;
      const startY = cy;
      let ballX, ballY, arc = 0;
      if (t < 0.1) { ballX = losX; ballY = cy; }
      else if (t < 0.25) { ballX = losX + (startX - losX) * ((t - 0.1) / 0.15); ballY = cy; }
      else {
        const tt = (t - 0.25) / 0.75;
        ballX = startX + (endX - startX) * tt;
        arc = Math.sin(tt * Math.PI) * 160;
        ballY = cy - arc;
      }
      drawBall(ctx, ballX, ballY, 1 + arc / 200);
    }};
  }

  if (play.kind === "score") {
    return { duration: 1200, kind: "score", render: (t, c) => {
      ctx = c;
      drawField(ctx, homeTeam, awayTeam, fieldState);
      // Big banner
      ctx.fillStyle = `rgba(26,51,0,${0.4 + t * 0.4})`;
      ctx.fillRect(0, FIELD.H / 2 - 50, FIELD.W, 100);
      ctx.fillStyle = "#f0cc30";
      ctx.font = "bold 38px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("🏈 " + play.desc, FIELD.W / 2, FIELD.H / 2);
    }};
  }

  // Default: just show the field with formation
  return { duration: 800, kind: play.kind, render: (t, c) => {
    drawField(c, homeTeam, awayTeam, fieldState);
    drawPlayers(formation.offense, formation.defense);
  }};
}

function drawKickoffFormation(ctx, homeTeam, awayTeam) {
  const cy = (FIELD.TOP + FIELD.BOT) / 2;
  // Kicking team (away) at their 35
  const kx = absYardToX(65);
  for (let i = -5; i <= 5; i++) {
    if (i === 0) continue;
    drawPlayer(ctx, kx, cy + i * 12, awayTeam.primary, awayTeam.secondary);
  }
  drawPlayer(ctx, kx - 10, cy, awayTeam.primary, awayTeam.secondary, "K");
  // Receiving team (home) deep
  const rx = absYardToX(15);
  for (let i = -3; i <= 3; i++) {
    drawPlayer(ctx, rx, cy + i * 16, homeTeam.primary, homeTeam.secondary);
  }
  drawPlayer(ctx, absYardToX(8), cy, homeTeam.primary, homeTeam.secondary, "R");
}

function startNextPlay() {
  if (!gameResult) return;
  if (playHead >= gameResult.plays.length) {
    playing = false;
    renderStaticEnd();
    updateButtons();
    return;
  }
  const play = gameResult.plays[playHead];
  const prev = playHead > 0 ? gameResult.plays[playHead - 1] : null;
  const anim = buildAnimForPlay(play, prev);
  animState = {
    play,
    anim,
    startTime: performance.now(),
    duration: anim.duration / speedMul,
  };
  // Update side panels
  renderScoreboard(play);
  renderPlayLog();
  renderProgress();
  renderBoxScore();
  setCaption(play);
  setFieldStatus(play);
  rafId = requestAnimationFrame(tick);
}

function tick(now) {
  if (!playing || !animState) return;
  const elapsed = now - animState.startTime;
  const t = Math.min(1, elapsed / animState.duration);
  const ctx = $("field").getContext("2d");
  animState.anim.render(t, ctx);
  if (t >= 1) {
    playHead++;
    animState = null;
    if (playing) {
      // Brief pause between plays
      setTimeout(() => { if (playing) startNextPlay(); }, 80);
    }
  } else {
    rafId = requestAnimationFrame(tick);
  }
}

function renderStaticEnd() {
  const ctx = $("field").getContext("2d");
  drawField(ctx, gameResult.homeTeam, gameResult.awayTeam, null);
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, FIELD.W, FIELD.H);
  ctx.fillStyle = "#f0cc30";
  ctx.font = "bold 48px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("FINAL", FIELD.W / 2, FIELD.H / 2 - 24);
  ctx.font = "bold 32px sans-serif";
  ctx.fillStyle = "#fff";
  ctx.fillText(`${gameResult.homeTeam.name} ${gameResult.homeScore} — ${gameResult.awayScore} ${gameResult.awayTeam.name}`, FIELD.W / 2, FIELD.H / 2 + 22);
  renderScoreboard();
  renderPlayLog();
  renderProgress();
  renderBoxScore();
}

function setCaption(play) {
  const cap = $("playCaption");
  cap.className = "play-caption " + play.kind;
  cap.textContent = play.desc;
}

function setFieldStatus(play) {
  if (!play) return;
  const fs = $("fieldStatus");
  const qc = $("quarterClock");
  let possLabel = "";
  if (play.poss) {
    const team = play.poss === "home" ? gameResult.homeTeam : gameResult.awayTeam;
    possLabel = ` · ${team.emoji} ${team.name} ball`;
  }
  let dd = "";
  if (play.down > 0) {
    const dStr = `${play.down}${["st","nd","rd","th"][play.down-1]} & ${play.ytg}`;
    const fieldDesc = play.poss === "home"
      ? (play.yardLine < 50 ? `own ${play.yardLine}` : play.yardLine === 50 ? "midfield" : `opp ${100 - play.yardLine}`)
      : (play.yardLine < 50 ? `own ${play.yardLine}` : play.yardLine === 50 ? "midfield" : `opp ${100 - play.yardLine}`);
    dd = ` · ${dStr} at ${fieldDesc}`;
  }
  fs.textContent = `${quarterLabel(play.quarter, play.time || 0)}${possLabel}${dd}`;
  qc.textContent = "";
}

function renderScoreboard(curPlay) {
  if (!gameResult) return;
  const last = curPlay || (playHead > 0 ? gameResult.plays[playHead - 1] : gameResult.plays[0]);
  const homeScore = last?.homeScore ?? 0;
  const awayScore = last?.awayScore ?? 0;
  const ended = playHead >= gameResult.plays.length;
  const winner = ended ? gameResult.winner : null;
  const sb = $("scoreboard");
  if (!sb) return;
  sb.innerHTML = `
    <div class="score-team">
      <div class="score-team-emoji">${gameResult.homeTeam.emoji}</div>
      <div class="score-team-full">${gameResult.homeTeam.city}</div>
      <div class="score-team-name">${gameResult.homeTeam.name}</div>
      <div class="score-num ${winner === "home" ? "win" : ""}">${homeScore}</div>
      ${last?.poss === "home" && !ended ? `<div class="poss-indicator">🏈 POSS</div>` : ""}
    </div>
    <div class="score-mid">
      <div class="score-status ${ended ? "final" : "live"}">
        ${ended ? (winner === "tie" ? "FINAL · TIE" : winner === "home" ? "🏆 HOME WIN" : "🏆 AWAY WIN") : "● LIVE"}
      </div>
      <div class="quarter-clock">${last ? quarterLabel(last.quarter, last.time || 0) : "—"}</div>
      ${last?.down > 0 && !ended ? `<div class="down-distance">${last.down}${["st","nd","rd","th"][last.down-1]} & ${last.ytg}</div>` : ""}
    </div>
    <div class="score-team">
      <div class="score-team-emoji">${gameResult.awayTeam.emoji}</div>
      <div class="score-team-full">${gameResult.awayTeam.city}</div>
      <div class="score-team-name">${gameResult.awayTeam.name}</div>
      <div class="score-num ${winner === "away" ? "win" : ""}">${awayScore}</div>
      ${last?.poss === "away" && !ended ? `<div class="poss-indicator">🏈 POSS</div>` : ""}
    </div>
  `;
}

function renderProgress() {
  $("progLabel").textContent = `Play ${playHead} / ${gameResult.plays.length}`;
  $("progFill").style.width = `${(playHead / gameResult.plays.length) * 100}%`;
}

// Walk back from playHead to find the latest snapshot (kickoff/markers don't carry one)
function currentStats() {
  for (let i = Math.min(playHead, gameResult.plays.length) - 1; i >= 0; i--) {
    const s = gameResult.plays[i].statsSnap;
    if (s) return s;
  }
  // Pre-game: all zeros
  return gameResult.stats && {
    home: { team: emptyTeamTotals(), players: {} },
    away: { team: emptyTeamTotals(), players: {} },
  };
}

function emptyTeamTotals() {
  return { plays: 0, totalYds: 0, passYds: 0, rushYds: 0, pass_att: 0, pass_comp: 0,
           rush_att: 0, sacks: 0, sacks_allowed: 0, turnovers: 0, takeaways: 0,
           firstDowns: 0, thirdAtt: 0, thirdConv: 0, fourthAtt: 0, fourthConv: 0 };
}

function renderBoxScore() {
  const el = $("boxScore"); if (!el) return;
  const stats = currentStats();
  const hT = stats.home.team, aT = stats.away.team;
  const hP = stats.home.players, aP = stats.away.players;
  const homeName = gameResult.homeTeam.name, awayName = gameResult.awayTeam.name;

  if (boxTab === "totals") {
    const row = (lbl, h, a, fmt = v => v) => `
      <div class="team-totals">
        <div class="h">${fmt(h)}</div>
        <div class="lbl">${lbl}</div>
        <div class="a">${fmt(a)}</div>
      </div>`;
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;font-size:.7rem;color:var(--gray);padding-bottom:.3rem;border-bottom:1px solid var(--border);">
        <div style="text-align:right;color:var(--green-lt);font-weight:700">${homeName}</div>
        <div></div>
        <div style="text-align:left;color:var(--gold);font-weight:700">${awayName}</div>
      </div>
      ${row("TOTAL YDS", hT.totalYds, aT.totalYds)}
      ${row("PASS YDS", hT.passYds, aT.passYds)}
      ${row("RUSH YDS", hT.rushYds, aT.rushYds)}
      ${row("CMP / ATT", `${hT.pass_comp}/${hT.pass_att}`, `${aT.pass_comp}/${aT.pass_att}`)}
      ${row("RUSH ATT", hT.rush_att, aT.rush_att)}
      ${row("FIRST DOWNS", hT.firstDowns, aT.firstDowns)}
      ${row("3RD DOWN", `${hT.thirdConv}/${hT.thirdAtt}`, `${aT.thirdConv}/${aT.thirdAtt}`)}
      ${row("SACKS", hT.sacks, aT.sacks)}
      ${row("TURNOVERS", hT.turnovers, aT.turnovers)}
    `;
    return;
  }

  const sideStats = boxTab === "home" ? stats.home : stats.away;
  const teamLabel = boxTab === "home" ? gameResult.homeTeam : gameResult.awayTeam;
  const players = sideStats.players;
  const byPos = pos => Object.values(players).filter(p => p.pos === pos);

  const passingRows = byPos("QB").map(p =>
    `<tr>
      <td class="pos">QB</td>
      <td class="name">${p.name}</td>
      <td>${p.pass_comp}/${p.pass_att}</td>
      <td>${p.pass_yds}</td>
      <td>${p.pass_yds && p.pass_att ? (p.pass_yds / p.pass_att).toFixed(1) : "0.0"}</td>
      <td>${p.pass_td}</td>
      <td>${p.pass_int}</td>
      <td>${p.pass_long}</td>
    </tr>`).join("");

  const rushingRows = Object.values(players).filter(p => p.rush_att > 0).map(p =>
    `<tr>
      <td class="pos">${p.pos}</td>
      <td class="name">${p.name}</td>
      <td>${p.rush_att}</td>
      <td>${p.rush_yds}</td>
      <td>${p.rush_att ? (p.rush_yds / p.rush_att).toFixed(1) : "0.0"}</td>
      <td>${p.rush_td}</td>
      <td>${p.rush_long}</td>
    </tr>`).join("");

  const recRows = Object.values(players).filter(p => p.rec_tgt > 0).map(p =>
    `<tr>
      <td class="pos">${p.pos}</td>
      <td class="name">${p.name}</td>
      <td>${p.rec}/${p.rec_tgt}</td>
      <td>${p.rec_yds}</td>
      <td>${p.rec ? (p.rec_yds / p.rec).toFixed(1) : "0.0"}</td>
      <td>${p.rec_td}</td>
      <td>${p.rec_long}</td>
    </tr>`).join("");

  const kickRows = byPos("K").filter(p => p.fg_att + p.xp_att > 0).map(p =>
    `<tr>
      <td class="pos">K</td>
      <td class="name">${p.name}</td>
      <td>${p.fg_made}/${p.fg_att}</td>
      <td>${p.fg_long || "—"}</td>
      <td>${p.xp_made}/${p.xp_att}</td>
    </tr>`).join("");

  const empty = `<tr><td colspan="8" style="color:var(--gray);text-align:center;padding:.4rem">—</td></tr>`;

  el.innerHTML = `
    <div style="font-size:.7rem;color:var(--gold);font-weight:700;letter-spacing:.4px;margin-bottom:.4rem;">${teamLabel.emoji} ${teamLabel.city.toUpperCase()} ${teamLabel.name.toUpperCase()}</div>
    <div class="boxscore-section">
      <h4>PASSING</h4>
      <table class="boxscore-table">
        <thead><tr><th></th><th></th><th>C/A</th><th>YDS</th><th>AVG</th><th>TD</th><th>INT</th><th>LNG</th></tr></thead>
        <tbody>${passingRows || empty}</tbody>
      </table>
      <h4>RUSHING</h4>
      <table class="boxscore-table">
        <thead><tr><th></th><th></th><th>ATT</th><th>YDS</th><th>AVG</th><th>TD</th><th>LNG</th></tr></thead>
        <tbody>${rushingRows || empty}</tbody>
      </table>
      <h4>RECEIVING</h4>
      <table class="boxscore-table">
        <thead><tr><th></th><th></th><th>R/T</th><th>YDS</th><th>AVG</th><th>TD</th><th>LNG</th></tr></thead>
        <tbody>${recRows || empty}</tbody>
      </table>
      <h4>KICKING</h4>
      <table class="boxscore-table">
        <thead><tr><th></th><th></th><th>FG</th><th>LNG</th><th>XP</th></tr></thead>
        <tbody>${kickRows || empty}</tbody>
      </table>
    </div>
  `;
}

function renderPlayLog() {
  const log = $("playLog");
  const visible = gameResult.plays.slice(0, playHead);
  log.innerHTML = visible.map(p => playEntry(p)).join("");
  log.scrollTop = log.scrollHeight;
}

function quarterLabel(q, t) {
  if (q === 5) return `OT ${Math.floor(t/60)}:${String(t%60).padStart(2,"0")}`;
  return `Q${q} ${Math.floor(t/60)}:${String(t%60).padStart(2,"0")}`;
}

function playEntry(p) {
  const isMarker = ["halftime","ot","quarter","kickoff"].includes(p.kind);
  if (isMarker) return `<div class="play-entry ${p.kind}">${p.desc}</div>`;
  const meta = `Q${p.quarter} ${Math.floor(p.time/60)}:${String(p.time%60).padStart(2,"0")}` +
               (p.down > 0 ? ` · ${p.down}${["st","nd","rd","th"][p.down-1]}&${p.ytg}` : "");
  const icon = p.kind === "score" ? "🏈 "
             : p.kind === "int" || p.kind === "fumble" ? "⚠️ "
             : p.kind === "fg_good" ? "✅ "
             : p.kind === "fg_miss" ? "❌ "
             : "";
  return `<div class="play-entry ${p.kind}"><span class="meta">${meta}</span>${icon}${p.desc}</div>`;
}

function renderRatings() {
  const r = gameResult; if (!r) return;
  const row = (label, h, a) => {
    const winner = h > a ? "h" : a > h ? "a" : null;
    return `<tr>
      <td class="home ${winner === "h" ? "winner" : ""}">${Math.round(h)}</td>
      <td class="lbl">${label}</td>
      <td class="away ${winner === "a" ? "winner" : ""}">${Math.round(a)}</td>
    </tr>`;
  };
  $("ratings").innerHTML = `
    <thead><tr>
      <th class="home" style="color:var(--gold);font-size:.78rem">${r.homeTeam.name}</th>
      <th class="lbl"></th>
      <th class="away" style="color:var(--gold);font-size:.78rem">${r.awayTeam.name}</th>
    </tr></thead>
    <tbody>
      ${row("OFFENSE", r.homeRatings.offense, r.awayRatings.offense)}
      ${row("DEFENSE", r.homeRatings.defense, r.awayRatings.defense)}
      ${row("QB",  r.homeRatings.qb,  r.awayRatings.qb)}
      ${row("RB",  r.homeRatings.rb,  r.awayRatings.rb)}
      ${row("WR",  r.homeRatings.wr,  r.awayRatings.wr)}
      ${row("OL",  r.homeRatings.ol,  r.awayRatings.ol)}
      ${row("DL",  r.homeRatings.dl,  r.awayRatings.dl)}
      ${row("LB",  r.homeRatings.lb,  r.awayRatings.lb)}
      ${row("CB",  r.homeRatings.cb,  r.awayRatings.cb)}
      ${row("S",   r.homeRatings.saf, r.awayRatings.saf)}
      ${row("K",   r.homeRatings.k,   r.awayRatings.k)}
    </tbody>
  `;
}

function renderDrives() {
  const r = gameResult; if (!r) return;
  $("driveLog").innerHTML = r.drives.map(d => `
    <div class="drive-entry">
      <span class="drive-team-${d.team}">
        ${d.team === "home" ? r.homeTeam.name : r.awayTeam.name}
      </span>
      <span class="${d.result === "TD" ? "drive-result-td" : ""}" style="color:var(--gray);">
        ${d.result} · ${d.homeScore}–${d.awayScore}
      </span>
    </div>
  `).join("");
}
</script>
</body>
</html>
