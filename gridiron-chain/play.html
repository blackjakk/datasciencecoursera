<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GridironChain — Football Simulator</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>">
<style>
  :root {
    --green: #1a5c2e; --green-lt: #2e8b57; --green-dk: #0d3318;
    --gold: #c8a900;  --gold-lt:  #f0cc30;
    --bg: #0a0f0a;    --bg2: #111811; --bg3: #1a221a;
    --card: #182018; --border: #2e3d2e;
    --white: #f0f0f0; --gray: #999; --red: #c0392b;
    --field: #1f6b34; --field-dk: #185b2c; --field-lt: #2a7d40;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--white);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; line-height: 1.5;
  }
  .header {
    background: linear-gradient(180deg, var(--green-dk), #050a05);
    border-bottom: 2px solid var(--green);
    padding: 1.25rem 2rem; text-align: center;
  }
  .header h1 {
    font-size: 1.8rem; letter-spacing: -1px;
    color: var(--gold); font-weight: 900;
  }
  .header h1 span { color: var(--white); }
  .header p { color: var(--gray); font-size: .85rem; margin-top: .25rem; }
  .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }

  /* Team Selector */
  .selector {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 1rem; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem;
  }
  .vs-label { font-weight: 900; font-size: 1.5rem; color: var(--gray); }
  label { font-size: .8rem; color: var(--gray); display: block; margin-bottom: .35rem; }
  select, input[type="number"] {
    background: var(--bg2); border: 1px solid var(--border); color: var(--white);
    padding: .55rem .85rem; border-radius: 6px; width: 100%;
    font-size: .95rem; font-family: inherit;
  }
  select:focus { outline: none; border-color: var(--green-lt); }

  /* Buttons */
  .btn {
    padding: .65rem 1.25rem; border-radius: 6px; cursor: pointer;
    border: none; font-weight: 700; font-size: .9rem;
    transition: all .15s; display: inline-flex; align-items: center; gap: .4rem;
  }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-gold:hover { background: var(--gold-lt); }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-lt); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--white); }
  .btn-outline:hover { border-color: var(--green-lt); color: var(--green-lt); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-sm { padding: .35rem .75rem; font-size: .8rem; }

  /* Controls bar */
  .controls {
    display: flex; gap: .5rem; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .speed-control {
    margin-left: auto; display: flex; align-items: center; gap: .5rem;
    color: var(--gray); font-size: .85rem;
  }

  /* Game layout */
  .game-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 1rem; }
  @media (max-width: 1100px) { .game-grid { grid-template-columns: 1fr; } }

  /* Field viewer */
  .field-wrap {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: .75rem; margin-bottom: 1rem;
    position: relative;
  }
  #field {
    width: 100%; height: auto; display: block; border-radius: 6px;
    background: var(--field-dk);
    image-rendering: pixelated; image-rendering: crisp-edges;
  }
  .field-overlay {
    display: flex; align-items: center; justify-content: space-between;
    padding: .35rem .5rem .55rem .5rem; font-size: .8rem; color: var(--gray);
  }
  .field-status {
    font-weight: 700; color: var(--white); font-size: .85rem;
  }
  .play-caption {
    background: var(--bg3); border-radius: 6px; padding: .55rem .8rem;
    font-size: .9rem; min-height: 38px; display: flex; align-items: center;
    margin-top: .4rem; border-left: 3px solid var(--green-lt);
    transition: border-color .15s;
  }
  .play-caption.score    { border-color: var(--gold); color: var(--gold-lt); font-weight: 700; }
  .play-caption.int      { border-color: #ff6060; color: #ff8a8a; font-weight: 700; }
  .play-caption.fumble   { border-color: #ff6060; color: #ff8a8a; font-weight: 700; }
  .play-caption.sack     { border-color: #c8a900; }
  .play-caption.fg_good  { border-color: var(--gold); color: var(--gold-lt); }
  .play-caption.fg_miss  { border-color: #ff6060; color: #ff8a8a; }
  .play-caption.kickoff,
  .play-caption.punt     { border-color: #4b9bd5; }

  /* Scoreboard */
  .scoreboard {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 1.5rem; padding: 1rem 1.5rem;
    background: var(--bg2); border-radius: 10px;
    border: 1px solid var(--border); margin-bottom: 1rem;
    align-items: center;
  }
  .score-team { text-align: center; }
  .score-team-emoji { font-size: 1.6rem; }
  .score-team-name { font-size: .8rem; color: var(--gray); margin-top: .15rem; }
  .score-team-full { font-weight: 700; font-size: .8rem; }
  .score-num { font-size: 3rem; font-weight: 900; line-height: 1; margin-top: .15rem; }
  .score-num.win { color: var(--gold); }
  .score-mid { text-align: center; }
  .score-status { font-size: .8rem; color: var(--gray); }
  .score-status.live { color: #4caf7a; }
  .score-status.final { color: var(--gold); font-weight: 700; }
  .quarter-clock { font-size: 1.1rem; font-weight: 700; margin-top: .25rem; }
  .down-distance { font-size: .78rem; color: var(--gray); margin-top: .15rem; }
  .poss-indicator { font-size: .75rem; color: var(--gold); margin-top: .15rem; }
  .timeout-dots { font-size: .85rem; letter-spacing: 2px; color: #9bd0ff; margin-top: .25rem; line-height: 1; }

  /* Progress bar */
  .progress-wrap { margin-bottom: .75rem; }
  .progress-label { font-size: .75rem; color: var(--gray); margin-bottom: .25rem; display: flex; justify-content: space-between; }
  .progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green-lt); transition: width .12s; }

  /* Play log (smaller now) */
  .play-log {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: .5rem; max-height: 240px; overflow-y: auto; font-size: .82rem;
  }
  .play-entry {
    padding: .35rem .5rem; border-radius: 4px; margin-bottom: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .play-entry .meta { color: var(--gray); font-size: .7rem; margin-right: .5rem; }
  .play-entry.score    { background: #1a3300; color: var(--gold); font-weight: 700; }
  .play-entry.int      { background: #330000; color: #ff8a8a; }
  .play-entry.fumble   { background: #330000; color: #ff8a8a; }
  .play-entry.sack     { background: #1a1a00; }
  .play-entry.fg_good  { background: #1a3300; color: var(--gold); }
  .play-entry.fg_miss  { background: #2a1500; color: #ff8a8a; }
  .play-entry.halftime,
  .play-entry.ot,
  .play-entry.quarter {
    background: var(--bg3); text-align: center; font-weight: 700; color: var(--gold-lt);
    padding: .55rem; margin: .25rem 0;
  }
  .play-entry.kickoff  { background: var(--green-dk); }

  /* Card */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem; margin-bottom: 1rem;
  }
  .card-header { font-weight: 700; color: var(--gold); margin-bottom: .65rem; font-size: .95rem; }
  .ratings-table { width: 100%; }
  .ratings-table tr td { padding: .25rem .35rem; }
  .ratings-table .lbl { text-align: center; color: var(--gray); font-size: .72rem; font-weight: 600; letter-spacing: .5px; }
  .ratings-table .home { text-align: right; font-weight: 700; }
  .ratings-table .away { text-align: left; font-weight: 700; }
  .ratings-table .winner { color: var(--green-lt); }

  /* Box score */
  .boxscore-tabs { display: flex; gap: .25rem; margin-bottom: .65rem; }
  .boxscore-tab {
    flex: 1; padding: .35rem .25rem; border-radius: 6px; cursor: pointer;
    background: var(--bg3); border: 1px solid var(--border); color: var(--gray);
    font-size: .72rem; font-weight: 700; text-align: center; letter-spacing: .3px;
    transition: all .12s;
  }
  .boxscore-tab:hover { color: var(--white); }
  .boxscore-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
  .boxscore-section { font-size: .78rem; }
  .boxscore-section h4 {
    margin: .9rem 0 .3rem; font-size: .72rem; color: var(--gold);
    letter-spacing: .5px; font-weight: 700; padding-bottom: .2rem;
    border-bottom: 1px solid var(--border);
  }
  .boxscore-section h4:first-child { margin-top: 0; }
  .boxscore-table { width: 100%; border-collapse: collapse; font-size: .76rem; }
  .boxscore-table th, .boxscore-table td { padding: .25rem .35rem; text-align: right; }
  .boxscore-table th { color: var(--gray); font-weight: 600; font-size: .68rem; letter-spacing: .3px; border-bottom: 1px solid var(--border); }
  .boxscore-table td.name { text-align: left; font-weight: 700; color: var(--white); }
  .boxscore-table td.pos { text-align: left; color: var(--gray); font-size: .68rem; width: 24px; }
  .team-totals {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: .5rem;
    padding: .4rem 0; font-size: .76rem; border-bottom: 1px solid var(--border);
  }
  .team-totals .lbl { text-align: center; color: var(--gray); font-size: .68rem; letter-spacing: .3px; }
  .team-totals .h { text-align: right; font-weight: 700; }
  .team-totals .a { text-align: left; font-weight: 700; }

  /* Drive log */
  .drive-entry {
    padding: .35rem .5rem; border-bottom: 1px solid var(--border);
    font-size: .8rem; display: flex; justify-content: space-between;
  }
  .drive-team-home { color: var(--green-lt); font-weight: 700; }
  .drive-team-away { color: var(--gold); font-weight: 700; }
  .drive-result-td { color: var(--gold); font-weight: 700; }

  .empty {
    text-align: center; color: var(--gray); padding: 4rem 1rem;
  }
  .empty-icon { font-size: 4rem; margin-bottom: .5rem; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .badge {
    display: inline-block; padding: .15rem .55rem; border-radius: 99px;
    font-size: .7rem; font-weight: 700; letter-spacing: .4px;
  }
  .badge-afc { background: #001a40; color: #5b9bd5; }
  .badge-nfc { background: #3d0000; color: #e07070; }
  .badge-gold { background: #3d3000; color: var(--gold); }
  .badge-air { background: #002244; color: #69be28; letter-spacing: .6px; }
  .badge-gnp { background: #3d1800; color: #ff9040; letter-spacing: .3px; }
  .badge-dt  { background: #1a0033; color: #c890ff; letter-spacing: .4px; }
  .badge-opt { background: #2d1500; color: #ffcc66; letter-spacing: .4px; }

  .player-name {
    cursor: help;
    border-bottom: 1px dotted rgba(255,255,255,0.35);
    transition: color .12s, border-color .12s;
  }
  .player-name:hover {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }
  .starter-row td { font-size: .72rem; padding: .15rem .25rem; }
  .starter-row .home { text-align: right; }
  .starter-row .away { text-align: left; }
  .starter-row .lbl  { color: var(--gray); font-size: .65rem; letter-spacing: .3px; }
  .ovr-pill {
    display: inline-block; background: #1c1c24; color: var(--gold);
    padding: .02rem .35rem; border-radius: 3px; font-size: .65rem;
    font-weight: 800; font-variant-numeric: tabular-nums;
  }
  .team-col { display: flex; flex-direction: column; min-width: 0; }
  .depth-chart {
    margin-top: .5rem; background: #0d0d13; border: 1px solid var(--border);
    border-radius: 6px; padding: .4rem .5rem; font-size: .7rem;
    max-height: 380px; overflow-y: auto;
  }
  .depth-section { margin-bottom: .25rem; }
  .depth-section-title {
    font-size: .58rem; font-weight: 800; color: var(--gold); letter-spacing: .6px;
    padding: .35rem 0 .15rem; border-bottom: 1px solid #2a2a35;
    margin-bottom: .15rem; display: flex; align-items: center; justify-content: space-between;
  }
  .depth-section-title .pb-tag { color: var(--gray); font-weight: 600; font-size: .55rem; letter-spacing: .3px; }
  .depth-row {
    display: grid; grid-template-columns: 2.2rem 1fr auto auto;
    gap: .35rem; align-items: center; padding: .14rem .2rem;
    border-radius: 3px;
  }
  .depth-row:hover { background: rgba(240,204,48,0.06); }
  .depth-row.boosted { background: rgba(240,204,48,0.10); }
  .depth-slot {
    color: var(--gray); font-weight: 800; font-size: .62rem;
    letter-spacing: .3px;
  }
  .depth-name { font-size: .72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .depth-ovr {
    background: #1c1c24; color: var(--gold); padding: .04rem .38rem;
    border-radius: 3px; font-size: .6rem; font-weight: 800;
    font-variant-numeric: tabular-nums; min-width: 2.1rem; text-align: center;
  }
  .depth-ovr.tier-elite   { background: #f0cc30; color: #000; }
  .depth-ovr.tier-good    { background: #2d4a2d; color: #b6e6b6; }
  .depth-ovr.tier-average { background: #2d2d35; color: #c8c8d0; }
  .depth-ovr.tier-poor    { background: #4a2828; color: #d4a0a0; }
  .depth-boost {
    accent-color: var(--gold); cursor: pointer;
    width: 13px; height: 13px; margin: 0;
  }
  .depth-arch {
    display: inline-block; margin-left: .4rem;
    font-size: .55rem; font-weight: 800; letter-spacing: .3px;
    padding: 0 .25rem; border-radius: 2px; vertical-align: middle;
  }
  .arch-qb { background: #3d3000; color: var(--gold); }
  .arch-dl { background: #2d1500; color: #ffcc66; }
  .arch-ol { background: #001a40; color: #9bd0ff; }
  .arch-rb { background: #1a3300; color: #b8e088; }
  .arch-wr { background: #003322; color: #88e0c0; }
  .arch-te { background: #2a2200; color: #e0d088; }
  .arch-lb { background: #2a0033; color: #c890ff; }
  .arch-cb { background: #330011; color: #ff90b0; }
  .arch-s  { background: #001a33; color: #90c0ff; }

  .sim-many-select {
    background: var(--bg3); color: var(--white); border: 1px solid var(--border);
    border-radius: 6px; padding: .35rem .5rem; font-weight: 700; cursor: pointer;
    font-size: .8rem;
  }
  .qb-ovr-input {
    background: var(--bg3); color: var(--white); border: 1px solid var(--border);
    border-radius: 6px; padding: .35rem .5rem; font-weight: 800; font-size: .8rem;
    width: 60px; text-align: center; font-variant-numeric: tabular-nums;
  }
  .sim-many-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center; z-index: 2000;
    backdrop-filter: blur(4px);
  }
  .sim-many-card {
    position: relative; background: var(--bg2); border: 1px solid var(--gold);
    border-radius: 12px; padding: 1.5rem 1.8rem; max-width: 640px; width: 90%;
    max-height: 86vh; overflow-y: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.8);
  }
  .sim-many-close {
    position: absolute; top: .5rem; right: .8rem; background: transparent;
    border: 0; color: var(--gray); font-size: 1.8rem; cursor: pointer; line-height: 1;
  }
  .sim-many-close:hover { color: var(--gold); }
  .sm-title {
    font-size: 1.2rem; font-weight: 800; color: var(--gold); letter-spacing: .5px;
    margin-bottom: .25rem;
  }
  .sm-sub { color: var(--gray); font-size: .8rem; margin-bottom: 1rem; }
  .sm-section { margin-top: 1.2rem; }
  .sm-section h4 {
    font-size: .7rem; letter-spacing: .6px; color: var(--gold);
    margin-bottom: .4rem; border-bottom: 1px solid var(--border); padding-bottom: .25rem;
  }
  .sm-record {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: .8rem;
    align-items: center; margin-bottom: 1rem;
  }
  .sm-team-block { text-align: center; padding: .8rem; background: var(--bg3); border-radius: 8px; }
  .sm-team-block.winner { background: rgba(240,204,48,0.15); border: 1px solid var(--gold); }
  .sm-team-name { font-weight: 800; font-size: .9rem; color: var(--gold); }
  .sm-team-pct  { font-size: 2rem; font-weight: 900; font-variant-numeric: tabular-nums; margin: .25rem 0; }
  .sm-team-wins { font-size: .75rem; color: var(--gray); }
  .sm-vs { font-size: .9rem; color: var(--gray); font-weight: 800; }
  .sm-stats-table {
    width: 100%; border-collapse: collapse; font-size: .78rem;
  }
  .sm-stats-table td {
    padding: .25rem .4rem; font-variant-numeric: tabular-nums;
  }
  .sm-stats-table td.lbl {
    text-align: center; color: var(--gray); font-size: .68rem;
    letter-spacing: .3px; width: 30%;
  }
  .sm-stats-table td.home { text-align: right; }
  .sm-stats-table td.away { text-align: left; }
  .sm-stats-table td.better { color: var(--gold); font-weight: 700; }
  .pr-table {
    width: 100%; border-collapse: collapse; font-size: .78rem;
    font-variant-numeric: tabular-nums; margin-top: .5rem;
  }
  .pr-table th, .pr-table td {
    padding: .3rem .5rem; border-bottom: 1px solid var(--border); text-align: right;
  }
  .pr-table th {
    color: var(--gold); font-size: .65rem; letter-spacing: .4px;
    text-transform: uppercase; font-weight: 700;
  }
  .pr-table tbody tr:nth-child(-n+3) td.pr-rank { color: var(--gold); font-weight: 800; }
  .pr-table tbody tr:nth-last-child(-n+3) td.pr-rank { color: #d65a5a; }
  .pr-rank { width: 2em; text-align: center; font-weight: 800; }
  .pr-team { text-align: left; font-weight: 700; }
  .pr-emoji { margin-right: .35rem; }
  .pr-name { color: var(--white); }
  .pr-conf {
    margin-left: .4rem; font-size: .62rem; color: var(--gray);
    font-weight: 500; letter-spacing: .3px;
  }
  .pr-record, .pr-pct { color: var(--white); }
  .pr-pf, .pr-pa { color: var(--gray); }
  .pr-pd.pos { color: #6ee06e; font-weight: 700; }
  .pr-pd.neg { color: #d65a5a; font-weight: 700; }
  .pr-conf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: .5rem; }
  .pr-conf-block { background: var(--bg3); border-radius: 8px; padding: .6rem .8rem; }
  .pr-conf-title { color: var(--gold); font-size: .8rem; font-weight: 800; letter-spacing: .5px; margin-bottom: .4rem; }
  .pr-conf-list { padding-left: 1.5rem; margin: 0; font-size: .78rem; line-height: 1.6; }
  .tn-champion {
    margin: 1rem 0; padding: 1rem; background: linear-gradient(135deg, rgba(240,204,48,0.18), rgba(240,204,48,0.05));
    border: 2px solid var(--gold); border-radius: 12px; text-align: center;
  }
  .tn-champion .label { font-size: .7rem; color: var(--gray); letter-spacing: .8px; font-weight: 700; }
  .tn-champion .trophy { font-size: 2.5rem; margin: .2rem 0; }
  .tn-champion .name { font-size: 1.4rem; font-weight: 900; color: var(--gold); letter-spacing: .3px; }
  .tn-champion .sub  { font-size: .75rem; color: var(--gray); margin-top: .25rem; }
  .tn-rounds {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem; margin-top: 1rem;
  }
  .tn-round { background: var(--bg3); border-radius: 8px; padding: .6rem .8rem; }
  .tn-round h4 {
    color: var(--gold); font-size: .7rem; letter-spacing: .5px; text-transform: uppercase;
    margin: 0 0 .5rem 0; border-bottom: 1px solid var(--border); padding-bottom: .25rem;
  }
  .tn-matchups { display: flex; flex-direction: column; gap: .5rem; }
  .tn-matchup {
    background: var(--bg2); border-radius: 6px; padding: .4rem .5rem;
    border: 1px solid var(--border); font-size: .72rem;
  }
  .tn-team { display: flex; align-items: center; gap: .35rem; padding: .15rem 0; }
  .tn-team.winner { color: var(--gold); font-weight: 700; }
  .tn-team.loser  { color: var(--gray); text-decoration: line-through; opacity: .65; }
  .tn-seed { font-size: .6rem; color: var(--gray); min-width: 1.6em; font-weight: 700; }
  .tn-emoji { font-size: .9rem; }
  .tn-name { font-weight: 700; }
  .tn-score {
    text-align: center; font-size: .65rem; color: var(--gray);
    padding: .1rem 0; font-variant-numeric: tabular-nums;
  }

<script>

const getTeam = id => TEAMS.find(t => t.id === Number(id));

// ─── Playbooks ────────────────────────────────────────────────────────────
const PLAYBOOKS = {
  BALANCED: {
    id: "BALANCED", name: "Balanced", badge: "BAL",
    passProb: { long: 0.72, mid: 0.58, short: 0.42 },
    targetMix: { wr1: 0.40, wr2: 0.30, te: 0.22, rb: 0.08 },
    tierBias: {},
    airYdsMean: 7.5, airYdsSd: 6,
    rushYdsMean: 4.3, rushYdsSd: 5.5,
    compMul: 1.0, sackMul: 1.0,
  },
  AIR_RAID: {
    id: "AIR_RAID", name: "Air Raid", badge: "AIR",
    // Pass volume trimmed — was throwing 87% of plays so even mediocre
    // WRs racked up 130+ yds vs elite secondaries on volume alone.
    passProb: { long: 0.82, mid: 0.66, short: 0.50 },
    targetMix: { wr1: 0.42, wr2: 0.32, te: 0.16, rb: 0.10 },
    tierBias: { QB: "elite", WR: "elite" },
    // Elite QB + WRs hit at high comp% with normal air-yard depth; pay the
    // tax in sack volume from extra dropbacks and a weaker run game.
    airYdsMean: 7.5, airYdsSd: 7,
    rushYdsMean: 4.0, rushYdsSd: 5,
    // sackMul bumped (1.15 → 1.32) — defense knows pass is coming, pins ears back

    tierBias: { RB: "elite", OL: "elite" },
    // Run-first; when they DO pass it's deeper play-action — but those deep
    // shots are LOWER comp%. Sack rate is normal (no auto-discount).
    airYdsMean: 9, airYdsSd: 7,
    rushYdsMean: 4.7, rushYdsSd: 5,
    compMul: 0.92, sackMul: 1.0,
  },
  // Dual-threat QB scheme: QB scrambles when pressured

    id: "DUAL_THREAT", name: "Dual Threat", badge: "DT",

    airYdsMean: 7.5, airYdsSd: 6.5,

  },
  // Read-Option / RPO: mobile QB carries — option-style with explosive QB
  OPTION: {
    id: "OPTION", name: "Read Option", badge: "OPT",
    passProb: { long: 0.65, mid: 0.45, short: 0.30 },
    targetMix: { wr1: 0.30, wr2: 0.22, te: 0.28, rb: 0.20 },
    tierBias: { QB: "elite", RB: "good" },
    airYdsMean: 7.5, airYdsSd: 6.5,

    compMul: 0.97, sackMul: 1.05,          // QB holds for reads → small comp/sack penalty
    qbScramblePct: 0.16,                   // bails sometimes (vs DT 0.22, but more impact)
    qbRushPct: 0.28,                       // ~28% of designed runs are QB carries
    qbRushFumbleMul: 1.4,                  // option exchanges fumble more

function getPlaybook(team) { return PLAYBOOKS[team?.playbook] || PLAYBOOKS.BALANCED; }

function pickReceiver(playbook, starters) {
  const { wr1, wr2, te, rb } = playbook.targetMix;
  const roll = Math.random();
  if (roll < wr1) return starters.wr1;
  if (roll < wr1 + wr2) return starters.wr2;
  if (roll < wr1 + wr2 + te) return starters.te;
  return starters.rb;
}

// ─── Player generation ────────────────────────────────────────────────────
const FIRST = ["Marcus","Tyler","Darius","Jordan","Malik","Devon","Elijah","Xavier","Cameron","Jaylen","Trevor","Caleb","Nathan","Brandon","Derrick","Antonio","Deon","Travon","Rasheed","Quincy","Zach","Hunter","Brayden","Cole","Jake","Ryan","Luke","Evan","Aaron","Chris","Isaiah","Jamal","Tyrone","Lamar","Andre","Reggie","Stefon","Amari","Cooper","Travis"];
const LAST = ["Johnson","Williams","Brown","Jones","Davis","Miller","Wilson","Moore","Taylor","Anderson","Thomas","Jackson","White","Harris","Martin","Thompson","Garcia","Martinez","Robinson","Clark","Rodriguez","Lewis","Lee","Walker","Hall","Allen","Young","Hill","Flores","Green","Adams","Nelson","Baker","Carter","Mitchell","Roberts","Turner","Phillips","Campbell","Reed"];

const ROSTER_SLOTS = { QB:3, RB:4, WR:6, TE:3, OL:8, DL:6, LB:5, CB:5, S:3, K:1, P:1 };

const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const randf = (a, b) => Math.random() * (b - a) + a;
const randName = () => `${FIRST[rand(0, FIRST.length - 1)]} ${LAST[rand(0, LAST.length - 1)]}`;

function statsFor(pos, tier) {
  const r = { elite:{lo:78,hi:99}, good:{lo:63,hi:80}, average:{lo:48,hi:67}, poor:{lo:35,hi:54} }[tier];
  const b = () => rand(r.lo, r.hi);
  // Lesser stats — floor raised so even role players don't look broken.
  // Even an NFL bench guy is athletic at SOMETHING.
  const l = () => rand(Math.max(48, r.lo - 12), Math.max(62, r.hi - 12));
  let stats;
  switch (pos) {
    case "QB": stats = [l(),l(),b(),b(),b(),l(),l(),l(),l(),l(),l()]; break;
    case "RB": stats = [b(),b(),b(),b(),l(),b(),l(),l(),l(),l(),l()]; break;
    case "WR": stats = [b(),l(),b(),b(),l(),b(),l(),l(),b(),l(),l()]; break;
    case "TE": stats = [b(),b(),b(),b(),l(),b(),b(),l(),l(),l(),l()]; break;
    case "OL": stats = [l(),b(),b(),b(),l(),l(),b(),l(),l(),l(),l()]; break;
    case "DL": stats = [b(),b(),b(),b(),l(),l(),l(),b(),l(),b(),l()]; break;
    case "LB": stats = [b(),b(),b(),b(),l(),l(),l(),b(),b(),b(),l()]; break;
    case "CB": stats = [b(),l(),b(),b(),l(),l(),l(),l(),b(),b(),l()]; break;
    case "S":  stats = [b(),b(),b(),b(),l(),l(),l(),l(),b(),b(),l()]; break;
    default:   stats = [l(),l(),l(),b(),l(),l(),l(),l(),l(),l(),b()];
  }
  // Signature stat — every player has at least one calling card. Picks a
  // random stat and ensures it lands in the 70-85 range so even "poor" tier
  // guys can be "the guy with the strong arm" or "the speedster off the bench."
  const sigCount = (tier === "poor" || tier === "average") ? 2 : 1;
  for (let i = 0; i < sigCount; i++) {
    const idx = rand(0, stats.length - 1);
    const sigVal = rand(70, 85);
    if (stats[idx] < sigVal) stats[idx] = sigVal;
  }
  return stats;
}

// Flavor for bad players — they're never UNIFORMLY bad. They're either
// freak athletes with no football brain, or cerebral types with limited
// physical tools. Adds personality + makes scouting actually matter.
const PLAYER_FLAVORS = {
  RAW_ATHLETE:   { label: "Raw athlete",   blurb: "Elite tools, raw instincts" },
  HIGH_FOOTBALL_IQ: { label: "High football IQ", blurb: "Smart, schematic — physically limited" },
};
function applyFlavor(stats, pos) {
  // Returns the flavor key (or null) and mutates stats in place
  const r = Math.random();
  // Indices: 0=SPD, 1=STR, 2=AGI, 3=AWR, 4=THR, 5=CAT, 6=BLK, 7=PRS, 8=COV, 9=TCK, 10=KPW
  if (r < 0.45) {
    // RAW_ATHLETE: pump physical, sink AWR (and THR for QB)
    stats[0] = Math.max(stats[0], rand(78, 92));   // SPD
    stats[1] = Math.max(stats[1], rand(75, 90));   // STR
    stats[2] = Math.max(stats[2], rand(78, 92));   // AGI
    stats[3] = Math.min(stats[3], rand(35, 50));   // AWR (poor instincts)
    if (pos === "QB") stats[4] = Math.min(stats[4], rand(45, 60));  // THR limited

    return "RAW_ATHLETE";

    // HIGH_FOOTBALL_IQ: pump AWR (+ pos-specific skill), sink physical
    stats[3] = Math.max(stats[3], rand(78, 92));   // AWR
    stats[0] = Math.min(stats[0], rand(42, 55));   // SPD
    stats[1] = Math.min(stats[1], rand(45, 58));   // STR
    stats[2] = Math.min(stats[2], rand(45, 58));   // AGI
    if (pos === "QB") stats[4] = Math.max(stats[4], rand(75, 88));  // good throws (accuracy)
    if (pos === "WR" || pos === "TE") stats[5] = Math.max(stats[5], rand(78, 92));  // great hands
    if (pos === "CB" || pos === "S" || pos === "LB") stats[8] = Math.max(stats[8], rand(75, 90));  // coverage smarts
    if (pos === "OL") stats[6] = Math.max(stats[6], rand(78, 92));  // technician blocker
    if (pos === "DL" || pos === "LB") stats[7] = Math.max(stats[7], rand(75, 88));  // pass-rush technique

}
function calcOverall(pos, s) {
  const [spd,str,agi,awr,thr,cat,blk,prs,cov,tck,kpw] = s;
  let v;
  switch (pos) {
    case "QB": v = spd*10+agi*15+awr*25+thr*50; break;
    case "RB": v = spd*35+str*20+agi*25+cat*20; break;
    case "WR": v = spd*30+agi*25+cat*35+awr*10; break;
    case "TE": v = spd*20+cat*40+blk*30+str*10; break;
    case "OL": v = str*35+blk*45+agi*20;        break;
    case "DL": v = str*35+prs*40+spd*25;        break;
    case "LB": v = prs*25+cov*25+tck*30+spd*20; break;
    case "CB": v = spd*30+agi*25+cov*35+awr*10; break;
    case "S":  v = spd*25+cov*35+tck*30+awr*10; break;
    default:   v = kpw*50+awr*50;
  }
  return Math.min(99, Math.max(40, Math.round(v / 100)));
}

// Generates a player whose name isn't already in `blockNames`. Falls back to
// appending a roman-numeral suffix after exhausting random retries.
function genUniquePlayer(pos, tier, blockNames) {
  const block = blockNames || new Set();
  let p = genPlayer(pos, tier);
  let attempts = 0;
  while (block.has(p.name) && attempts < 30) {
    p = genPlayer(pos, tier);
    attempts++;
  }
  if (block.has(p.name)) {
    const suffixes = ["II", "III", "IV", "V", "VI", "VII"];
    for (const s of suffixes) {
      const candidate = `${p.name} ${s}`;
      if (!block.has(candidate)) { p.name = candidate; break; }
    }
  }
  return p;
}
function genRoster(playbook = PLAYBOOKS.BALANCED, overrides = {}, blockNames = null) {
  const r = [];
  const used = new Set(blockNames || []);
  for (const [pos, count] of Object.entries(ROSTER_SLOTS)) {
    for (let i = 0; i < count; i++) {
      let tier;
      if (i === 0) tier = overrides[pos] || playbook.tierBias[pos] || "good";
      else if (i === 1) tier = "average";
      else tier = "poor";
      const player = genUniquePlayer(pos, tier, used);
      used.add(player.name);
      r.push(player);
    }
  }
  return r;
}

function normal(mean, sd) {
  const u1 = Math.random() || 0.0001, u2 = Math.random();
  return Math.round(mean + Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2) * sd);
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function buildRatings(roster) {
  const byPos = {};

  for (const k in byPos) byPos[k].sort((a,b) => b.overall - a.overall);
  const g = (pos, n) => {
    const arr = (byPos[pos] || []).slice(0, n);
    return arr.length ? arr.reduce((s,p) => s + p.overall, 0) / arr.length : 50;
  };
  return {
    offense: g("QB",1)*0.30 + g("RB",2)*0.15 + g("WR",4)*0.25 + g("TE",1)*0.10 + g("OL",5)*0.20,
    defense: g("DL",4)*0.30 + g("LB",3)*0.30 + g("CB",2)*0.25 + g("S",2)*0.15,
    qb: g("QB",1), rb: g("RB",2), wr: g("WR",4), ol: g("OL",5),
    dl: g("DL",4), lb: g("LB",3), cb: g("CB",2), saf: g("S",2),
    k:  g("K",1),

      WR1: archetypesByPos(roster, "WR", 2)[0],
      WR2: archetypesByPos(roster, "WR", 2)[1],
      TE:  archetypesByPos(roster, "TE", 1)[0],
      LB:  archetypesByPos(roster, "LB", 3),
      CB:  archetypesByPos(roster, "CB", 2),
      S:   archetypesByPos(roster, "S",  2),

    this.awayArch = collectArch(aRoster);

    this.yardLine = 25; this.down = 1; this.ytg = 10;

    if (this.quarter !== 2 && this.quarter !== 4) return false;
    const offScore = this.score[this.poss];
    const defScore = this.score[this.poss === "home" ? "away" : "home"];

    if (prevResult?.incomplete || prevResult?.turnover) return null;  // clock already stopped

        timeoutsRemaining: { ...this.timeouts },
        homeScore: this.score.home, awayScore: this.score.away,

      rec_tgt: 0, rec: 0, rec_yds: 0, rec_td: 0, rec_long: 0, rec_drops: 0,

    // weights = { LB: 0.4, S: 0.3, DL: 0.15, CB: 0.15 }
    const pool = [];

    if (weights.LB) {
      addCandidate(defStarters.lb1, weights.LB);
      addCandidate(defStarters.lb2, weights.LB);
      addCandidate(defStarters.lb3, weights.LB);

    if (weights.S) {
      addCandidate(defStarters.fs, weights.S);
      addCandidate(defStarters.ss, weights.S);

      addCandidate(defStarters.de1, weights.DL);
      addCandidate(defStarters.de2, weights.DL);
      addCandidate(defStarters.dt1, weights.DL);
      addCandidate(defStarters.dt2, weights.DL);

      addCandidate(defStarters.cb1, weights.CB);
      addCandidate(defStarters.cb2, weights.CB);

  get defR()       { return this.poss === "home" ? this.awayR : this.homeR; }
  get offPlaybook(){ return this.poss === "home" ? this.homePlaybook : this.awayPlaybook; }
  get offOL()      { return this.poss === "home" ? this.homeOL : this.awayOL; }
  get defDL()      { return this.poss === "home" ? this.awayDL : this.homeDL; }

      if (!list.length) return null;
      // Weights tilt toward higher overall; cube the OVR-50 gap for sharper bias
      const weights = list.map(p => Math.pow(Math.max(1, p.overall - 40), 1.6));

      let r = Math.random() * sum;
      for (let i = 0; i < list.length; i++) { r -= weights[i]; if (r <= 0) return list[i]; }
      return list[list.length - 1];

      dlType: dl?.archetype || "POWER",
      olType: ol?.archetype || "ANCHOR",

      // Play-action holds the ball longer → more sack risk.
      const sackPb = (pb.sackMul || 1.0) * paSackMul;
      const sackPct = clamp((0.05 + pressure * 0.10 - adv * 0.02) * sackPb, 0.015, 0.36);
      if (Math.random() < sackPct) {
        // THROW ON THE RUN — mobile QBs with high AGI sometimes escape pressure
        // and throw on the move instead of taking the sack. Lower comp / air
        // (it's an off-platform throw), but no sack loss. POCKET QBs never roll.
        const torSkill = clamp((qbAgi + qbThr - 130) / 100, 0, 1);  // 0-1
        const archMul = qbArch === "DUAL_THREAT" ? 1.4 : qbArch === "POCKET" ? 0.1 : qbArch === "GUNSLINGER" ? 0.9 : 1.0;

        const torChance = clamp(torSkill * 0.22 * archMul, 0, 0.30);

          const torRoll = Math.random();
          if (torRoll < torComp) {

            const airYds = clamp(normal(7 - pressure * 1.5, 5.5), 1, 35);

            if (rcvrStats) { rcvrStats.rec_tgt++; rcvrStats.rec++; rcvrStats.rec_yds += yards; if (yards > rcvrStats.rec_long) rcvrStats.rec_long = yards; }

            this._pushVisual({
              kind: "complete", desc: `${this.offR.starters.qb} throws on the run to ${rcvr} for ${yards} yds`,
              startYard, targetDepth, catchDepth: targetDepth, yac, yards,
              endYard: clamp(startYard + yards, 0, 100), receiver: rcvr, passer: this.offR.starters.qb,
              tackler: tacklerName, throwType: "TOR", isTOR: true,
            });
            return { yards };
          } else {

            off.team.pass_att++;

              kind: "incomplete", desc: `${this.offR.starters.qb} throws it away on the run`,
              startYard, targetDepth: 8, endYard: startYard,
              passer: this.offR.starters.qb, isTOR: true,
            });
            return { yards: 0, incomplete: true };

        }

        if (qbStats) { qbStats.sacks_taken++; qbStats.sack_yds += loss; }

        if (reps.dl?.name && def.players[reps.dl.name]) {

          def.players[reps.dl.name].sk_yds = (def.players[reps.dl.name].sk_yds || 0) + loss;
          def.players[reps.dl.name].tkl = (def.players[reps.dl.name].tkl || 0) + 1;
        }
        // Pick a move from the DL's archetype toolkit
        const moves = DL_ARCHETYPES[reps.dlType]?.moves || ["SACK"];
        const move = moves[Math.floor(Math.random() * moves.length)];
        this._pushVisual({
          kind: "sack", desc: `${this.offR.starters.qb} sacked for -${loss} yds`,
          startYard, sackLoss: loss, endYard: clamp(startYard - loss, 1, 99),
          passer: this.offR.starters.qb,
          dlName: reps.dl?.name, dlType: reps.dlType, dlMove: move,
          olName: reps.ol?.name, olType: reps.olType,
          isPlayAction,

        return { yards: -loss };

          const baseYac = rand(2, 7);
          const bigYac = Math.random() < 0.16 ? rand(8, 22) : 0;

          const yards = Math.min(clamp(airYds + yac, -3, 95), 100 - startYard);

          if (rcvrStats) { rcvrStats.rec_tgt++; rcvrStats.rec++; rcvrStats.rec_yds += yards; if (yards > rcvrStats.rec_long) rcvrStats.rec_long = yards; }

          this._lastBallCarrier = rcvr; this._lastBallType = "pass";
          const tacklerName = yards > 0 ? this._creditDefStat("tkl", { LB: 0.30, S: 0.25, CB: 0.25, DL: 0.20 }) : null;
          this._pushVisual({
            kind: "complete", desc: `Screen to ${rcvr} for ${yards} yds`,
            startYard, targetDepth: airYds, catchDepth: airYds, yac, yards,

            passer: this.offR.starters.qb, tackler: tacklerName, isScreen: true,

          if (rcvrStats) rcvrStats.rec_tgt++;

          this._pushVisual({
            kind: "incomplete", desc: `Screen broken up — incomplete`,
            startYard, targetDepth: -1, endYard: startYard,
            passer: this.offR.starters.qb, intended: rcvr, isScreen: true,

      const rcvr = pickReceiver(pb, this.offR.starters);
      const rcvrStats = off.players[rcvr];
      const rcvrPlayer = this._playerByName?.get?.(rcvr) || null;
      const rcvrCat = rcvrPlayer?.stats?.[5] ?? 70;
      const rcvrAwr = rcvrPlayer?.stats?.[3] ?? 65;

      // Plus a small safety-help term so a great deep safety helps overall.

        // Safety help — average COV of the 2 starting safeties tightens things up

          const r = Math.random();
          if (r < 0.35) yac = 0;
          else if (r < 0.70) yac = rand(1, Math.max(2, Math.floor(airYds * 0.4)) + 2);
          else if (r < 0.92) yac = rand(2, Math.max(4, Math.floor(airYds * 0.8)) + 3);

        let wrJuke = false;
        const rcvrP = this._playerByName.get(rcvr);
        if (rcvrP && airYds >= 3 && airYds <= 30) {
          const rcat = rcvrP.stats?.[5] ?? 60;
          const ragi = rcvrP.stats?.[2] ?? 60;
          if (rcat >= 80 && ragi >= 80) {
            const eliteFactor = Math.max(0, ((rcat + ragi) / 2 - 80) / 19);   // 0 at 80, 1 at 99
            const archMul = rcvrP.archetype === "SLOT" ? 1.5
                          : rcvrP.archetype === "ROUTE_RUNNER" ? 1.2
                          : rcvrP.archetype === "POSSESSION" ? 0.6

        //  ZIP (5-18 yds, tight window): low arc + max velocity — threading the needle

        //  DEEP (≥19 yds): big arc, max distance

        off.team.pass_att++; off.team.pass_comp++; off.team.passYds += yards; off.team.totalYds += yards;
        this._lastBallCarrier = rcvr; this._lastBallType = "pass";
        // Tackle credit on the catch — DBs / LBs make most tackles in the open field

        this._pushVisual({ kind: "complete", desc: wrJuke ? `${this.offR.starters.qb} → ${rcvr} for ${yards} yds (CATCH AND JUKE!)` : `${this.offR.starters.qb} → ${rcvr} for ${yards} yds`, startYard, targetDepth, catchDepth: targetDepth, yac, yards, endYard: clamp(startYard + yards, 0, 100), receiver: rcvr, passer: this.offR.starters.qb, tackler: tacklerName, throwType, isPlayAction, wrJuke });

      if (rcvrStats) rcvrStats.rec_tgt++;

      const isDrop = Math.random() < dropBase;
      let pdName = null;
      if (isDrop) {
        if (rcvrStats) rcvrStats.rec_drops = (rcvrStats.rec_drops || 0) + 1;
        off.team.drops = (off.team.drops || 0) + 1;
      } else {

      this._pushVisual({
        kind: "incomplete",
        desc: isDrop ? `DROP! ${rcvr} can't hang on` : `${this.offR.starters.qb} pass incomplete`,
        startYard, targetDepth, endYard: startYard,
        passer: this.offR.starters.qb, intended: rcvr, defender: pdName, isDrop, isPlayAction,

    const rbArch = this.offArch.RB?.archetype;
    const rbPlayer = this._playerByName.get(RB);

    const gripMod = (75 - grip) / 600;    // grip 95 → -0.033; grip 55 → +0.033

      const muffRolls = rand(2, 4);

      let muffs = 0;
      for (let i = 0; i < muffRolls; i++) {

      if (recoveredBy === "def") {
        off.team.turnovers++; def.team.takeaways++;
        const frBy = this._creditDefStat("fr", { LB: 0.35, DL: 0.35, S: 0.20, CB: 0.10 });

          kind: "fumble",
          desc: `FUMBLE! Recovered by ${this[this.poss === "home" ? "away" : "home"].name} defense — ${ffBy ? `forced by ${ffBy}` : `loose ball`}!`,

          kind: "fumble",
          desc: `FUMBLE! ${this.possTeam.name} recovers their own — ${lossYds}-yd loss on the dive`,

        case "SPEED":     rbBoost = 0.3;  rbSdMul = 1.30; break;  // boom/bust
        case "ELUSIVE":   rbBoost = 0.4;  rbSdMul = 1.10; break;
        case "WORKHORSE": rbBoost = 0.2;  rbSdMul = 0.95; break;
        case "RECEIVING": rbBoost = -0.6; rbSdMul = 1.0;  break;

    let brokenTackles = 0;

    if (!isQBRun && yards > 0) {

      const cspd = cp?.stats?.[0] ?? 70;
      const cagi = cp?.stats?.[2] ?? 70;
      let breakStat;
      if (rbArch === "POWER")        breakStat = cstr;
      else if (rbArch === "ELUSIVE") breakStat = (cagi * 0.7 + cstr * 0.3);
      else if (rbArch === "SPEED")   breakStat = (cspd * 0.7 + cstr * 0.3);
      else                            breakStat = (cstr + cagi) / 2;
      const lbList = this.defArch.LB || [];
      const lbPlayers = lbList.map(l => this._playerByName.get(l?.name)).filter(Boolean);
      const avgTck = lbPlayers.length
        ? lbPlayers.reduce((s,p) => s + (p.stats[9] || 60), 0) / lbPlayers.length
        : this.defR.lb;
      const baseBreak = rbArch === "POWER" ? 0.05 : 0.03;
      const breakChance = clamp((breakStat - avgTck) / 180 + baseBreak, 0.01, 0.28);

        bonusYards = rand(3, 8);
        yards = Math.min(yards + bonusYards, 100 - startYard);

    if (carrierStats) {
      carrierStats.rush_att++;
      carrierStats.rush_yds += yards;
      if (yards > carrierStats.rush_long) carrierStats.rush_long = yards;
